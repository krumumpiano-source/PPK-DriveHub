<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หน้าแรก - PPK DriveHub</title>
  <script src="/config.js"></script>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/nav.css">
  <style>
    body { padding: 0; }
    .container { max-width: 1400px; border-radius: 0; box-shadow: none; min-height: 100vh; }
    @media (min-width: 900px) { body { padding: 20px; } .container { border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.28); min-height: auto; } }

    /* Calendar */
    .calendar-container { margin-bottom: 36px; }
    .calendar-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .calendar-nav { display: flex; gap: 8px; }
    .calendar-nav-btn { padding: 8px 16px; background: #eff3ff; color: #4285f4; border: none; border-radius: 8px; font-size: .88em; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .2s; }
    .calendar-nav-btn:hover { background: #dce8ff; }
    .calendar-month-year { font-size: 1.3em; font-weight: 700; color: #333; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .calendar-day-header { text-align: center; font-weight: 700; font-size: .8em; color: #888; padding: 8px 0; }
    .calendar-day { border-radius: 10px; padding: 8px; min-height: 80px; cursor: default; border: 1px solid transparent; transition: border-color .15s; }
    .calendar-day:hover { border-color: #dce8ff; }
    .calendar-day.today { background: #eff3ff; border-color: #4285f4; }
    .calendar-day.past { background: #fafafa; }
    .calendar-day.other-month { opacity: .35; }
    .calendar-day-number { font-weight: 700; font-size: .85em; margin-bottom: 4px; color: #555; }
    .today .calendar-day-number { color: #4285f4; }
    .queue-item { background: #e8f5e9; border-left: 3px solid #34a853; border-radius: 5px; padding: 3px 6px; margin-bottom: 3px; font-size: .72em; }
    .queue-plate { font-weight: 700; color: #1b5e20; }
    .queue-driver { color: #388e3c; }
    .queue-destination { color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    @media (max-width: 600px) { .calendar-day { min-height: 56px; padding: 5px; } .queue-item { display: none; } }

    /* Availability */
    .availability-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 8px; }
    @media (max-width: 700px) { .availability-section { grid-template-columns: 1fr; } }
    .availability-card { background: #f8f9ff; border-radius: 14px; padding: 20px; border: 1px solid #eef0ff; }
    .availability-card h3 { font-size: 1em; font-weight: 700; margin-bottom: 14px; color: #333; }
    .availability-item { background: white; border-left: 4px solid #34a853; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
    .availability-item strong { color: #333; font-size: .92em; }
    .availability-item span { color: #888; font-size: .82em; }
    .empty-availability { text-align: center; color: #aaa; padding: 20px; font-size: .9em; }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>PPK DriveHub</h1>
      <p>ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>
    <div id="navigation"></div>
    <div class="content">
      <div id="loading" class="spinner-center"><div class="spinner"></div><p>กำลังโหลดข้อมูล...</p></div>
      <div id="dashboardContent" style="display:none">
        <div class="calendar-container">
          <div class="calendar-header">
            <div class="calendar-nav">
              <button class="calendar-nav-btn" id="btnPrev">‹ เดือนก่อน</button>
              <button class="calendar-nav-btn" id="btnToday">วันนี้</button>
              <button class="calendar-nav-btn" id="btnNext">เดือนถัดไป ›</button>
            </div>
            <div class="calendar-month-year" id="monthYear"></div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div class="availability-section">
          <div class="availability-card">
            <h3>👤 พนักงานขับรถที่ว่าง (วันนี้)</h3>
            <div id="driversAvailableList"><div class="empty-availability">กำลังโหลด...</div></div>
          </div>
          <div class="availability-card">
            <h3>🚗 รถที่ว่าง (วันนี้)</h3>
            <div id="vehiclesAvailableList"><div class="empty-availability">กำลังโหลด...</div></div>
          </div>
        </div>
      </div>
    </div>
    <div style="background:#f8f9fa;padding:18px;text-align:center;color:#999;font-size:.82em;border-top:1px solid #eee;margin-top:40px">
      ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569
    </div>
  </div>
  <script type="module" src="/js/pages/dashboard.js"></script>
</body>
</html>
