name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get fresh Cloudflare token
        id: cf_token
        run: |
          RESP=$(curl -s -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "refresh_token=${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}" \
            --data-urlencode "client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          echo "Raw response keys: $(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(list(d.keys()))" 2>&1)"
          TOKEN=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['access_token'])" 2>&1)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "None" ]; then
            echo "Token refresh failed: $RESP"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy ./frontend --project-name ppk-drivehub
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf_token.outputs.token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
