name = "ppk-drivehub"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./frontend"

[[d1_databases]]
binding = "DB"
database_name = "ppk-drivehub-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "ppk-drivehub-files"

[vars]
APP_NAME = "PPK DriveHub"
APP_VERSION = "1.0.0"
