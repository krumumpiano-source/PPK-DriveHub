<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หน้าแรก - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>window.API_BASE_URL = CONFIG.API_BASE_URL; window.currentPage = 'dashboard';</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sarabun', 'Kanit', sans-serif;
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
      min-height: 100vh;
      padding: 0;
    }

    .container {
    max-width: 1400px;
    margin: 0 auto;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    overflow: hidden;
    }

    .header {
    background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
    color: white;
    padding: 30px;
    text-align: center;
    }

    .header h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    }

    .header p {
    font-size: 1.1em;
    opacity: 0.95;
    }

    .content {
    padding: 40px;
    }

    .calendar-container {
    margin-bottom: 40px;
    }

    .calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    }

    .calendar-nav {
    display: flex;
    gap: 10px;
    align-items: center;
    }

    .calendar-nav-btn {
    padding: 8px 16px;
    background: #4285f4;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1em;
    font-weight: 600;
    transition: all 0.3s;
    }

    .calendar-nav-btn:hover {
    background: #34a853;
    }

    .calendar-month-year {
    font-size: 1.5em;
    font-weight: 700;
    color: #333;
    }

    .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: #e9ecef;
    border: 1px solid #e9ecef;
    border-radius: 12px;
    overflow: hidden;
    }

    .calendar-day-header {
    background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: 600;
    font-size: 0.9em;
    }

    .calendar-day {
    background: white;
    min-height: 120px;
    padding: 8px;
    position: relative;
    cursor: pointer;
    transition: all 0.3s;
    }

    .calendar-day:hover {
    background: #f8f9fa;
    }

    .calendar-day.other-month {
    background: #f8f9fa;
    color: #999;
    }

    .calendar-day-number {
    font-weight: 700;
    font-size: 1.1em;
    margin-bottom: 5px;
    color: #333;
    }

    .calendar-day.other-month .calendar-day-number {
    color: #ccc;
    }

    .calendar-day.today {
    background: #e3f2fd;
    border: 2px solid #4285f4;
    }

    .calendar-day.today .calendar-day-number {
    color: #4285f4;
    font-size: 1.3em;
    }

    /* Queue status colors */
    .calendar-day.past {
    background: #e9ecef !important;
    }

    .calendar-day.past .calendar-day-number {
    color: #666;
    }

    .calendar-day.current {
    background: #c8e6c9 !important;
    }

    .calendar-day.current .calendar-day-number {
    color: #2e7d32;
    font-weight: 700;
    }

    .calendar-day.upcoming {
    background: #fff9c4 !important;
    }

    .calendar-day.upcoming .calendar-day-number {
    color: #856404;
    }

    .calendar-day.future {
    background: white !important;
    }

    .calendar-day.future .calendar-day-number {
    color: #1976d2;
    }

    .queue-item {
    font-size: 0.75em;
    padding: 3px 5px;
    margin-bottom: 3px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.7);
    border-left: 3px solid #4285f4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    }

    .queue-item .queue-plate {
    font-weight: 700;
    color: #1976d2;
    }

    .queue-item .queue-driver {
    color: #666;
    font-size: 0.9em;
    }

    .queue-item .queue-destination {
    color: #333;
    font-size: 0.85em;
    }

    .availability-section {
    margin-top: 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    }

    .availability-card {
    background: #f8f9fa;
    border-radius: 12px;
    padding: 25px;
    border-left: 4px solid #4285f4;
    }

    .availability-card h3 {
    font-size: 1.5em;
    color: #4285f4;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid #4285f4;
    }

    .availability-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    }

    .availability-item {
    background: white;
    padding: 12px;
    border-radius: 8px;
    border-left: 3px solid #34a853;
    display: flex;
    justify-content: space-between;
    align-items: center;
    }

    .availability-item strong {
    color: #333;
    }

    .availability-item span {
    color: #666;
    font-size: 0.9em;
    }

    .empty-availability {
    text-align: center;
    padding: 20px;
    color: #999;
    font-style: italic;
    }

    .loading {
    text-align: center;
    padding: 60px 20px;
    color: #666;
    }

    @media (max-width: 768px) {
    .calendar-day {
    min-height: 80px;
    padding: 5px;
    }

    .queue-item {
    font-size: 0.65em;
    }

    .availability-section {
    grid-template-columns: 1fr;
    }

    .calendar-nav {
    flex-wrap: wrap;
    }
    }
  </style>
</head>

<body>
      <div class="container">
        <div class="header">
          <h1>PPK DriveHub</h1>
          <p>ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
        </div>

        <div id="navigation"></div>

        <div class="content">
          <div id="loading" class="loading">กำลังโหลดข้อมูล...</div>

          <div id="dashboardContent" style="display: none;">
            <!-- Calendar -->
            <div class="calendar-container">
              <div class="calendar-header">
                <div class="calendar-nav">
                  <button class="calendar-nav-btn" onclick="changeMonth(-1)">‹ เดือนก่อน</button>
                  <button class="calendar-nav-btn" onclick="goToToday()">วันนี้</button>
                  <button class="calendar-nav-btn" onclick="changeMonth(1)">เดือนถัดไป ›</button>
                </div>
                <div class="calendar-month-year" id="monthYear"></div>
              </div>

              <div class="calendar-grid" id="calendarGrid">
                <!-- Calendar will be generated here -->
              </div>
            </div>

            <!-- Availability Section -->
            <div class="availability-section">
              <div class="availability-card">
                <h3>👤 พนักงานขับรถที่ว่าง</h3>
                <div class="availability-list" id="driversAvailableList">
                  <div class="empty-availability">กำลังโหลด...</div>
                </div>
              </div>

              <div class="availability-card">
                <h3>🚗 รถที่ว่าง</h3>
                <div class="availability-list" id="vehiclesAvailableList">
                  <div class="empty-availability">กำลังโหลด...</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <script>
        var currentDate = new Date();
        var currentYear = currentDate.getFullYear();
        var currentMonth = currentDate.getMonth();
        var queues = [];
        var vehicles = [];
        var drivers = [];
        var vehiclesMap = {};
        var driversMap = {};

        // Thai month names
        var thaiMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
          'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

        var thaiDays = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];

        // Wait for common.js to load
        function waitForCommon() {
          return new Promise(function (resolve) {
            if (typeof apiCall !== 'undefined') {
              resolve();
              return;
            }

            var checkCount = 0;
            var checkInterval = setInterval(function () {
              checkCount++;
              if (typeof apiCall !== 'undefined') {
                clearInterval(checkInterval);
                resolve();
              } else if (checkCount > 50) { // Wait max 5 seconds
                clearInterval(checkInterval);
                console.warn('common.js not loaded after 5 seconds');
                resolve(); // Continue anyway
              }
            }, 100);
          });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async function () {
          // Wait for common.js to load
          await waitForCommon();

          // Check if common.js is loaded
          if (typeof apiCall === 'undefined') {
            console.error('common.js not loaded! Make sure to open via web server, not file://');
            // Still show calendar even without API
            renderCalendar();
            displayAvailability([], []);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
            alert('⚠️ กรุณาเปิดผ่าน Web Server (ไม่ใช่ file://) เพื่อให้ระบบทำงานได้เต็มที่\n\nตอนนี้แสดงปฏิทินแบบไม่มีข้อมูล');
            return;
          }

          // Check authentication but don't block if not logged in (for testing)
          try {
            if (typeof requireAuth === 'function') {
              var authResult = requireAuth();
              if (!authResult) {
                console.warn('Not authenticated, but continuing to show calendar');
              }
            }
          } catch (e) {
            console.warn('Auth check failed:', e);
          }

          loadDashboard();
        });

        async function loadDashboard() {
          try {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('dashboardContent').style.display = 'none';

            // Load queues for current month
            var firstDay = new Date(currentYear, currentMonth, 1);
            var lastDay = new Date(currentYear, currentMonth + 1, 0);
            var dateFrom = formatDate(firstDay);
            var dateTo = formatDate(lastDay);

            queues = [];

            // Load queues
            try {
              var queuesResult = await apiCall('getQueues', {
                filters: {
                  date_from: dateFrom,
                  date_to: dateTo
                }
              });

              if (queuesResult && queuesResult.success && queuesResult.data && queuesResult.data.queues) {
                queues = queuesResult.data.queues;
              }

              // Also load queues for a few days before and after for better calendar display
              var extendedFrom = new Date(firstDay);
              extendedFrom.setDate(extendedFrom.getDate() - 7);
              var extendedTo = new Date(lastDay);
              extendedTo.setDate(extendedTo.getDate() + 7);

              var extendedQueuesResult = await apiCall('getQueues', {
                filters: {
                  date_from: formatDate(extendedFrom),
                  date_to: formatDate(extendedTo)
                }
              });

              if (extendedQueuesResult && extendedQueuesResult.success && extendedQueuesResult.data && extendedQueuesResult.data.queues) {
                // Merge queues, avoiding duplicates
                var queueIds = {};
                queues.forEach(function (q) { queueIds[q.queue_id] = true; });
                extendedQueuesResult.data.queues.forEach(function (q) {
                  if (!queueIds[q.queue_id]) {
                    queues.push(q);
                    queueIds[q.queue_id] = true;
                  }
                });
              }
            } catch (queueError) {
              console.error('Error loading queues:', queueError);
              queues = [];
            }

            // Load vehicles
            try {
              var vehiclesResult = await apiCall('getVehicles', {});
              if (vehiclesResult && vehiclesResult.success && vehiclesResult.data && vehiclesResult.data.vehicles) {
                vehicles = vehiclesResult.data.vehicles;
                vehicles.forEach(function (v) {
                  vehiclesMap[v.car_id] = v;
                });
              }
            } catch (vehicleError) {
              console.error('Error loading vehicles:', vehicleError);
              vehicles = [];
            }

            // Load drivers
            try {
              var driversResult = await apiCall('getDrivers', { status: 'active' });
              if (driversResult && driversResult.success && driversResult.data && driversResult.data.drivers) {
                drivers = driversResult.data.drivers;
                drivers.forEach(function (d) {
                  driversMap[d.driver_id] = d;
                });
              }
            } catch (driverError) {
              console.error('Error loading drivers:', driverError);
              drivers = [];
            }

            // Load available vehicles and drivers for today
            var today = formatDate(new Date());
            var availableVehicles = [];
            var availableDrivers = [];

            try {
              var availableVehiclesResult = await apiCall('getAvailableVehiclesForQueue', { date: today });
              if (availableVehiclesResult && availableVehiclesResult.success && availableVehiclesResult.data && availableVehiclesResult.data.vehicles) {
                availableVehicles = availableVehiclesResult.data.vehicles;
              }
            } catch (avError) {
              console.error('Error loading available vehicles:', avError);
            }

            try {
              var availableDriversResult = await apiCall('getAvailableDriversForQueue', { date: today });
              if (availableDriversResult && availableDriversResult.success && availableDriversResult.data && availableDriversResult.data.drivers) {
                availableDrivers = availableDriversResult.data.drivers;
              }
            } catch (adError) {
              console.error('Error loading available drivers:', adError);
            }

            // Always display calendar, even if no data
            renderCalendar();

            // Display availability
            displayAvailability(availableVehicles, availableDrivers);

          } catch (error) {
            console.error('Error loading dashboard:', error);
            // Still show calendar even on error
            renderCalendar();
            displayAvailability([], []);
            alert('โหลดข้อมูลบางส่วนไม่สำเร็จ แต่ยังแสดงปฏิทินได้\n\n' + (typeof handleError !== 'undefined' ? handleError(error) : 'กรุณาลองใหม่อีกครั้ง'));
          } finally {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
          }
        }

        function formatDate(date) {
          var year = date.getFullYear();
          var month = String(date.getMonth() + 1).padStart(2, '0');
          var day = String(date.getDate()).padStart(2, '0');
          return year + '-' + month + '-' + day;
        }

        function renderCalendar() {
          var firstDay = new Date(currentYear, currentMonth, 1);
          var lastDay = new Date(currentYear, currentMonth + 1, 0);
          var firstDayOfWeek = firstDay.getDay();
          var daysInMonth = lastDay.getDate();

          // Update month/year header
          document.getElementById('monthYear').textContent = thaiMonths[currentMonth] + ' ' + (currentYear + 543);

          var html = '';

          // Day headers
          thaiDays.forEach(function (day) {
            html += '<div class="calendar-day-header">' + day + '</div>';
          });

          // Empty cells for days before month starts
          for (var i = 0; i < firstDayOfWeek; i++) {
            var prevDate = new Date(currentYear, currentMonth, -i);
            html += '<div class="calendar-day other-month"><div class="calendar-day-number">' + prevDate.getDate() + '</div></div>';
          }

          // Days of the month
          var today = new Date();
          today.setHours(0, 0, 0, 0);
          var todayStr = formatDate(today);
          var now = new Date();
          var currentTimeMinutes = now.getHours() * 60 + now.getMinutes();

          function parseTimeToMinutes(timeStr) {
            if (!timeStr) return null;
            var parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
          }

          function isQueueCurrent(queue, dateStr) {
            if (dateStr !== todayStr) return false;
            if (queue.status !== 'active' && queue.status !== 'running') return false;
            if (!queue.time_start) return false;

            var queueStart = parseTimeToMinutes(queue.time_start);
            var queueEnd = queue.time_end ? parseTimeToMinutes(queue.time_end) : (queueStart + 8 * 60);

            return currentTimeMinutes >= queueStart && currentTimeMinutes <= queueEnd;
          }

          function isQueueUpcoming(queue, dateStr) {
            if (dateStr !== todayStr) return false;
            if (queue.status !== 'pending') return false;
            if (!queue.time_start) return false;

            var queueStart = parseTimeToMinutes(queue.time_start);
            // Upcoming: starts within next 2 hours
            return queueStart > currentTimeMinutes && queueStart <= currentTimeMinutes + 120;
          }

          for (var day = 1; day <= daysInMonth; day++) {
            var dateStr = formatDate(new Date(currentYear, currentMonth, day));
            var dateObj = new Date(currentYear, currentMonth, day);
            dateObj.setHours(0, 0, 0, 0);
            var isToday = dateStr === todayStr;
            var dayQueues = queues.filter(function (q) { return q.date === dateStr; });

            // Determine status
            var statusClass = '';
            if (isToday) {
              statusClass = 'today';
            } else if (dateObj < today) {
              // Past date
              statusClass = 'past';
            } else {
              // Future date - check queue status
              var hasCurrent = false;
              var hasUpcoming = false;

              dayQueues.forEach(function (queue) {
                if (isQueueCurrent(queue, dateStr)) {
                  hasCurrent = true;
                } else if (isQueueUpcoming(queue, dateStr)) {
                  hasUpcoming = true;
                }
              });

              if (hasCurrent) {
                statusClass = 'current';
              } else if (hasUpcoming) {
                statusClass = 'upcoming';
              } else {
                statusClass = 'future';
              }
            }

            html += '<div class="calendar-day ' + statusClass + '">';
            html += '<div class="calendar-day-number">' + day + '</div>';

            // Display queues for this day (limit to 3 for better display)
            var displayQueues = dayQueues.slice(0, 3);
            displayQueues.forEach(function (queue) {
              var vehicle = vehiclesMap[queue.car_id];
              var driver = driversMap[queue.driver_id];
              var plate = vehicle ? vehicle.license_plate : (queue.car_id ? queue.car_id.substring(0, 8) : '-');
              var driverName = driver ? (driver.full_name || driver.first_name + ' ' + driver.last_name) : (queue.driver_id ? queue.driver_id.substring(0, 8) : '-');
              var destination = queue.destination || queue.mission || '-';

              html += '<div class="queue-item">';
              html += '<div class="queue-plate">' + plate + '</div>';
              html += '<div class="queue-driver">' + driverName + '</div>';
              html += '<div class="queue-destination">' + destination + '</div>';
              html += '</div>';
            });

            if (dayQueues.length > 3) {
              html += '<div class="queue-item" style="font-size: 0.7em; color: #999;">+ ' + (dayQueues.length - 3) + ' คิวเพิ่มเติม</div>';
            }

            html += '</div>';
          }

          // Empty cells for days after month ends
          var remainingCells = 42 - (firstDayOfWeek + daysInMonth);
          for (var i = 1; i <= remainingCells && remainingCells < 7; i++) {
            html += '<div class="calendar-day other-month"><div class="calendar-day-number">' + i + '</div></div>';
          }

          document.getElementById('calendarGrid').innerHTML = html;
        }

        function changeMonth(direction) {
          currentMonth += direction;
          if (currentMonth < 0) {
            currentMonth = 11;
            currentYear--;
          } else if (currentMonth > 11) {
            currentMonth = 0;
            currentYear++;
          }
          loadDashboard();
        }

        function goToToday() {
          var today = new Date();
          currentYear = today.getFullYear();
          currentMonth = today.getMonth();
          loadDashboard();
        }

        async function displayAvailability(availableVehicles, availableDrivers) {
          // Display available drivers
          var driversHtml = '';
          if (availableDrivers && availableDrivers.length > 0) {
            availableDrivers.forEach(function (driver) {
              driversHtml += '<div class="availability-item">';
              driversHtml += '<strong>' + (driver.full_name || driver.first_name + ' ' + driver.last_name) + '</strong>';
              if (driver.phone) {
                driversHtml += '<span>' + driver.phone + '</span>';
              }
              driversHtml += '</div>';
            });
          } else {
            driversHtml = '<div class="empty-availability">ไม่มีพนักงานขับรถว่าง</div>';
          }
          document.getElementById('driversAvailableList').innerHTML = driversHtml;

          // Load scheduled repairs to show vehicles under repair
          var scheduledRepairs = [];
          try {
            var scheduledRepairsResult = await apiCall('getScheduledRepairs', {
              filters: {
                status: 'pending'
              }
            });
            if (scheduledRepairsResult && scheduledRepairsResult.success && scheduledRepairsResult.data && scheduledRepairsResult.data.scheduled_repairs) {
              scheduledRepairs = scheduledRepairsResult.data.scheduled_repairs;
            }
          } catch (schedError) {
            console.error('Error loading scheduled repairs:', schedError);
          }

          // Display available vehicles
          var vehiclesHtml = '';
          if (availableVehicles && availableVehicles.length > 0) {
            availableVehicles.forEach(function (vehicle) {
              vehiclesHtml += '<div class="availability-item">';
              vehiclesHtml += '<strong>' + vehicle.license_plate + '</strong>';
              vehiclesHtml += '<span>' + (vehicle.brand || '') + ' ' + (vehicle.model || '') + '</span>';
              vehiclesHtml += '</div>';
            });
          } else {
            vehiclesHtml = '<div class="empty-availability">ไม่มีรถว่าง</div>';
          }

          // Display vehicles under repair
          if (scheduledRepairs.length > 0) {
            vehiclesHtml += '<div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #ff9800;">';
            vehiclesHtml += '<h4 style="color: #ff9800; margin-bottom: 10px; font-size: 1em;">🔧 รถที่กำลังซ่อม</h4>';
            scheduledRepairs.forEach(function (sr) {
              var vehicle = vehicles.find(function (v) { return v.car_id === sr.car_id; });
              if (vehicle) {
                vehiclesHtml += '<div class="availability-item" style="border-left-color: #ff9800; background: #fff3e0;">';
                vehiclesHtml += '<strong>' + vehicle.license_plate + '</strong>';
                vehiclesHtml += '<span style="color: #e65100; font-size: 0.85em;">🔧 ' + (sr.issue_description || 'กำลังซ่อม') + '</span>';
                vehiclesHtml += '</div>';
              }
            });
            vehiclesHtml += '</div>';
          }

          document.getElementById('vehiclesAvailableList').innerHTML = vehiclesHtml;
        }

        // Auto refresh every 5 minutes
        setInterval(function () {
          loadDashboard();
        }, 5 * 60 * 1000);
      </script>

      <div class="footer"
        style="background: #f8f9fa; padding: 20px; text-align: center; color: #666; border-top: 2px solid #e9ecef; font-size: 0.9em; margin-top: 40px;">
        <p>ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
      </div>
    </body>

</html>
