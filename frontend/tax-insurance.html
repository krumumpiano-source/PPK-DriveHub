<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ภาษีและประกันภัย - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>
    window.API_BASE_URL = CONFIG.API_BASE_URL;
    window.currentPage = 'tax-insurance';
    window.REQUIRE_AUTH = true;
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { }

    .container { }

      .tab {
        white-space: nowrap;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>📄 ภาษีและประกันภัย</h1>
      <p>ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>

    <div id="navigation"></div>

    <div class="content">
      <div id="alertContainer"></div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('tax')">📋 ภาษี</button>
        <button class="tab" onclick="switchTab('insurance')">🛡️ ประกันภัย</button>
      </div>

      <div class="filters">
        <div class="filter-group">
          <label>รถ</label>
          <select id="filterCar" onchange="loadRecords()">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
        <div class="filter-group">
          <label>สถานะ</label>
          <select id="filterStatus" onchange="loadRecords()">
            <option value="">ทั้งหมด</option>
            <option value="expiring">ใกล้หมดอายุ</option>
            <option value="expired">หมดอายุแล้ว</option>
            <option value="ok">ปกติ</option>
          </select>
        </div>
      </div>

      <div class="actions-bar">
        <button class="btn btn-primary" id="addRecordBtn" onclick="openAddModal()">
          ➕ เพิ่มบันทึกใหม่
        </button>
        <button class="btn btn-secondary" onclick="loadRecords()">
          🔃 รีเฟรช
        </button>
      </div>

      <div id="loading" class="loading">กำลังโหลดข้อมูล...</div>
      <div id="recordsContainer" style="display: none;">
        <div class="records-grid" id="recordsGrid"></div>
      </div>
    </div>
  </div>

  <!-- Modal สำหรับเพิ่ม/แก้ไข -->
  <div id="recordModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">เพิ่มบันทึกภาษี</h2>
        <button class="modal-close" onclick="closeModal()" title="ปิด">×</button>
      </div>
      <div class="modal-body">
        <form id="recordForm" onsubmit="handleSubmit(event); return false;">
          <div class="form-section">
            <div class="form-section-title" id="sectionTitle">📋 ข้อมูลภาษี</div>

            <div class="form-group">
              <label>รถ <span class="required">*</span></label>
              <select id="car_id" required>
                <option value="">เลือกรถ</option>
              </select>
            </div>

            <!-- Tax fields -->
            <div id="taxFields">
              <div class="form-row">
                <div class="form-group">
                  <label>ประเภทภาษี</label>
                  <select id="tax_type">
                    <option value="annual_tax">ภาษีประจำปี</option>
                    <option value="road_tax">ภาษีรถยนต์</option>
                  </select>
                </div>

                <div class="form-group">
                  <label>จำนวนเงิน (บาท) <span class="required">*</span></label>
                  <input type="number" id="tax_amount" min="0" step="0.01" required placeholder="0.00">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>วันที่เสียภาษี <span class="required">*</span></label>
                  <input type="text" id="paid_date" class="date-picker" required>
                </div>

                <div class="form-group">
                  <label>วันหมดอายุ <span class="required">*</span></label>
                  <input type="text" id="expiry_date" class="date-picker" required>
                </div>
              </div>
            </div>

            <!-- Insurance fields -->
            <div id="insuranceFields" style="display: none;">
              <div class="form-row">
                <div class="form-group">
                  <label>ประเภทประกัน</label>
                  <select id="insurance_type">
                    <option value="voluntary">ประกันภัยภาคสมัครใจ</option>
                    <option value="compulsory">ประกันภัยภาคบังคับ</option>
                  </select>
                </div>

                <div class="form-group">
                  <label>บริษัทประกัน <span class="required">*</span></label>
                  <input type="text" id="insurance_company" placeholder="ชื่อบริษัทประกัน">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>เลขกรมธรรม์</label>
                  <input type="text" id="policy_number" placeholder="เลขกรมธรรม์">
                </div>

                <div class="form-group">
                  <label>เบี้ยประกัน (บาท) <span class="required">*</span></label>
                  <input type="number" id="insurance_amount" min="0" step="0.01" placeholder="0.00">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>ทุนประกัน (บาท)</label>
                  <input type="number" id="coverage_amount" min="0" step="0.01" placeholder="0.00">
                </div>

                <div class="form-group">
                  <label>วันเริ่มต้น <span class="required">*</span></label>
                  <input type="text" id="insurance_start_date" class="date-picker" placeholder="เลือกวันที่">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>วันหมดอายุ <span class="required">*</span></label>
                  <input type="text" id="insurance_expiry_date" class="date-picker" required>
                </div>

                <div class="form-group">
                  <label>รายละเอียดความคุ้มครอง</label>
                  <textarea id="coverage_details" placeholder="รายละเอียดความคุ้มครอง"></textarea>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label>หมายเหตุ</label>
              <textarea id="notes" placeholder="หมายเหตุเพิ่มเติม"></textarea>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">📎 เอกสาร</div>
            <div class="form-group">
              <label>แนบเอกสาร (ใบเสร็จ, กรมธรรม์)</label>
              <div class="file-upload" onclick="document.getElementById('receipt_file').click()">
                <input type="file" id="receipt_file" accept="image/*,.pdf"
                  onchange="handleFileUpload('receipt_file', 'receiptPreview')">
                <p>📎 คลิกเพื่อเลือกไฟล์ (รูปภาพหรือ PDF)</p>
              </div>
              <div class="file-preview" id="receiptPreview"></div>
            </div>
          </div>

          <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button type="button" class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">
              ยกเลิก
            </button>
            <button type="submit" class="btn btn-primary" id="submitBtn" style="flex: 1;">
              💾 บันทึก
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script>
    var currentTab = 'tax';
    var records = [];
    var vehicles = [];
    var editingRecordId = null;
    var receiptFile = null;
    var datePickers = {};

    // Wait for common.js to load
    function waitForCommon() {
      return new Promise(function (resolve) {
        if (typeof apiCall !== 'undefined' && typeof requireAuth !== 'undefined') {
          resolve();
          return;
        }

        var checkCount = 0;
        var checkInterval = setInterval(function () {
          checkCount++;
          if (typeof apiCall !== 'undefined' && typeof requireAuth !== 'undefined') {
            clearInterval(checkInterval);
            resolve();
          } else if (checkCount > 50) { // Wait max 5 seconds
            clearInterval(checkInterval);
            console.warn('common.js not loaded after 5 seconds');
            resolve(); // Continue anyway
          }
        }, 100);
      });
    }

    document.addEventListener('DOMContentLoaded', async function () {
      // Wait for common.js to load
      await waitForCommon();

      if (typeof apiCall === 'undefined' || typeof requireAuth === 'undefined') {
        console.error('common.js not loaded! Make sure to open via web server, not file://');
        // Still show UI even without API
        document.getElementById('loading').style.display = 'none';
        document.getElementById('recordsContainer').style.display = 'block';
        return;
      }

      // Check authentication (ไม่ redirect — ให้แสดงหน้าได้)
      var isFileProtocol = window.location.protocol === 'file:';
      var isAuthenticated = requireAuth();
      if (!isAuthenticated) {
        console.warn('Not authenticated, but showing page anyway');
      }

      var currentUser = getCurrentUser();
      if (currentUser && !hasModulePermission('vehicles', 'view') && currentUser.role !== 'admin') {
        console.warn('No permission, but showing page anyway');
        // ไม่ redirect — ให้แสดงหน้าได้
      }

      // ถ้ายังไม่ล็อกอิน ให้แสดงหน้าได้แต่ไม่โหลดข้อมูล
      if (!isAuthenticated && !isFileProtocol) {
        return;
      }


      loadVehicles();
      loadRecords();

      var addBtn = document.getElementById('addRecordBtn') || document.querySelector('.btn-primary[onclick*="openAddModal"]');
      if (addBtn) {
        addBtn.addEventListener('click', function (e) {
          e.preventDefault();
          if (typeof window.openAddModal === 'function') {
            window.openAddModal();
          } else {
            alert('ระบบกำลังโหลด กรุณารอสักครู่แล้วกดอีกครั้ง');
          }
        });
      }
    });

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(function (t) {
        t.classList.remove('active');
      });
      event.target.classList.add('active');
      document.getElementById('modalTitle').textContent = tab === 'tax' ? 'เพิ่มบันทึกภาษี' : 'เพิ่มบันทึกประกันภัย';
      document.getElementById('sectionTitle').textContent = tab === 'tax' ? '📋 ข้อมูลภาษี' : '🛡️ ข้อมูลประกันภัย';
      loadRecords();
    }

    async function loadVehicles() {
      try {
        var result = await apiCall('getVehicles', {});
        if (result.success && result.data && result.data.vehicles) {
          vehicles = result.data.vehicles || [];
          var select = document.getElementById('filterCar');
          var carSelect = document.getElementById('car_id');

          vehicles.forEach(function (vehicle) {
            var option1 = document.createElement('option');
            option1.value = vehicle.car_id;
            option1.textContent = vehicle.license_plate + ' - ' + (vehicle.brand || '') + ' ' + (vehicle.model || '');
            select.appendChild(option1);

            var option2 = document.createElement('option');
            option2.value = vehicle.car_id;
            option2.textContent = vehicle.license_plate + ' - ' + (vehicle.brand || '') + ' ' + (vehicle.model || '');
            carSelect.appendChild(option2);
          });
        }
      } catch (error) {
        console.error('Error loading vehicles:', error);
      }
    }

    async function loadRecords() {
      try {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('recordsContainer').style.display = 'none';

        var filters = {};
        var filterCar = document.getElementById('filterCar').value;
        if (filterCar) filters.car_id = filterCar;

        var result;
        if (currentTab === 'tax') {
          result = await apiCall('getTaxRecords', filters);
        } else {
          result = await apiCall('getInsuranceRecords', filters);
        }

        if (result.success && result.data) {
          records = Array.isArray(result.data) ? result.data : [];
          displayRecords(records);
        } else {
          document.getElementById('recordsGrid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📄</div><p>ไม่พบข้อมูล</p></div>';
          document.getElementById('recordsContainer').style.display = 'block';
        }
      } catch (error) {
        console.error('Error loading records:', error);
        showAlert('โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function displayRecords(recordsList) {
      var html = '';

      if (recordsList.length === 0) {
        html = '<div class="empty-state"><div class="empty-state-icon">📄</div><p>ไม่พบข้อมูล</p></div>';
      } else {
        // Sort records by expiry date (ascending - closest expiry first)
        var sortedRecords = recordsList.slice().sort(function (a, b) {
          var dateA = a.expiry_date ? new Date(a.expiry_date + 'T00:00:00') : new Date('9999-12-31');
          var dateB = b.expiry_date ? new Date(b.expiry_date + 'T00:00:00') : new Date('9999-12-31');

          // Expired records should come first, then by expiry date
          var today = new Date();
          today.setHours(0, 0, 0, 0);

          var aExpired = dateA < today;
          var bExpired = dateB < today;

          if (aExpired && !bExpired) return -1;
          if (!aExpired && bExpired) return 1;

          // Both expired or both not expired - sort by expiry date
          return dateA - dateB;
        });

        sortedRecords.forEach(function (record) {
          var vehicle = vehicles.find(function (v) { return v.car_id === record.car_id; });
          var vehicleName = vehicle ? (vehicle.license_plate + ' ' + vehicle.brand + ' ' + vehicle.model) : record.car_id;

          var expiryDate = currentTab === 'tax' ? record.expiry_date : record.expiry_date;
          var expiryStatus = getExpiryStatus(expiryDate);
          var expiryClass = expiryStatus === 'expired' ? 'expiry-expired' : (expiryStatus === 'soon' ? 'expiry-soon' : 'expiry-ok');
          var expiryText = expiryStatus === 'expired' ? 'หมดอายุแล้ว' : (expiryStatus === 'soon' ? 'ใกล้หมดอายุ' : 'ปกติ');

          var cardClass = expiryStatus === 'expired' ? 'expired' : (expiryStatus === 'soon' ? 'expiring' : '');

          html += '<div class="record-card ' + cardClass + '">';
          html += '<div class="record-card-header">';
          html += '<div class="record-vehicle">' + vehicleName + '</div>';
          html += '<div class="record-expiry ' + expiryClass + '">' + expiryText + '</div>';
          html += '</div>';

          html += '<div class="record-info">';
          if (currentTab === 'tax') {
            html += '<div class="record-info-item"><span class="record-info-label">ประเภท:</span><span class="record-info-value">' + (record.tax_type === 'annual_tax' ? 'ภาษีประจำปี' : 'ภาษีรถยนต์') + '</span></div>';
            html += '<div class="record-info-item"><span class="record-info-label">จำนวนเงิน:</span><span class="record-info-value">' + (record.amount ? record.amount.toLocaleString() + ' บาท' : '-') + '</span></div>';
            html += '<div class="record-info-item"><span class="record-info-label">วันที่เสีย:</span><span class="record-info-value">' + formatDateThai(record.paid_date) + '</span></div>';
            html += '<div class="record-info-item"><span class="record-info-label">วันหมดอายุ:</span><span class="record-info-value">' + formatDateThai(record.expiry_date) + '</span></div>';
          } else {
            html += '<div class="record-info-item"><span class="record-info-label">บริษัทประกัน:</span><span class="record-info-value">' + (record.insurance_company || '-') + '</span></div>';
            html += '<div class="record-info-item"><span class="record-info-label">เลขกรมธรรม์:</span><span class="record-info-value">' + (record.policy_number || '-') + '</span></div>';
            html += '<div class="record-info-item"><span class="record-info-label">เบี้ยประกัน:</span><span class="record-info-value">' + (record.amount ? record.amount.toLocaleString() + ' บาท' : '-') + '</span></div>';
            if (record.coverage_amount) {
              html += '<div class="record-info-item"><span class="record-info-label">ทุนประกัน:</span><span class="record-info-value">' + record.coverage_amount.toLocaleString() + ' บาท</span></div>';
            }
            if (record.coverage_details) {
              html += '<div class="record-info-item"><span class="record-info-label">รายละเอียดความคุ้มครอง:</span><span class="record-info-value">' + record.coverage_details + '</span></div>';
            }
            html += '<div class="record-info-item"><span class="record-info-label">วันเริ่มต้น:</span><span class="record-info-value">' + formatDateThai(record.paid_date) + '</span></div>';
            html += '<div class="record-info-item"><span class="record-info-label">วันหมดอายุ:</span><span class="record-info-value">' + formatDateThai(record.expiry_date) + '</span></div>';
          }
          html += '</div>';

          html += '<div class="record-actions">';
          if (hasModulePermission('vehicles', 'edit') || getCurrentUser().role === 'admin') {
            html += '<button class="btn btn-primary" onclick="editRecord(\'' + record.id + '\')">✏️ แก้ไข</button>';
          }
          html += '</div>';
          html += '</div>';
        });
      }

      document.getElementById('recordsGrid').innerHTML = html;
      document.getElementById('recordsContainer').style.display = 'block';
    }

    function getExpiryStatus(expiryDate) {
      if (!expiryDate) return 'ok';
      try {
        var expiry = new Date(expiryDate + 'T00:00:00');
        var today = new Date();
        today.setHours(0, 0, 0, 0);
        var diffTime = expiry - today;
        var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays < 0) return 'expired';
        if (diffDays <= 90) return 'soon'; // 3 months
        return 'ok';
      } catch (e) {
        return 'ok';
      }
    }

    function initializeDatePickers() {
      // Destroy existing pickers
      Object.keys(datePickers).forEach(function (key) {
        if (datePickers[key] && datePickers[key].destroy) {
          datePickers[key].destroy();
        }
      });
      datePickers = {};

      var dateInputs = document.querySelectorAll('.date-picker');
      dateInputs.forEach(function (input) {
        datePickers[input.id] = flatpickr(input, {
          locale: 'th',
          dateFormat: 'Y-m-d',
          altInput: true,
          altFormat: 'd/m/Y',
          defaultDate: null
        });
      });
    }

    // Make openAddModal global and add error handling
    window.openAddModal = function openAddModal() {
      try {
        var isFileProtocol = window.location.protocol === 'file:';

        if (!isFileProtocol) {
          if (typeof getCurrentUser === 'undefined' || typeof hasModulePermission === 'undefined') {
            alert('ระบบกำลังโหลด กรุณารอสักครู่แล้วกดอีกครั้ง');
            return;
          }

          var user = getCurrentUser();
          if (!user) {
            alert('กรุณาล็อกอินก่อนจึงจะเพิ่มหรือแก้ไขบันทึกได้');
            window.location.href = 'login.html';
            return;
          }

          if (!hasModulePermission('vehicles', 'edit') && user.role !== 'admin') {
            alert('คุณไม่มีสิทธิ์เพิ่มบันทึก กรุณาติดต่อผู้ดูแลระบบ');
            return;
          }
        }

        var modal = document.getElementById('recordModal');
        if (!modal) {
          alert('เปิดฟอร์มไม่ได้ กรุณารีเฟรชหน้าแล้วลองอีกครั้ง');
          return;
        }

        editingRecordId = null;
        document.getElementById('modalTitle').textContent = currentTab === 'tax' ? 'เพิ่มบันทึกภาษี' : 'เพิ่มบันทึกประกันภัย';
        document.getElementById('sectionTitle').textContent = currentTab === 'tax' ? '📋 ข้อมูลภาษี' : '🛡️ ข้อมูลประกันภัย';

        var form = document.getElementById('recordForm');
        if (form) {
          form.reset();
        }

        document.getElementById('taxFields').style.display = currentTab === 'tax' ? 'block' : 'none';
        document.getElementById('insuranceFields').style.display = currentTab === 'insurance' ? 'block' : 'none';
        receiptFile = null;
        document.getElementById('receiptPreview').innerHTML = '';
        modal.classList.add('show');

        setTimeout(function () {
          initializeDatePickers();
        }, 100);
      } catch (error) {
        console.error('Error opening add modal:', error);
        alert(handleError(error));
      }
    };

    function editRecord(recordId) {
      if (!hasModulePermission('vehicles', 'edit') && getCurrentUser().role !== 'admin') {
        alert('คุณไม่มีสิทธิ์แก้ไขบันทึก กรุณาติดต่อผู้ดูแลระบบ');
        return;
      }

      var record = records.find(function (r) {
        return r.id === recordId;
      });
      if (!record) {
        alert('ไม่พบข้อมูลรายการนี้');
        return;
      }

      editingRecordId = record.id;
      document.getElementById('modalTitle').textContent = currentTab === 'tax' ? 'แก้ไขบันทึกภาษี' : 'แก้ไขบันทึกประกันภัย';

      // Populate form
      document.getElementById('car_id').value = record.car_id || '';

      if (currentTab === 'tax') {
        document.getElementById('tax_type').value = record.tax_type || 'annual_tax';
        document.getElementById('tax_amount').value = record.amount || '';
      } else {
        document.getElementById('insurance_type').value = record.insurance_type || 'voluntary';
        document.getElementById('insurance_company').value = record.insurance_company || '';
        document.getElementById('policy_number').value = record.policy_number || '';
        document.getElementById('insurance_amount').value = record.amount || '';
        document.getElementById('coverage_amount').value = record.coverage_amount || '';
        document.getElementById('coverage_details').value = record.coverage_details || '';
      }

      document.getElementById('notes').value = record.notes || '';

      if (record.receipt_image) {
        document.getElementById('receiptPreview').innerHTML = '<img src="' + record.receipt_image + '" alt="Receipt">';
        receiptFile = { isExisting: true, url: record.receipt_image };
      }

      document.getElementById('taxFields').style.display = currentTab === 'tax' ? 'block' : 'none';
      document.getElementById('insuranceFields').style.display = currentTab === 'insurance' ? 'block' : 'none';
      document.getElementById('recordModal').classList.add('show');

      setTimeout(function () {
        initializeDatePickers();

        if (currentTab === 'tax') {
          if (datePickers['paid_date'] && record.paid_date) {
            datePickers['paid_date'].setDate(record.paid_date);
          }
          if (datePickers['expiry_date'] && record.expiry_date) {
            datePickers['expiry_date'].setDate(record.expiry_date);
          }
        } else {
          if (datePickers['insurance_start_date'] && record.paid_date) {
            datePickers['insurance_start_date'].setDate(record.paid_date);
          }
          if (datePickers['insurance_expiry_date'] && record.expiry_date) {
            datePickers['insurance_expiry_date'].setDate(record.expiry_date);
          }
        }
      }, 100);
    }

    function closeModal() {
      document.getElementById('recordModal').classList.remove('show');

      // Destroy date pickers
      Object.keys(datePickers).forEach(function (key) {
        if (datePickers[key] && datePickers[key].destroy) {
          datePickers[key].destroy();
        }
      });
      datePickers = {};
    }

    function handleFileUpload(inputId, previewId) {
      var input = document.getElementById(inputId);
      var file = input.files[0];
      if (file) {
        var reader = new FileReader();
        reader.onload = function (e) {
          receiptFile = {
            name: file.name,
            data: e.target.result.split(',')[1],
            mime: file.type,
            isExisting: false
          };
          if (file.name.toLowerCase().endsWith('.pdf')) {
            document.getElementById(previewId).innerHTML = '<div style="width:100%;height:200px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);">📄 ' + file.name + '</div>';
          } else {
            document.getElementById(previewId).innerHTML = '<img src="' + e.target.result + '" alt="Preview" style="max-width:300px;max-height:300px;border-radius:var(--radius-md);border:2px solid var(--color-border);">';
          }
        };
        reader.readAsDataURL(file);
      }
    }

    async function handleSubmit(event) {
      event.preventDefault();

      var submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'กำลังบันทึก...';

      try {
        var recordData = {
          car_id: document.getElementById('car_id').value,
          notes: document.getElementById('notes').value.trim()
        };

        // Only upload new files (not existing ones)
        if (receiptFile && !receiptFile.isExisting) {
          recordData.receipt_image_base64 = receiptFile.data;
          recordData.receipt_image_name = receiptFile.name;
          recordData.receipt_image_mime = receiptFile.mime;
        }

        if (currentTab === 'tax') {
          recordData.tax_type = document.getElementById('tax_type').value;
          recordData.amount = parseFloat(document.getElementById('tax_amount').value) || 0;

          var paidDatePicker = datePickers['paid_date'];
          var expiryDatePicker = datePickers['expiry_date'];
          recordData.paid_date = paidDatePicker ? paidDatePicker.input.value : document.getElementById('paid_date').value;
          recordData.expiry_date = expiryDatePicker ? expiryDatePicker.input.value : document.getElementById('expiry_date').value;

          if (editingRecordId) {
            recordData.id = editingRecordId;
            var result = await apiCall('updateTaxRecord', recordData);

            if (result.success) {
              showAlert('แก้ไขบันทึกภาษีสำเร็จ', 'success');
              closeModal();
              loadRecords();
            } else {
              showAlert(typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'), 'error');
            }
          } else {
            var result = await apiCall('createTaxRecord', recordData);

            if (result.success) {
              showAlert('เพิ่มบันทึกภาษีสำเร็จ', 'success');
              closeModal();
              loadRecords();
            } else {
              showAlert(typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'), 'error');
            }
          }
        } else {
          recordData.insurance_type = document.getElementById('insurance_type').value;
          recordData.insurance_company = document.getElementById('insurance_company').value.trim();
          recordData.policy_number = document.getElementById('policy_number').value.trim();
          recordData.amount = parseFloat(document.getElementById('insurance_amount').value) || 0;
          recordData.coverage_amount = parseFloat(document.getElementById('coverage_amount').value) || 0;
          recordData.coverage_details = document.getElementById('coverage_details').value.trim();

          var startDatePicker = datePickers['insurance_start_date'];
          var expiryDatePicker = datePickers['insurance_expiry_date'];
          recordData.paid_date = startDatePicker ? startDatePicker.input.value : document.getElementById('insurance_start_date').value;
          recordData.expiry_date = expiryDatePicker ? expiryDatePicker.input.value : document.getElementById('insurance_expiry_date').value;

          if (editingRecordId) {
            recordData.id = editingRecordId;
            var result = await apiCall('updateInsurance', recordData);

            if (result.success) {
              showAlert('แก้ไขบันทึกประกันภัยสำเร็จ', 'success');
              closeModal();
              loadRecords();
            } else {
              showAlert(typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'), 'error');
            }
          } else {
            var result = await apiCall('createInsurance', recordData);

            if (result.success) {
              showAlert('เพิ่มบันทึกประกันภัยสำเร็จ', 'success');
              closeModal();
              loadRecords();
            } else {
              showAlert(typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'), 'error');
            }
          }
        }
      } catch (error) {
        console.error('Error saving record:', error);
        showAlert(handleError(error), 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '💾 บันทึก';
      }
    }

    function formatDateThai(dateStr) {
      if (!dateStr) return '-';
      try {
        var date = new Date(dateStr + 'T00:00:00');
        var thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
          'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        var day = date.getDate();
        var month = thaiMonths[date.getMonth()];
        var year = date.getFullYear() + 543;
        return day + ' ' + month + ' ' + year;
      } catch (e) {
        return dateStr;
      }
    }

    function showAlert(message, type) {
      var container = document.getElementById('alertContainer');
      var alert = document.createElement('div');
      alert.className = 'alert alert-' + type;
      alert.textContent = message;
      container.innerHTML = '';
      container.appendChild(alert);

      setTimeout(function () {
        alert.remove();
      }, 5000);
    }
  </script>

  <div style="background: var(--color-bg-light); padding: 20px; text-align: center; color: var(--color-text-muted); font-size: 0.9em; margin-top: 20px;">
