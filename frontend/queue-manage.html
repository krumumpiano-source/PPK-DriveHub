<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดคิว - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>
    window.API_BASE_URL = CONFIG.API_BASE_URL;
    window.currentPage = 'queue';
    window.REQUIRE_AUTH = true;
  </script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { }

    .container { };
    var driversMap = {};
    var showSupportAndUnavailableVehicles = false;
    var currentDate = new Date();
    var currentYear = currentDate.getFullYear();
    var currentMonth = currentDate.getMonth();

    var createDateType = 'single';
    var selectedWeekdays = [];
    var pendingCreateData = null;
    var pendingCreateDates = null;

    // Edit queue variables
    var editingQueueId = null;
    var editingQueueData = null;
    var pendingEditData = null;

    var thaiMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

    // Wait for common.js to load
    function waitForCommon() {
      return new Promise(function (resolve) {
        if (typeof apiCall !== 'undefined') {
          resolve();
          return;
        }

        var checkCount = 0;
        var checkInterval = setInterval(function () {
          checkCount++;
          if (typeof apiCall !== 'undefined') {
            clearInterval(checkInterval);
            resolve();
          } else if (checkCount > 50) { // Wait max 5 seconds
            clearInterval(checkInterval);
            console.warn('common.js not loaded after 5 seconds');
            resolve(); // Continue anyway
          }
        }, 100);
      });
    }

    document.addEventListener('DOMContentLoaded', async function () {
      // Wait for common.js to load
      await waitForCommon();

      if (typeof apiCall === 'undefined') {
        console.warn('common.js not loaded! Opening via file:// - showing calendar without data');
        // Still show calendar even without API
        queues = [];
        vehicles = [];
        drivers = [];
        vehiclesMap = {};
        driversMap = {};
        renderCalendar();
        var loadingEl = document.getElementById('loading');
        var containerEl = document.getElementById('calendarContainer');
        if (loadingEl) loadingEl.style.display = 'none';
        if (containerEl) containerEl.style.display = 'block';
        return;
      }

      try {
        if (typeof requireAuth === 'function') {
          var authResult = requireAuth();
          if (!authResult) {
            console.warn('Not authenticated, but continuing to show calendar');
          }
        }
      } catch (e) {
        console.warn('Auth check failed:', e);
      }

      currentUser = getCurrentUser();

      if (currentUser && typeof hasModulePermission === 'function') {
        if (!hasModulePermission('queue', 'edit')) {
          console.warn('No permission, but showing calendar anyway');
        }
      }

      try {
        var today = new Date();
        var dateStr = formatDate(today);
        var createDateEl = document.getElementById('create_date');
        if (createDateEl) createDateEl.value = dateStr;
        var createDateFromEl = document.getElementById('create_date_from');
        if (createDateFromEl) createDateFromEl.value = dateStr;
        var createDateToEl = document.getElementById('create_date_to');
        if (createDateToEl) createDateToEl.value = dateStr;
        var weeklyDateFromEl = document.getElementById('weekly_date_from');
        if (weeklyDateFromEl) weeklyDateFromEl.value = dateStr;
        var nextWeek = new Date(today);
        nextWeek.setDate(nextWeek.getDate() + 7);
        var weeklyDateToEl = document.getElementById('weekly_date_to');
        if (weeklyDateToEl) weeklyDateToEl.value = formatDate(nextWeek);

        var now = new Date();
        var timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        var createTimeStartEl = document.getElementById('create_time_start');
        if (createTimeStartEl) createTimeStartEl.value = timeStr;

        // Event listeners for date range previews
        if (createDateFromEl) createDateFromEl.addEventListener('change', updateDateRangePreview);
        if (createDateToEl) createDateToEl.addEventListener('change', updateDateRangePreview);
        if (weeklyDateFromEl) weeklyDateFromEl.addEventListener('change', updateWeeklyPreview);
        if (weeklyDateToEl) weeklyDateToEl.addEventListener('change', updateWeeklyPreview);
      } catch (e) {
        console.warn('Error setting form defaults:', e);
      }

      loadQueueManagement();
    });

    function formatDate(date) {
      if (!date) return '';
      if (typeof date === 'string') {
        date = new Date(date + 'T00:00:00');
      }
      var year = date.getFullYear();
      var month = String(date.getMonth() + 1).padStart(2, '0');
      var day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    async function loadQueueManagement() {
      try {
        var loadingEl = document.getElementById('loading');
        var containerEl = document.getElementById('calendarContainer');

        if (loadingEl) loadingEl.style.display = 'block';
        if (containerEl) containerEl.style.display = 'none';

        renderCalendar();
        if (loadingEl) loadingEl.style.display = 'none';
        if (containerEl) containerEl.style.display = 'block';

        try {
          await loadVehicles();
        } catch (e) {
          console.warn('Error loading vehicles:', e);
        }

        try {
          await loadDrivers();
        } catch (e) {
          console.warn('Error loading drivers:', e);
        }

        await loadQueues();

      } catch (error) {
        console.error('Error loading queue management:', error);
        // Still show calendar even on error
        queues = [];
        renderCalendar();
        var loadingEl = document.getElementById('loading');
        var containerEl = document.getElementById('calendarContainer');
        if (loadingEl) loadingEl.style.display = 'none';
        if (containerEl) containerEl.style.display = 'block';
      }
    }

    function formatDateThai(dateStr) {
      if (!dateStr) return '';
      try {
        var date = new Date(dateStr + 'T00:00:00');
        var thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
          'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        var day = date.getDate();
        var month = thaiMonths[date.getMonth()];
        return day + ' ' + month;
      } catch (e) {
        return dateStr;
      }
    }

    function includeVehicleInQueueList(vehicle) {
      if (vehicle.active === false || vehicle.status === 'repair') return false;
      if (showSupportAndUnavailableVehicles) {
        return vehicle.status === 'unavailable' ||
          (vehicle.status === 'available' && (vehicle.vehicle_category === 'primary' || vehicle.vehicle_category === 'support'));
      }
      return vehicle.vehicle_category === 'primary' && vehicle.status === 'available';
    }

    function populateCarSelects() {
      var createSelect = document.getElementById('create_car_id');
      var editSelect = document.getElementById('edit_car_id');
      if (!createSelect || !editSelect) return;
      createSelect.innerHTML = '';
      editSelect.innerHTML = '';
      var o1 = document.createElement('option');
      o1.value = '';
      o1.textContent = '-- เลือกรถ --';
      createSelect.appendChild(o1);
      var o2 = document.createElement('option');
      o2.value = '';
      o2.textContent = '-- เลือกรถ --';
      editSelect.appendChild(o2);
      var editCarIdToInclude = (editingQueueData && editingQueueData.car_id) ? editingQueueData.car_id : null;
      vehicles.forEach(function (vehicle) {
        var includeCreate = includeVehicleInQueueList(vehicle);
        var includeEdit = includeCreate || (editCarIdToInclude === vehicle.car_id);
        if (!includeCreate && !includeEdit) return;
        var displayText = vehicle.license_plate + ' - ' + (vehicle.brand || '') + ' ' + (vehicle.model || '');
        if (vehicle.seat_count) displayText += ' (' + vehicle.seat_count + ' ที่นั่ง)';
        var cat = vehicle.vehicle_category || 'primary';
        var st = vehicle.status || 'available';
        if (cat === 'support') displayText += ' [รถสนับสนุน]';
        if (st === 'unavailable') displayText += ' [ยกเลิกใช้]';
        if (includeCreate) {
          var opt1 = document.createElement('option');
          opt1.value = vehicle.car_id;
          opt1.textContent = displayText;
          opt1.setAttribute('data-seat-count', vehicle.seat_count || '');
          opt1.setAttribute('data-vehicle-category', cat);
          opt1.setAttribute('data-status', st);
          createSelect.appendChild(opt1);
        }
        if (includeEdit) {
          var opt2 = document.createElement('option');
          opt2.value = vehicle.car_id;
          opt2.textContent = displayText;
          opt2.setAttribute('data-seat-count', vehicle.seat_count || '');
          opt2.setAttribute('data-vehicle-category', cat);
          opt2.setAttribute('data-status', st);
          editSelect.appendChild(opt2);
        }
      });
      updateCarWarning('create_car_id', 'createCarWarning');
      updateCarWarning('edit_car_id', 'editCarWarning');
    }

    function toggleShowAllVehicles() {
      var cb = document.getElementById('create_show_all_vehicles');
      var cbEdit = document.getElementById('edit_show_all_vehicles');
      showSupportAndUnavailableVehicles = cb ? cb.checked : false;
      if (cbEdit) cbEdit.checked = showSupportAndUnavailableVehicles;
      populateCarSelects();
    }

    function updateCarWarning(selectId, warningDivId) {
      var sel = document.getElementById(selectId);
      var div = document.getElementById(warningDivId);
      if (!sel || !div) return;
      var opt = sel.options[sel.selectedIndex];
      if (!opt || !opt.value) {
        div.style.display = 'none';
        div.textContent = '';
        return;
      }
      var cat = opt.getAttribute('data-vehicle-category');
      var st = opt.getAttribute('data-status');
      if (st === 'unavailable') {
        div.style.display = 'block';
        div.textContent = '⚠️ คุณกำลังเลือกรถที่ยกเลิกการใช้งาน กรุณาตรวจสอบความจำเป็นก่อนบันทึก';
      } else if (cat === 'support') {
        div.style.display = 'block';
        div.textContent = '⚠️ คุณกำลังเลือกรถใช้งานสนับสนุน กรุณาตรวจสอบความจำเป็นก่อนบันทึก';
      } else {
        div.style.display = 'none';
        div.textContent = '';
      }
    }

    async function loadVehicles() {
      try {
        var result = await apiCall('getVehicles', {});
        if (result.success && result.data && result.data.vehicles) {
          vehicles = result.data.vehicles || [];
          vehiclesMap = {};
          vehicles.forEach(function (v) {
            vehiclesMap[v.car_id] = v;
          });
          var cb = document.getElementById('create_show_all_vehicles');
          var cbEdit = document.getElementById('edit_show_all_vehicles');
          if (cb) cb.checked = false;
          if (cbEdit) cbEdit.checked = false;
          showSupportAndUnavailableVehicles = false;
          populateCarSelects();
        }
      } catch (error) {
        console.error('Error loading vehicles:', error);
      }
    }

    async function loadDrivers() {
      try {
        var result = await apiCall('getDrivers', { status: 'active' });
        if (result.success && result.data && result.data.drivers) {
          drivers = result.data.drivers || [];
          drivers.forEach(function (d) {
            driversMap[d.driver_id] = d;
          });

          // Populate create select
          var createSelect = document.getElementById('create_driver_id');
          if (!createSelect) return;
          drivers.forEach(function (driver) {
            var option = document.createElement('option');
            option.value = driver.driver_id;
            option.textContent = driver.full_name || (driver.first_name + ' ' + driver.last_name);
            createSelect.appendChild(option);
          });

          // Populate edit select
          var editSelect = document.getElementById('edit_driver_id');
          drivers.forEach(function (driver) {
            var option = document.createElement('option');
            option.value = driver.driver_id;
            option.textContent = driver.full_name || (driver.first_name + ' ' + driver.last_name);
            editSelect.appendChild(option);
          });
        }
      } catch (error) {
        console.error('Error loading drivers:', error);
      }
    }

    async function loadQueues() {
      try {
        if (typeof apiCall === 'undefined') {
          queues = [];
          vehicles = [];
          drivers = [];
          vehiclesMap = {};
          driversMap = {};
          renderCalendar();
          var loadingEl = document.getElementById('loading');
          var containerEl = document.getElementById('calendarContainer');
          if (loadingEl) loadingEl.style.display = 'none';
          if (containerEl) containerEl.style.display = 'block';
          return;
        }

        var startDate = new Date(currentYear, currentMonth, 1);
        var endDate = new Date(currentYear, currentMonth + 1, 0);
        startDate.setDate(startDate.getDate() - 7);
        endDate.setDate(endDate.getDate() + 7);

        var filters = {
          date_from: formatDate(startDate),
          date_to: formatDate(endDate)
        };

        var result = await apiCall('getQueue', { date_from: filters.date_from, date_to: filters.date_to });

        if (result && result.success && result.data) {
          queues = Array.isArray(result.data) ? result.data : [];
        } else {
          queues = [];
        }

        // Always render calendar, even if no queues
        renderCalendar();

      } catch (error) {
        console.error('Error loading queues:', error);
        queues = [];
        // Still render calendar on error
        renderCalendar();
      } finally {
        var loadingEl = document.getElementById('loading');
        var containerEl = document.getElementById('calendarContainer');
        if (loadingEl) loadingEl.style.display = 'none';
        if (containerEl) containerEl.style.display = 'block';
      }
    }

    function renderCalendar() {
      var grid = document.getElementById('calendarGrid');
      if (!grid) {
        console.error('calendarGrid element not found!');
        return;
      }

      var firstDay = new Date(currentYear, currentMonth, 1);
      var lastDay = new Date(currentYear, currentMonth + 1, 0);
      var firstDayOfWeek = firstDay.getDay();
      var daysInMonth = lastDay.getDate();

      var monthYearEl = document.getElementById('monthYear');
      if (monthYearEl) {
        monthYearEl.textContent = thaiMonths[currentMonth] + ' ' + (currentYear + 543);
      }

      var html = '';

      // Day headers
      var dayHeaders = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
      dayHeaders.forEach(function (day) {
        html += '<div class="calendar-day-header">' + day + '</div>';
      });

      // Empty cells for days before month starts
      var lastDayOfPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
      for (var i = 0; i < firstDayOfWeek; i++) {
        var dayNum = lastDayOfPrevMonth - firstDayOfWeek + 1 + i;
        html += '<div class="calendar-day other-month"><div class="calendar-day-number">' + dayNum + '</div></div>';
      }

      // Days of the month
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var todayStr = formatDate(today);
      var now = new Date();
      var currentTimeMinutes = now.getHours() * 60 + now.getMinutes();

      function parseTimeToMinutes(timeStr) {
        if (!timeStr) return null;
        var parts = timeStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
      }

      function isQueueCurrent(queue, dateStr) {
        if (dateStr !== todayStr) return false;
        if (queue.status === 'active' || queue.status === 'running') return true;
        if (!queue.departure_time) return false;

        var queueStart = parseTimeToMinutes(queue.departure_time);
        var queueEnd = queue.return_time ? parseTimeToMinutes(queue.return_time) : (queueStart + 8 * 60);

        return currentTimeMinutes >= queueStart && currentTimeMinutes <= queueEnd;
      }

      function isQueueUpcoming(queue, dateStr) {
        if (dateStr !== todayStr) return false;
        if (queue.status === 'cancelled' || queue.status === 'completed') return false;
        if (!queue.departure_time) return false;

        var queueStart = parseTimeToMinutes(queue.departure_time);

      for (var day = 1; day <= daysInMonth; day++) {
        var dateStr = formatDate(new Date(currentYear, currentMonth, day));
        var dateObj = new Date(currentYear, currentMonth, day);
        dateObj.setHours(0, 0, 0, 0);
        var isToday = dateStr === todayStr;
        var dayQueues = queues.filter(function (q) { return q.departure_date === dateStr; });

        // Determine status class
        var statusClass = '';
        if (isToday) {
          statusClass = 'today';
        } else if (dateObj < today) {
          statusClass = 'queue-past';
        } else {
          // Future date - check queue status
          var hasCurrent = false;
          var hasUpcoming = false;
          var hasPast = false;

          dayQueues.forEach(function (queue) {
            if (isQueueCurrent(queue, dateStr)) {
              hasCurrent = true;
            } else if (isQueueUpcoming(queue, dateStr)) {
              hasUpcoming = true;
            } else if (queue.status === 'done' || queue.status === 'cancel') {
              hasPast = true;
            }
          });

          if (hasCurrent) {
            statusClass = 'queue-current';
          } else if (hasUpcoming) {
            statusClass = 'queue-upcoming';
          } else if (hasPast) {
            statusClass = 'queue-past';
          } else {
            statusClass = 'queue-future';
          }
        }

        html += '<div class="calendar-day ' + statusClass + '">';
        html += '<div class="calendar-day-number">' + day + '</div>';

        dayQueues.forEach(function (queue) {
          var vehicle = vehiclesMap[queue.car_id];
          var driver = driversMap[queue.driver_id];
          var licensePlate = vehicle ? vehicle.license_plate : (queue.car_id ? queue.car_id.substring(0, 8) : '-');
          var driverName = driver ? (driver.full_name || driver.first_name + ' ' + driver.last_name) : (queue.driver_name || '-');

          html += '<div class="queue-item" onclick="openEditModal(\'' + queue.id + '\'); event.stopPropagation();">';
          html += '<span class="queue-plate">' + licensePlate + '</span> ' + driverName;
          html += '</div>';
        });

        html += '</div>';
      }

      // Empty cells for days after month ends
      var remainingCells = 42 - (firstDayOfWeek + daysInMonth);
      for (var i = 1; i <= remainingCells && remainingCells < 7; i++) {
        html += '<div class="calendar-day other-month"><div class="calendar-day-number">' + i + '</div></div>';
      }

      grid.innerHTML = html;

      // Ensure calendar container is visible
      var containerEl = document.getElementById('calendarContainer');
      if (containerEl) {
        containerEl.style.display = 'block';
      }
    }

    function parseTime(timeStr) {
      if (!timeStr) return 0;
      var parts = timeStr.split(':');
      return parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      } else if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      loadQueues();
    }

    function goToToday() {
      var today = new Date();
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();
      loadQueues();
    }

    function openCreateModal() {
      document.getElementById('createModal').classList.add('show');
      resetCreateForm();
    }

    function closeCreateModal() {
      document.getElementById('createModal').classList.remove('show');
      resetCreateForm();
    }

    function resetCreateForm() {
      createDateType = 'single';
      selectedWeekdays = [];
      document.querySelectorAll('.date-type-btn').forEach(function (btn, idx) {
        if (idx === 0) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      document.getElementById('singleDateGroup').style.display = 'block';
      document.getElementById('dateRangeGroup').style.display = 'none';
      document.getElementById('weeklyGroup').style.display = 'none';
      document.querySelectorAll('.weekday-btn').forEach(function (btn) {
        btn.classList.remove('selected');
      });
      document.getElementById('createQueueForm').reset();
      var today = new Date();
      var dateStr = formatDate(today);
      document.getElementById('create_date').value = dateStr;
      document.getElementById('create_date_from').value = dateStr;
      document.getElementById('create_date_to').value = dateStr;
      document.getElementById('weekly_date_from').value = dateStr;
      var nextWeek = new Date(today);
      nextWeek.setDate(nextWeek.getDate() + 7);
      document.getElementById('weekly_date_to').value = formatDate(nextWeek);
      var now = new Date();
      var timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
      document.getElementById('create_time_start').value = timeStr;
      document.getElementById('createProgressContainer').style.display = 'none';
      document.getElementById('createPassengerWarning').style.display = 'none';
    }

    function setDateType(type) {
      createDateType = type;
      document.querySelectorAll('.date-type-btn').forEach(function (btn) {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      document.getElementById('singleDateGroup').style.display = type === 'single' ? 'block' : 'none';
      document.getElementById('dateRangeGroup').style.display = type === 'range' ? 'block' : 'none';
      document.getElementById('weeklyGroup').style.display = type === 'weekly' ? 'block' : 'none';
      if (type === 'range') {
        updateDateRangePreview();
      } else if (type === 'weekly') {
        updateWeeklyPreview();
      }
    }

    function toggleWeekday(day) {
      var btn = document.querySelector('.weekday-btn[data-day="' + day + '"]');
      var index = selectedWeekdays.indexOf(day);
      if (index === -1) {
        selectedWeekdays.push(day);
        btn.classList.add('selected');
      } else {
        selectedWeekdays.splice(index, 1);
        btn.classList.remove('selected');
      }
      updateWeeklyPreview();
    }

    function getDatesInRange(from, to) {
      var dates = [];
      var start = new Date(from + 'T00:00:00');
      var end = new Date(to + 'T00:00:00');
      for (var d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        dates.push(formatDate(new Date(d)));
      }
      return dates;
    }

    function getWeeklyDates(from, to, weekdays) {
      var dates = [];
      var start = new Date(from + 'T00:00:00');
      var end = new Date(to + 'T00:00:00');
      for (var d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        var dayOfWeek = d.getDay();
        if (weekdays.indexOf(dayOfWeek) !== -1) {
          dates.push(formatDate(new Date(d)));
        }
      }
      return dates;
    }

    function updateDateRangePreview() {
      var from = document.getElementById('create_date_from').value;
      var to = document.getElementById('create_date_to').value;
      var preview = document.getElementById('dateRangePreview');
      if (!from || !to) {
        preview.style.display = 'none';
        return;
      }
      var dates = getDatesInRange(from, to);
      if (dates.length === 0) {
        preview.style.display = 'none';
        return;
      }
      preview.innerHTML = '<strong>จะสร้างคิวทั้งหมด ' + dates.length + ' วัน:</strong><br>';
      dates.forEach(function (date) {
        var tag = document.createElement('span');
        tag.className = 'date-tag';
        tag.textContent = formatDateThai(date);
        preview.appendChild(tag);
      });
      preview.style.display = 'block';
    }

    function updateWeeklyPreview() {
      var from = document.getElementById('weekly_date_from').value;
      var to = document.getElementById('weekly_date_to').value;
      var preview = document.getElementById('weeklyPreview');
      if (!from || !to || selectedWeekdays.length === 0) {
        preview.style.display = 'none';
        return;
      }
      var dates = getWeeklyDates(from, to, selectedWeekdays);
      if (dates.length === 0) {
        preview.style.display = 'none';
        return;
      }
      preview.innerHTML = '<strong>จะสร้างคิวทั้งหมด ' + dates.length + ' วัน:</strong><br>';
      dates.forEach(function (date) {
        var tag = document.createElement('span');
        tag.className = 'date-tag';
        tag.textContent = formatDateThai(date);
        preview.appendChild(tag);
      });
      preview.style.display = 'block';
    }

    function checkCreatePassengerCount() {
      var carSelect = document.getElementById('create_car_id');
      var passengerInput = document.getElementById('create_passenger_count');
      var warningDiv = document.getElementById('createPassengerWarning');
      var passengerCount = parseInt(passengerInput.value) || 0;

      if (carSelect.selectedIndex > 0 && passengerCount > 0) {
        var selectedOption = carSelect.options[carSelect.selectedIndex];
        var seatCount = parseInt(selectedOption.getAttribute('data-seat-count')) || 0;
        if (seatCount > 0 && passengerCount > seatCount) {
          warningDiv.textContent = '⚠️ จำนวนผู้โดยสาร (' + passengerCount + ') เกินจำนวนที่นั่งรถ (' + seatCount + ')';
          warningDiv.style.display = 'block';
        } else {
          warningDiv.style.display = 'none';
        }
      } else {
        warningDiv.style.display = 'none';
      }
    }

    function getSelectedDates() {
      var dates = [];
      if (createDateType === 'single') {
        var date = document.getElementById('create_date').value;
        if (date) dates.push(date);
      } else if (createDateType === 'range') {
        var from = document.getElementById('create_date_from').value;
        var to = document.getElementById('create_date_to').value;
        if (from && to) {
          dates = getDatesInRange(from, to);
        }
      } else if (createDateType === 'weekly') {
        var from = document.getElementById('weekly_date_from').value;
        var to = document.getElementById('weekly_date_to').value;
        if (from && to && selectedWeekdays.length > 0) {
          dates = getWeeklyDates(from, to, selectedWeekdays);
        }
      }
      return dates;
    }

    async function handleCreateSubmit(event) {
      event.preventDefault();

      var dates = getSelectedDates();
      if (dates.length === 0) {
        showAlert('กรุณาเลือกวันที่', 'error');
        return;
      }

      var time_start = document.getElementById('create_time_start').value;
      var time_end = document.getElementById('create_time_end').value || '';
      var car_id = document.getElementById('create_car_id').value;
      var driver_id = document.getElementById('create_driver_id').value;
      var mission = document.getElementById('create_mission').value.trim();
      var requested_by = document.getElementById('create_requested_by').value.trim();
      var passenger_count = document.getElementById('create_passenger_count').value;
      var destination = document.getElementById('create_destination').value.trim();

      if (!time_start || !car_id || !driver_id || !mission || !requested_by || !passenger_count || !destination) {
        showAlert('กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน', 'error');
        return;
      }

      var formData = {
        departure_time: time_start,
        return_time: time_end,
        car_id: car_id,
        driver_id: driver_id,
        purpose: mission,
        destination: destination,
        requester_name: requested_by,
        passenger_count: parseInt(passenger_count) || 0,
        notes: document.getElementById('create_notes').value.trim() || '',
        allow_flexible: false,
        emergency_override: false
      };

      var allConflicts = [];
      var allPassengerWarnings = [];

      for (var i = 0; i < dates.length; i++) {
        var date = dates[i];
        var queueData = Object.assign({}, formData, { date: date });
        var conflictCheck = await checkQueueConflicts(queueData);

        if (conflictCheck.hasConflict) {
          conflictCheck.conflicts.forEach(function (conflict) {
            allConflicts.push(formatDateThai(date) + ': ' + conflict);
          });
        }

        if (conflictCheck.passengerWarnings && conflictCheck.passengerWarnings.length > 0) {
          conflictCheck.passengerWarnings.forEach(function (warning) {
            allPassengerWarnings.push(formatDateThai(date) + ': ' + warning);
          });
        }
      }

      if (allConflicts.length > 0 || allPassengerWarnings.length > 0) {
        var conflictDetails = document.getElementById('conflictDetails');
        conflictDetails.innerHTML = '';
        document.getElementById('conflictTitle').textContent = 'พบคิวที่ซ้อนทับกับคิวที่คุณต้องการสร้าง:';

        if (allConflicts.length > 0) {
          conflictDetails.innerHTML += '<strong>คิวซ้อนทับ:</strong><ul style="margin: 10px 0; padding-left: 20px;">';
          allConflicts.forEach(function (conflict) {
            conflictDetails.innerHTML += '<li>' + conflict + '</li>';
          });
          conflictDetails.innerHTML += '</ul>';
        }

        if (allPassengerWarnings.length > 0) {
          conflictDetails.innerHTML += '<strong style="color: var(--color-warning);">⚠️ คำเตือน:</strong><ul style="margin: 10px 0; padding-left: 20px; color: var(--color-warning);">';
          allPassengerWarnings.forEach(function (warning) {
            conflictDetails.innerHTML += '<li>' + warning + '</li>';
          });
          conflictDetails.innerHTML += '</ul>';
        }

        pendingCreateData = formData;
        pendingCreateDates = dates;
        document.getElementById('createSubmitBtn').disabled = true;
        document.getElementById('conflictModal').classList.add('show');
        return;
      }

      createQueues(dates, formData);
    }

    async function checkQueueConflicts(queueData) {
      try {
        var carResult = await apiCall('getQueue', {
          date_from: queueData.departure_date,
          date_to: queueData.departure_date
        });

        var driverResult = await apiCall('getQueue', {
          date_from: queueData.departure_date,
          date_to: queueData.departure_date
        });

        var existingQueues = [];
        if (carResult.success && carResult.data) {
          existingQueues = existingQueues.concat(Array.isArray(carResult.data) ? carResult.data : []);
        }
        if (driverResult.success && driverResult.data) {
          existingQueues = existingQueues.concat(Array.isArray(driverResult.data) ? driverResult.data : []);
        }

        var seen = {};
        existingQueues = existingQueues.filter(function (q) {
          if (seen[q.id]) return false;
          if (editingQueueId && q.id === editingQueueId) return false;
          seen[q.id] = true;
          return q.status !== 'cancelled' && q.status !== 'completed';
        });

        var queueTimeStart = parseTime(queueData.departure_time);
        var queueTimeEnd = queueData.return_time ? parseTime(queueData.return_time) : null;

        var conflicts = [];
        var seenConflicts = {};

        existingQueues.forEach(function (q) {
          var qTimeStart = parseTime(q.departure_time);
          var qTimeEnd = q.return_time ? parseTime(q.return_time) : null;

          if (isTimeOverlap(queueTimeStart, queueTimeEnd, qTimeStart, qTimeEnd)) {
            var conflictKey = '';
            var conflictMsg = '';

            if (q.car_id === queueData.car_id) {
              conflictKey = 'car_' + q.id;
              conflictMsg = 'รถนี้มีคิวในช่วงเวลา ' + q.departure_time + (q.return_time ? '-' + q.return_time : '');
            }
            if (q.driver_id === queueData.driver_id) {
              conflictKey = 'driver_' + q.id;
              conflictMsg = 'คนขับนี้มีคิวในช่วงเวลา ' + q.departure_time + (q.return_time ? '-' + q.return_time : '');
            }

            if (conflictMsg && !seenConflicts[conflictKey]) {
              conflicts.push(conflictMsg);
              seenConflicts[conflictKey] = true;
            }
          }
        });

        var passengerWarnings = [];
        if (queueData.car_id && queueData.passenger_count) {
          var vehicle = vehicles.find(function (v) { return v.car_id === queueData.car_id; });
          if (vehicle && vehicle.seat_count) {
            var seatCount = parseInt(vehicle.seat_count) || 0;
            var passengerCount = parseInt(queueData.passenger_count) || 0;
            if (passengerCount > seatCount) {
              passengerWarnings.push('จำนวนผู้โดยสาร (' + passengerCount + ' คน) เกินจำนวนที่นั่งรถ (' + seatCount + ' ที่นั่ง)');
            }
          }
        }

        return {
          hasConflict: conflicts.length > 0,
          conflicts: conflicts,
          passengerWarnings: passengerWarnings
        };
      } catch (error) {
        console.error('Error checking conflicts:', error);
        return { hasConflict: false, conflicts: [], passengerWarnings: [] };
      }
    }

    function parseTime(timeStr) {
      if (!timeStr) return null;
      var parts = timeStr.split(':');
      var date = new Date();
      date.setHours(parseInt(parts[0]));
      date.setMinutes(parseInt(parts[1] || 0));
      date.setSeconds(0);
      date.setMilliseconds(0);
      return date;
    }

    function isTimeOverlap(start1, end1, start2, end2) {
      if (!start1 || !start2) return false;
      if (!end1) {
        end1 = new Date(start1);
        end1.setHours(end1.getHours() + 8);
      }
      if (!end2) {
        end2 = new Date(start2);
        end2.setHours(end2.getHours() + 8);
      }
      return start1 < end2 && start2 < end1;
    }

    function closeConflictModal() {
      document.getElementById('conflictModal').classList.remove('show');
      document.getElementById('modal_allow_flexible').checked = false;
      document.getElementById('modal_emergency_override').checked = false;
      pendingCreateData = null;
      pendingCreateDates = null;
      pendingEditData = null;
      if (document.getElementById('createSubmitBtn')) {
        document.getElementById('createSubmitBtn').disabled = false;
      }
      if (document.getElementById('editSubmitBtn')) {
        document.getElementById('editSubmitBtn').disabled = false;
      }
    }

    function confirmWithOptions() {
      if (pendingCreateData && pendingCreateDates) {
        var allowFlexible = document.getElementById('modal_allow_flexible').checked;
        var emergencyOverride = document.getElementById('modal_emergency_override').checked;
        pendingCreateData.allow_flexible = allowFlexible;
        pendingCreateData.emergency_override = emergencyOverride;
        closeConflictModal();
        createQueues(pendingCreateDates, pendingCreateData);
      } else if (pendingEditData) {
        var allowFlexible = document.getElementById('modal_allow_flexible').checked;
        var emergencyOverride = document.getElementById('modal_emergency_override').checked;
        pendingEditData.allow_flexible = allowFlexible;
        pendingEditData.emergency_override = emergencyOverride;
        closeConflictModal();
        updateQueue(pendingEditData);
      }
    }

    async function createQueues(dates, formData) {
      document.getElementById('createProgressContainer').style.display = 'block';
      var submitBtn = document.getElementById('createSubmitBtn');
      submitBtn.disabled = true;

      var successCount = 0;
      var failCount = 0;
      var total = dates.length;

      for (var i = 0; i < dates.length; i++) {
        var date = dates[i];
        var progress = ((i + 1) / total) * 100;
        document.getElementById('createProgressFill').style.width = progress + '%';
        document.getElementById('createProgressText').textContent = 'กำลังสร้างคิววันที่ ' + formatDateThai(date) + ' (' + (i + 1) + '/' + total + ')';

        try {
          var queueData = Object.assign({}, formData, { departure_date: date });
          var result = await apiCall('createQueue', queueData);

          if (result.success) {
            successCount++;
          } else {
            failCount++;
            console.error('Failed to create queue for ' + date + ': ' + result.message);
          }
        } catch (error) {
          failCount++;
          console.error('Error creating queue for ' + date + ':', error);
        }

        if (i < dates.length - 1) {
          await new Promise(resolve => setTimeout(resolve, 200));
        }
      }

      if (successCount === total) {
        showAlert('สร้างคิวสำเร็จทั้งหมด ' + successCount + ' คิว', 'success');
        closeCreateModal();
        loadQueues();
      } else if (successCount > 0) {
        showAlert('สร้างคิวสำเร็จ ' + successCount + ' คิว, ล้มเหลว ' + failCount + ' คิว', 'warning');
        submitBtn.disabled = false;
      } else {
        showAlert('ไม่สามารถสร้างคิวได้ กรุณาตรวจสอบข้อมูลอีกครั้ง', 'error');
        submitBtn.disabled = false;
      }

      document.getElementById('createProgressContainer').style.display = 'none';
    }

    // Edit Queue Functions
    async function openEditModal(queueId) {
      editingQueueId = queueId;

      try {
        var result = await apiCall('getQueueItem', { id: queueId });

        if (result.success && result.data) {
          editingQueueData = result.data;

          var frozen = editingQueueData.status === 'frozen';
          var status = editingQueueData.status || 'pending';

          var vehicle = vehiclesMap[editingQueueData.car_id];
          var driver = driversMap[editingQueueData.driver_id];
          var vehicleName = vehicle ? (vehicle.license_plate + ' - ' + (vehicle.brand || '') + ' ' + (vehicle.model || '')) : editingQueueData.car_id;
          var driverName = driver ? (driver.full_name || driver.first_name + ' ' + driver.last_name) : editingQueueData.driver_id;

          var infoHtml = '<strong>ข้อมูลคิว:</strong><br>';
          infoHtml += 'รถ: ' + vehicleName + '<br>';
          infoHtml += 'คนขับ: ' + driverName + '<br>';
          infoHtml += 'สถานะ: ' + getStatusText(status);
          if (frozen) infoHtml += ' (Freeze)';
          document.getElementById('editQueueInfo').innerHTML = infoHtml;
          document.getElementById('editQueueInfo').style.display = 'block';

          if (frozen || status === 'active' || status === 'completed') {
            showAlert('⚠️ คิวนี้ถูก Freeze หรือเริ่มใช้งานแล้ว ไม่สามารถแก้ไขได้', 'warning');
            setTimeout(function () {
              closeEditModal();
            }, 2000);
            return;
          }

          document.getElementById('edit_date').value = editingQueueData.departure_date || '';
          document.getElementById('edit_time_start').value = editingQueueData.departure_time || '';
          document.getElementById('edit_time_end').value = editingQueueData.return_time || '';
          document.getElementById('edit_car_id').value = editingQueueData.car_id || '';
          document.getElementById('edit_driver_id').value = editingQueueData.driver_id || '';
          document.getElementById('edit_mission').value = editingQueueData.mission || '';
          document.getElementById('edit_destination').value = editingQueueData.destination || '';
          document.getElementById('edit_requested_by').value = editingQueueData.requested_by || '';
          document.getElementById('edit_passenger_count').value = editingQueueData.passenger_count || '';
          document.getElementById('edit_notes').value = editingQueueData.notes || '';

          setTimeout(function () {
            checkEditPassengerCount();
          }, 500);

          document.getElementById('editModal').classList.add('show');
        } else {
          showAlert('ไม่พบข้อมูลคิว', 'error');
        }
      } catch (error) {
        showAlert(handleError(error), 'error');
      }
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
      editingQueueId = null;
      editingQueueData = null;
      document.getElementById('editQueueForm').reset();
      document.getElementById('editPassengerWarning').style.display = 'none';
    }

    function checkEditPassengerCount() {
      var carSelect = document.getElementById('edit_car_id');
      var passengerInput = document.getElementById('edit_passenger_count');
      var warningDiv = document.getElementById('editPassengerWarning');
      var passengerCount = parseInt(passengerInput.value) || 0;

      if (carSelect.selectedIndex > 0 && passengerCount > 0) {
        var selectedOption = carSelect.options[carSelect.selectedIndex];
        var seatCount = parseInt(selectedOption.getAttribute('data-seat-count')) || 0;
        if (seatCount > 0 && passengerCount > seatCount) {
          warningDiv.textContent = '⚠️ จำนวนผู้โดยสาร (' + passengerCount + ') เกินจำนวนที่นั่งรถ (' + seatCount + ')';
          warningDiv.style.display = 'block';
        } else {
          warningDiv.style.display = 'none';
        }
      } else {
        warningDiv.style.display = 'none';
      }
    }

    function getStatusText(status) {
      var statusMap = {
        'pending': 'รอออก',
        'active': 'กำลังใช้งาน',
        'completed': 'เสร็จสิ้น',
        'cancelled': 'ยกเลิก',
        'frozen': 'ระงับ'
      };
      return statusMap[status] || status;
    }

    async function handleEditSubmit(event) {
      event.preventDefault();

      var time_start = document.getElementById('edit_time_start').value;
      var time_end = document.getElementById('edit_time_end').value || '';
      var car_id = document.getElementById('edit_car_id').value;
      var driver_id = document.getElementById('edit_driver_id').value;
      var mission = document.getElementById('edit_mission').value.trim();
      var requested_by = document.getElementById('edit_requested_by').value.trim();
      var passenger_count = document.getElementById('edit_passenger_count').value;
      var destination = document.getElementById('edit_destination').value.trim();
      var date = document.getElementById('edit_date').value;

      if (!date || !time_start || !car_id || !driver_id || !mission || !requested_by || !passenger_count || !destination) {
        showAlert('กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน', 'error');
        return;
      }

      var formData = {
        departure_date: date,
        departure_time: time_start,
        return_time: time_end,
        car_id: car_id,
        driver_id: driver_id,
        purpose: mission,
        destination: destination,
        requester_name: requested_by,
        passenger_count: parseInt(passenger_count) || 0,
        notes: document.getElementById('edit_notes').value.trim() || '',
        allow_flexible: false,
        emergency_override: false
      };

      var conflictCheck = await checkQueueConflicts(formData);

      if (conflictCheck.hasConflict || conflictCheck.passengerWarnings.length > 0) {
        var conflictDetails = document.getElementById('conflictDetails');
        conflictDetails.innerHTML = '';
        document.getElementById('conflictTitle').textContent = 'พบคิวที่ซ้อนทับกับคิวที่คุณต้องการแก้ไข:';

        if (conflictCheck.hasConflict) {
          conflictDetails.innerHTML += '<strong>คิวซ้อนทับ:</strong><ul style="margin: 10px 0; padding-left: 20px;">';
          conflictCheck.conflicts.forEach(function (conflict) {
            conflictDetails.innerHTML += '<li>' + conflict + '</li>';
          });
          conflictDetails.innerHTML += '</ul>';
        }

        if (conflictCheck.passengerWarnings.length > 0) {
          conflictDetails.innerHTML += '<strong style="color: var(--color-warning);">⚠️ คำเตือน:</strong><ul style="margin: 10px 0; padding-left: 20px; color: var(--color-warning);">';
          conflictCheck.passengerWarnings.forEach(function (warning) {
            conflictDetails.innerHTML += '<li>' + warning + '</li>';
          });
          conflictDetails.innerHTML += '</ul>';
        }

        pendingEditData = formData;
        document.getElementById('editSubmitBtn').disabled = true;
        document.getElementById('conflictModal').classList.add('show');
        return;
      }

      updateQueue(formData);
    }

    async function updateQueue(formData) {
      var submitBtn = document.getElementById('editSubmitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'กำลังบันทึก...';

      try {
        var result = await apiCall('updateQueue', Object.assign({ id: editingQueueId }, formData));

        if (result.success) {
          showAlert('✅ แก้ไขคิวสำเร็จ', 'success');
          closeEditModal();
          loadQueues();
        } else {
          showAlert(typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'แก้ไขคิวไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'), 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = '💾 บันทึกการแก้ไข';
        }
      } catch (error) {
        showAlert(handleError(error), 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = '💾 บันทึกการแก้ไข';
      }
    }

    // Delete Queue Function
    async function deleteQueue(queueId) {
      if (!confirm('คุณต้องการลบคิวนี้หรือไม่?\n\nการลบคิวจะไม่สามารถกู้คืนได้')) {
        return;
      }

      var reason = prompt('กรุณาระบุเหตุผลในการลบ:');
      if (!reason) {
        return;
      }

      try {
        var result = await apiCall('cancelQueue', {
          id: queueId,
          reason: reason
        });

        if (result.success) {
          showAlert('✅ ลบคิวสำเร็จ', 'success');
          loadQueues();
        } else {
          showAlert(typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'ลบคิวไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'), 'error');
        }
      } catch (error) {
        showAlert(handleError(error), 'error');
      }
    }

    function showAlert(message, type) {
      var container = document.getElementById('alertContainer');
      var alert = document.createElement('div');
      alert.className = 'alert alert-' + type;
      alert.textContent = message;
      container.innerHTML = '';
      container.appendChild(alert);
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(function () {
        alert.remove();
      }, 5000);
    }
  </script>
