<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPK DriveHub</title>
    <script src="config.js"></script>
    <script>window.API_BASE_URL = CONFIG.API_BASE_URL;</script>
    <script src="js/api.js"></script>
    <script>
        (async function() {
            try {
                var res = await API.get('/api/setup');
                if (res.success && res.data && res.data.needs_setup) {
                    window.location.href = 'setup.html';
                    return;
                }
            } catch(e) { /* ignore — proceed to auth check */ }
            var token = API.getToken();
            if (token) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'login.html';
            }
        })();
    </script>
</head>

<body>
    <p>Redirecting...</p>
</body>

</html>
