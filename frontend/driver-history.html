<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คิวและประวัติการปฏิบัติงาน - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>window.API_BASE_URL = CONFIG.API_BASE_URL; window.currentPage = 'driver-history'; window.REQUIRE_AUTH = true;</script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background: var(--gradient-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-container);
      overflow: hidden;
    }

    .header {
      background: var(--gradient-primary);
      color: white;
      padding: 25px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8em;
      margin-bottom: 8px;
    }

    .content {
      padding: 25px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      border-bottom: 2px solid #e9ecef;
      overflow-x: auto;
    }

    .tab {
      padding: 12px 24px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      font-size: 1em;
      font-weight: 600;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
    }

    .tab:hover {
      color: var(--color-primary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Calendar Styles */
    .calendar-container {
      margin-bottom: 30px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .calendar-nav {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .calendar-nav-btn {
      padding: 8px 16px;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 1em;
      font-weight: 600;
      transition: all 0.3s;
    }

    .calendar-nav-btn:hover {
      background: #34a853;
    }

    .calendar-month-year {
      font-size: 1.5em;
      font-weight: 700;
      color: var(--color-text);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--color-bg-gray);
      border: 1px solid #e9ecef;
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .calendar-day-header {
      background: var(--gradient-primary);
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9em;
    }

    .calendar-day {
      background: white;
      min-height: 120px;
      padding: 8px;
      position: relative;
      cursor: pointer;
      transition: all 0.3s;
    }

    .calendar-day:hover {
      background: var(--color-bg-light);
    }

    .calendar-day.clickable {
      cursor: pointer;
    }

    .calendar-day.clickable:hover {
      background: var(--color-bg-info) !important;
      box-shadow: 0 2px 8px rgba(66, 133, 244, 0.3);
    }

    .calendar-day.other-month {
      background: var(--color-bg-light);
      color: var(--color-text-light);
    }

    .calendar-day-number {
      font-weight: 700;
      font-size: 1.1em;
      margin-bottom: 5px;
      color: var(--color-text);
    }

    .calendar-day.other-month .calendar-day-number {
      color: #ccc;
    }

    .calendar-day.today {
      background: var(--color-bg-info);
      border: 2px solid var(--color-primary);
    }

    .calendar-day.today .calendar-day-number {
      color: var(--color-primary);
      font-size: 1.3em;
    }

    /* Queue status colors - Same logic as dashboard */
    .calendar-day.past {
      background: var(--color-bg-gray) !important;
    }

    .calendar-day.past .calendar-day-number {
      color: var(--color-text-muted);
    }

    .calendar-day.current {
      background: #c8e6c9 !important;
      /* สีเขียว - คิวปัจจุบัน */
    }

    .calendar-day.current .calendar-day-number {
      color: var(--color-secondary-dark);
      font-weight: 700;
    }

    .calendar-day.upcoming {
      background: #fff9c4 !important;
      /* สีเหลือง - คิวที่ใกล้จะถึง */
    }

    .calendar-day.upcoming .calendar-day-number {
      color: #856404;
    }

    .calendar-day.future {
      background: white !important;
      /* พื้นขาว - คิวอนาคต */
    }

    .calendar-day.future .calendar-day-number {
      color: #1976d2;
      /* ตัวหนังสือน้ำเงิน */
    }

    .queue-item {
      font-size: 0.75em;
      padding: 3px 5px;
      margin-bottom: 3px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.7);
      border-left: 3px solid var(--color-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .queue-item .queue-plate {
      font-weight: 700;
      color: #1976d2;
    }

    .queue-item .queue-destination {
      color: var(--color-text);
      font-size: 0.85em;
    }

    /* Selected Date Details */
    .queue-details-list {
      display: grid;
      gap: 15px;
    }

    .queue-detail-card {
      background: var(--color-bg-light);
      border-left: 4px solid var(--color-primary);
      border-radius: var(--radius-md);
      padding: 20px;
      transition: all 0.3s;
    }

    .queue-detail-card:hover {
      box-shadow: var(--shadow-card);
      transform: translateY(-2px);
    }

    .queue-detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .queue-detail-title {
      font-size: 1.2em;
      font-weight: 700;
      color: var(--color-text);
    }

    .queue-detail-status {
      padding: 5px 15px;
      border-radius: var(--radius-2xl);
      font-size: 0.85em;
      font-weight: 600;
    }

    .queue-detail-status.pending {
      background: #fff9c4;
      color: #856404;
    }

    .queue-detail-status.active {
      background: #c8e6c9;
      color: var(--color-secondary-dark);
    }

    .queue-detail-status.running {
      background: #c8e6c9;
      color: var(--color-secondary-dark);
    }

    .queue-detail-status.done {
      background: var(--color-bg-gray);
      color: var(--color-text-muted);
    }

    .queue-detail-status.cancel {
      background: var(--color-bg-danger);
      color: var(--color-danger-dark);
    }

    .queue-detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .queue-detail-item {
      display: flex;
      flex-direction: column;
    }

    .queue-detail-label {
      font-size: 0.85em;
      color: var(--color-text-muted);
      margin-bottom: 5px;
    }

    .queue-detail-value {
      font-size: 1em;
      color: var(--color-text);
      font-weight: 600;
    }

    /* Future Queues List */
    .future-queues-list {
      display: grid;
      gap: 15px;
    }

    .future-queue-card {
      background: white;
      border: 2px solid #e9ecef;
      border-left: 4px solid #1976d2;
      border-radius: var(--radius-md);
      padding: 20px;
      transition: all 0.3s;
    }

    .future-queue-card:hover {
      box-shadow: var(--shadow-card);
      transform: translateY(-2px);
      border-left-color: var(--color-primary);
    }

    .future-queue-date {
      font-size: 1.1em;
      font-weight: 700;
      color: #1976d2;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e9ecef;
    }

    .future-queue-items {
      display: grid;
      gap: 12px;
    }

    .future-queue-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: var(--color-bg-light);
      border-radius: var(--radius-sm);
      flex-wrap: wrap;
      gap: 10px;
    }

    .future-queue-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }

    .future-queue-time {
      font-size: 0.9em;
      color: var(--color-text-muted);
      font-weight: 600;
    }

    .future-queue-plate {
      font-size: 1em;
      font-weight: 700;
      color: #1976d2;
    }

    .future-queue-destination {
      font-size: 0.9em;
      color: var(--color-text);
    }

    .empty-future-queues {
      text-align: center;
      padding: 40px 20px;
      color: var(--color-text-light);
      font-style: italic;
      background: var(--color-bg-light);
      border-radius: var(--radius-md);
    }

    /* Timeline Styles */
    .timeline-view {
      position: relative;
      padding: 20px 0;
    }

    .timeline-item {
      position: relative;
      padding-left: 40px;
      margin-bottom: 30px;
      border-left: 3px solid #e9ecef;
    }

    .timeline-item:last-child {
      border-left: none;
    }

    .timeline-marker {
      position: absolute;
      left: -8px;
      top: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--color-primary);
      border: 3px solid white;
      box-shadow: 0 0 0 2px var(--color-primary);
    }

    .timeline-date {
      font-size: 1.2em;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 15px;
    }

    .timeline-queues {
      display: grid;
      gap: 15px;
    }

    .timeline-queue {
      background: white;
      border: 2px solid #e9ecef;
      border-radius: var(--radius-xl);
      padding: 20px;
      margin-left: 20px;
      transition: all 0.3s ease;
    }

    .timeline-queue:hover {
      box-shadow: var(--shadow-card);
      transform: translateY(-2px);
    }

    .queue-time {
      font-size: 1.1em;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: 10px;
    }

    .queue-title {
      font-size: 1.2em;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 10px;
    }

    .queue-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
    }

    .detail-label {
      font-size: 0.85em;
      color: var(--color-text-muted);
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 1em;
      color: var(--color-text);
      font-weight: 600;
    }

    /* Filter Section */
    .filter-section {
      background: var(--color-bg-light);
      padding: 20px;
      border-radius: var(--radius-xl);
      margin-bottom: 30px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-weight: 600;
      color: var(--color-text);
      font-size: 0.9em;
    }

    .form-group input,
    .form-group select {
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: var(--radius-md);
      font-size: 1em;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--gradient-primary);
      color: white;
      padding: 20px;
      border-radius: var(--radius-xl);
    }

    .stat-card h3 {
      font-size: 1em;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .stat-card p {
      font-size: 2em;
      font-weight: 700;
      margin-top: 10px;
    }

    .stat-card.orange {
      background: var(--gradient-warning);
    }

    .stat-card.purple {
      background: linear-gradient(135deg, #9c27b0 0%, #7b1fa2 100%);
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-light);
    }

    .empty-state-icon {
      font-size: 4em;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .calendar-day {
        min-height: 80px;
        padding: 5px;
      }

      .queue-item {
        font-size: 0.65em;
      }

      .calendar-nav {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>📋 คิวและประวัติการปฏิบัติงาน</h1>
      <p id="driverName" style="font-size: 1.1em; margin-top: 10px; opacity: 0.95;">กำลังโหลด...</p>
      <p style="font-size: 0.9em; margin-top: 5px; opacity: 0.85;">ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>

    <div id="navigation"></div>

    <div class="content">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('queues')">🚗 คิวของฉัน</button>
        <button class="tab" onclick="switchTab('history')">📝 ประวัติการใช้งาน</button>
      </div>

      <!-- Tab: Queues -->
      <div id="queuesTab" class="tab-content active">
        <div class="calendar-container">
          <div class="calendar-header">
            <div class="calendar-nav">
              <button class="calendar-nav-btn" onclick="changeMonth(-1)">‹ เดือนก่อน</button>
              <button class="calendar-nav-btn" onclick="goToToday()">วันนี้</button>
              <button class="calendar-nav-btn" onclick="changeMonth(1)">เดือนถัดไป ›</button>
            </div>
            <div class="calendar-month-year" id="monthYear"></div>
          </div>

          <div class="calendar-grid" id="calendarGrid">
            <!-- Calendar will be generated here -->
          </div>
        </div>

        <!-- Selected Date Queue Details -->
        <div id="selectedDateDetails" style="display: none; margin-top: 30px;">
          <h3 id="selectedDateTitle" style="font-size: 1.3em; color: var(--color-primary); margin-bottom: 20px;"></h3>
          <div id="selectedDateQueues" class="queue-details-list">
            <!-- Queue details will be shown here -->
          </div>
        </div>

        <!-- Future Queues List -->
        <div id="futureQueuesSection" style="margin-top: 40px;">
          <h3
            style="font-size: 1.5em; color: var(--color-primary); margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--color-primary);">
            📅 คิวในอนาคตทั้งหมด
          </h3>
          <div id="futureQueuesList" class="future-queues-list">
            <!-- Future queues will be listed here -->
          </div>
        </div>
      </div>

      <!-- Tab: History -->
      <div id="historyTab" class="tab-content">
        <!-- Filter Section -->
        <div class="filter-section">
          <div class="filter-grid">
            <div class="form-group">
              <label>วันที่เริ่มต้น</label>
              <input type="date" id="dateFrom">
            </div>
            <div class="form-group">
              <label>วันที่สิ้นสุด</label>
              <input type="date" id="dateTo">
            </div>
            <div class="form-group">
              <label>รถ</label>
              <select id="filterCar">
                <option value="">ทั้งหมด</option>
              </select>
            </div>
            <div class="form-group">
              <button class="btn btn-primary" onclick="loadHistory()">🔍 ค้นหา</button>
            </div>
          </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
          <div class="stat-card">
            <h3>จำนวนครั้งที่ใช้งาน</h3>
            <p id="totalTrips">0</p>
          </div>
          <div class="stat-card orange">
            <h3>ระยะทางรวม (กม.)</h3>
            <p id="totalDistance">0</p>
          </div>
          <div class="stat-card purple">
            <h3>จำนวนวันใช้งาน</h3>
            <p id="totalDays">0</p>
          </div>
        </div>

        <!-- History List -->
        <div id="historyList">
          <div class="loading">กำลังโหลดข้อมูล...</div>
        </div>
      </div>
    </div>
  </div>


  <script>
    var currentTab = 'queues';
    var currentUser = null;
    var queues = [];
    var vehicles = [];
    var drivers = [];
    var vehiclesMap = {};
    var driversMap = {};
    var currentDate = new Date();
    var currentYear = currentDate.getFullYear();
    var currentMonth = currentDate.getMonth();

    // Thai month names
    var thaiMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

    var thaiDays = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];

    // Wait for common.js to load
    function waitForCommon() {
      return new Promise(function (resolve) {
        if (typeof apiCall !== 'undefined' && typeof requireAuth !== 'undefined') {
          resolve();
          return;
        }

        var checkCount = 0;
        var checkInterval = setInterval(function () {
          checkCount++;
          if (typeof apiCall !== 'undefined' && typeof requireAuth !== 'undefined') {
            clearInterval(checkInterval);
            resolve();
          } else if (checkCount > 50) { // Wait max 5 seconds
            clearInterval(checkInterval);
            console.warn('common.js not loaded after 5 seconds');
            resolve(); // Continue anyway
          }
        }, 100);
      });
    }

    document.addEventListener('DOMContentLoaded', async function () {
      // Wait for common.js to load
      await waitForCommon();

      if (typeof apiCall === 'undefined' || typeof requireAuth === 'undefined') {
        console.error('common.js not loaded! Make sure to open via web server, not file://');
        // Still show calendar even without API
        renderCalendar();
        alert('⚠️ กรุณาเปิดผ่าน Web Server (ไม่ใช่ file://) เพื่อให้ระบบทำงานได้เต็มที่\n\nตอนนี้แสดงปฏิทินแบบไม่มีข้อมูล');
        return;
      }

      // Check authentication (ไม่ redirect — ให้แสดงหน้าได้)
      try {
        var isAuthenticated = requireAuth();
        if (!isAuthenticated) {
          console.warn('Not authenticated, but showing page anyway');
        }

        currentUser = getCurrentUser();
        if (!currentUser) {
          console.warn('No current user, but showing page anyway');
        }

        // ถ้ายังไม่ล็อกอิน ให้แสดงหน้าได้แต่ไม่โหลดข้อมูล
        if (!isAuthenticated) {
          return;
        }
      } catch (e) {
        console.warn('Auth check failed:', e);
        // Still show calendar even if auth fails
        renderCalendar();
        return;
      }

      displayDriverName();

      var today = new Date();
      var lastMonth = new Date(today);
      lastMonth.setDate(lastMonth.getDate() - 30);

      document.getElementById('dateFrom').value = formatDate(lastMonth);
      document.getElementById('dateTo').value = formatDate(today);

      renderCalendar();

      loadVehicles();
      loadDrivers();
      loadQueues();
    });

    async function displayDriverName() {
      try {
        var driverNameEl = document.getElementById('driverName');
        if (!driverNameEl) {
          return;
        }

        var driverName = '';

        // Try to get from currentUser first
        if (currentUser) {
          if (currentUser.full_name) {
            driverName = currentUser.full_name;
          } else if (currentUser.first_name && currentUser.last_name) {
            driverName = currentUser.first_name + ' ' + currentUser.last_name;
          }
        }

        // If not found, try to get from API
        if (!driverName && currentUser && currentUser.id && typeof apiCall !== 'undefined') {
          try {
            var userResult = await apiCall('getCurrentUserInfo', { userId: currentUser.id });
            if (userResult.success && userResult.data && userResult.data.user) {
              var user = userResult.data.user;
              driverName = user.full_name || '';
            }
          } catch (e) {
            console.error('Error fetching user info:', e);
          }
        }

        // If still not found, try to match with drivers list
        if (!driverName && drivers.length > 0 && currentUser) {
          var driver = drivers.find(function (d) {
            if (currentUser.driver_id) {
              return d.driver_id === currentUser.driver_id;
            }
            if (currentUser.full_name) {
              return d.full_name === currentUser.full_name;
            }
            return false;
          });
          if (driver) {
            driverName = driver.full_name || (driver.first_name + ' ' + driver.last_name);
          }
        }

        if (driverName) {
          driverNameEl.textContent = '👤 ' + driverName;
        } else {
          driverNameEl.textContent = '👤 พนักงานขับรถ';
        }
      } catch (e) {
        console.error('Error displaying driver name:', e);
        var driverNameEl = document.getElementById('driverName');
        if (driverNameEl) {
          driverNameEl.textContent = '👤 พนักงานขับรถ';
        }
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(function (t) {
        t.classList.remove('active');
      });
      document.querySelectorAll('.tab-content').forEach(function (tc) {
        tc.classList.remove('active');
      });

      event.target.classList.add('active');
      if (tab === 'queues') {
        document.getElementById('queuesTab').classList.add('active');
        // Always render calendar when switching to queues tab
        if (queues.length === 0) {
          renderCalendar(); // Show empty calendar first
          loadQueues(); // Then load data
        } else {
          renderCalendar(); // Re-render with existing data
        }
      } else {
        document.getElementById('historyTab').classList.add('active');
        loadHistory();
      }
    }

    async function loadVehicles() {
      if (typeof apiCall === 'undefined') {
        return;
      }

      try {
        var result = await apiCall('getVehicles', {});
        if (result.success && result.data && result.data.vehicles) {
          vehicles = result.data.vehicles || [];
          vehicles.forEach(function (v) {
            vehiclesMap[v.car_id] = v;
          });

          // Populate filter dropdown
          var select = document.getElementById('filterCar');
          if (select) {
            vehicles.forEach(function (vehicle) {
              var option = document.createElement('option');
              option.value = vehicle.car_id;
              option.textContent = vehicle.license_plate + ' - ' + (vehicle.brand || '') + ' ' + (vehicle.model || '');
              select.appendChild(option);
            });
          }
        }
      } catch (error) {
        console.error('Load vehicles error:', error);
      }
    }

    async function loadDrivers() {
      if (typeof apiCall === 'undefined') {
        return;
      }

      try {
        var result = await apiCall('getDrivers', { status: 'active' });
        if (result.success && result.data && result.data.drivers) {
          drivers = result.data.drivers || [];
          drivers.forEach(function (d) {
            driversMap[d.driver_id] = d;
          });

          displayDriverName();
        }
      } catch (error) {
        console.error('Load drivers error:', error);
      }
    }

    async function loadQueues() {
      // Always render calendar first (even if empty)
      renderCalendar();

      if (typeof apiCall === 'undefined') {
        console.warn('apiCall not available, showing empty calendar');
        queues = [];
        return;
      }

      try {
        var firstDay = new Date(currentYear, currentMonth, 1);
        var lastDay = new Date(currentYear, currentMonth + 1, 0);
        var dateFrom = formatDate(firstDay);
        var dateTo = formatDate(lastDay);

        // Also load queues for a few days before and after
        var extendedFrom = new Date(firstDay);
        extendedFrom.setDate(extendedFrom.getDate() - 7);
        var extendedTo = new Date(lastDay);
        extendedTo.setDate(extendedTo.getDate() + 7);

        var queuesResult = await apiCall('getQueues', {
          filters: {
            date_from: formatDate(extendedFrom),
            date_to: formatDate(extendedTo)
          }
        });

        if (queuesResult.success && queuesResult.data && queuesResult.data.queues) {
          queues = queuesResult.data.queues || [];
        } else {
          queues = [];
        }

        // Re-render calendar with loaded data
        renderCalendar();
      } catch (error) {
        console.error('Error loading queues:', error);
        // Still show calendar even on error
        queues = [];
        renderCalendar();
      }
    }

    function formatDate(date) {
      var year = date.getFullYear();
      var month = String(date.getMonth() + 1).padStart(2, '0');
      var day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function renderCalendar() {
      var calendarGrid = document.getElementById('calendarGrid');
      if (!calendarGrid) {
        console.error('calendarGrid element not found');
        return;
      }

      var firstDay = new Date(currentYear, currentMonth, 1);
      var lastDay = new Date(currentYear, currentMonth + 1, 0);
      var firstDayOfWeek = firstDay.getDay();
      var daysInMonth = lastDay.getDate();

      var monthYearEl = document.getElementById('monthYear');
      if (monthYearEl) {
        monthYearEl.textContent = thaiMonths[currentMonth] + ' ' + (currentYear + 543);
      }

      var html = '';

      // Day headers
      thaiDays.forEach(function (day) {
        html += '<div class="calendar-day-header">' + day + '</div>';
      });

      // Empty cells for days before month starts
      for (var i = 0; i < firstDayOfWeek; i++) {
        var prevDate = new Date(currentYear, currentMonth, -i);
        html += '<div class="calendar-day other-month"><div class="calendar-day-number">' + prevDate.getDate() + '</div></div>';
      }

      // Days of the month
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var todayStr = formatDate(today);
      var now = new Date();
      var currentTimeMinutes = now.getHours() * 60 + now.getMinutes();

      function parseTimeToMinutes(timeStr) {
        if (!timeStr) return null;
        var parts = timeStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
      }

      function isQueueCurrent(queue, dateStr) {
        if (dateStr !== todayStr) return false;
        if (queue.status !== 'active' && queue.status !== 'running') return false;
        if (!queue.time_start) return false;

        var queueStart = parseTimeToMinutes(queue.time_start);
        var queueEnd = queue.time_end ? parseTimeToMinutes(queue.time_end) : (queueStart + 8 * 60);

        return currentTimeMinutes >= queueStart && currentTimeMinutes <= queueEnd;
      }

      function isQueueUpcoming(queue, dateStr) {
        if (dateStr !== todayStr) return false;
        if (queue.status !== 'pending') return false;
        if (!queue.time_start) return false;

        var queueStart = parseTimeToMinutes(queue.time_start);
        // Upcoming: starts within next 2 hours
        return queueStart > currentTimeMinutes && queueStart <= currentTimeMinutes + 120;
      }

      for (var day = 1; day <= daysInMonth; day++) {
        var dateStr = formatDate(new Date(currentYear, currentMonth, day));
        var dateObj = new Date(currentYear, currentMonth, day);
        dateObj.setHours(0, 0, 0, 0);
        var isToday = dateStr === todayStr;
        var dayQueues = queues.filter(function (q) { return q.date === dateStr; });

        // Determine status - Same logic as dashboard
        var statusClass = '';
        if (isToday) {
          statusClass = 'today';
        } else if (dateObj < today) {
          // Past date
          statusClass = 'past';
        } else {
          // Future date - check queue status
          var hasCurrent = false;
          var hasUpcoming = false;

          dayQueues.forEach(function (queue) {
            if (isQueueCurrent(queue, dateStr)) {
              hasCurrent = true;
            } else if (isQueueUpcoming(queue, dateStr)) {
              hasUpcoming = true;
            }
          });

          if (hasCurrent) {
            statusClass = 'current';
          } else if (hasUpcoming) {
            statusClass = 'upcoming';
          } else {
            statusClass = 'future';
          }
        }

        var hasQueues = dayQueues.length > 0;
        var clickableClass = hasQueues ? 'clickable' : '';
        html += '<div class="calendar-day ' + statusClass + ' ' + clickableClass + '" onclick="showDateDetails(\'' + dateStr + '\')" data-date="' + dateStr + '" data-queue-count="' + dayQueues.length + '">';
        html += '<div class="calendar-day-number">' + day + '</div>';

        var displayQueues = dayQueues.slice(0, 3);
        displayQueues.forEach(function (queue) {
          var vehicle = vehiclesMap[queue.car_id];
          var driver = driversMap[queue.driver_id];
          var plate = vehicle ? vehicle.license_plate : (queue.car_id ? queue.car_id.substring(0, 8) : '-');
          var driverName = driver ? (driver.full_name || driver.first_name + ' ' + driver.last_name) : (queue.driver_id ? queue.driver_id.substring(0, 8) : '-');
          var destination = queue.destination || queue.mission || '-';

          html += '<div class="queue-item">';
          html += '<div class="queue-plate">' + plate + '</div>';
          html += '<div class="queue-driver">' + driverName + '</div>';
          html += '<div class="queue-destination">' + destination + '</div>';
          html += '</div>';
        });

        if (dayQueues.length > 3) {
          html += '<div class="queue-item" style="font-size: 0.7em; color: var(--color-text-light);">+ ' + (dayQueues.length - 3) + ' คิวเพิ่มเติม</div>';
        }

        html += '</div>';
      }

      // Empty cells for days after month ends
      var remainingCells = 42 - (firstDayOfWeek + daysInMonth);
      for (var i = 1; i <= remainingCells && remainingCells < 7; i++) {
        html += '<div class="calendar-day other-month"><div class="calendar-day-number">' + i + '</div></div>';
      }

      document.getElementById('calendarGrid').innerHTML = html;

      updateFutureQueuesList();
    }

    function showDateDetails(dateStr) {
      var dayQueues = queues.filter(function (q) { return q.date === dateStr; });

      if (dayQueues.length === 0) {
        document.getElementById('selectedDateDetails').style.display = 'none';
        return;
      }

      // Format date for display
      var dateObj = new Date(dateStr + 'T00:00:00');
      var thaiDate = formatDateThai(dateStr);

      document.getElementById('selectedDateTitle').textContent = '📋 รายละเอียดคิววันที่ ' + thaiDate + ' (' + dayQueues.length + ' คิว)';

      var detailsHtml = '';
      dayQueues.forEach(function (queue) {
        var vehicle = vehiclesMap[queue.car_id];
        var driver = driversMap[queue.driver_id];
        var plate = vehicle ? vehicle.license_plate : (queue.car_id ? queue.car_id.substring(0, 8) : '-');
        var driverName = driver ? (driver.full_name || driver.first_name + ' ' + driver.last_name) : (queue.driver_id ? queue.driver_id.substring(0, 8) : '-');
        var destination = queue.destination || queue.mission || '-';
        var requester = queue.requested_by || queue.requester || '-';
        var passengerCount = queue.passenger_count || '-';
        var timeStart = queue.time_start || '-';
        var timeEnd = queue.time_end || '-';
        var notes = queue.notes || '-';

        var statusText = {
          'pending': 'รอการอนุมัติ',
          'active': 'กำลังดำเนินการ',
          'running': 'กำลังเดินทาง',
          'done': 'เสร็จสิ้น',
          'cancel': 'ยกเลิก'
        };
        var statusClass = queue.status || 'pending';
        var statusDisplay = statusText[statusClass] || statusClass;

        detailsHtml += '<div class="queue-detail-card">';
        detailsHtml += '<div class="queue-detail-header">';
        detailsHtml += '<div class="queue-detail-title">🚗 ' + plate + ' - ' + destination + '</div>';
        detailsHtml += '<div class="queue-detail-status ' + statusClass + '">' + statusDisplay + '</div>';
        detailsHtml += '</div>';
        detailsHtml += '<div class="queue-detail-grid">';
        detailsHtml += '<div class="queue-detail-item"><div class="queue-detail-label">👤 คนขับ</div><div class="queue-detail-value">' + driverName + '</div></div>';
        detailsHtml += '<div class="queue-detail-item"><div class="queue-detail-label">📞 ผู้ขอใช้รถ</div><div class="queue-detail-value">' + requester + '</div></div>';
        detailsHtml += '<div class="queue-detail-item"><div class="queue-detail-label">👥 จำนวนผู้โดยสาร</div><div class="queue-detail-value">' + passengerCount + ' คน</div></div>';
        detailsHtml += '<div class="queue-detail-item"><div class="queue-detail-label">🕐 เวลาเริ่ม</div><div class="queue-detail-value">' + timeStart + '</div></div>';
        detailsHtml += '<div class="queue-detail-item"><div class="queue-detail-label">🕐 เวลาสิ้นสุด</div><div class="queue-detail-value">' + timeEnd + '</div></div>';
        if (notes !== '-') {
          detailsHtml += '<div class="queue-detail-item" style="grid-column: 1 / -1;"><div class="queue-detail-label">📝 หมายเหตุ</div><div class="queue-detail-value">' + notes + '</div></div>';
        }
        detailsHtml += '</div>';
        detailsHtml += '</div>';
      });

      document.getElementById('selectedDateQueues').innerHTML = detailsHtml;
      document.getElementById('selectedDateDetails').style.display = 'block';

      // Scroll to details
      document.getElementById('selectedDateDetails').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function updateFutureQueuesList() {
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var todayStr = formatDate(today);

      // Filter future queues (date >= today)
      var futureQueues = queues.filter(function (q) {
        var queueDate = new Date(q.date + 'T00:00:00');
        queueDate.setHours(0, 0, 0, 0);
        return queueDate >= today && (q.status === 'pending' || q.status === 'active' || q.status === 'running');
      });

      // Sort by date, then by time_start
      futureQueues.sort(function (a, b) {
        if (a.date !== b.date) {
          return a.date.localeCompare(b.date);
        }
        var timeA = a.time_start || '00:00';
        var timeB = b.time_start || '00:00';
        return timeA.localeCompare(timeB);
      });

      var futureQueuesHtml = '';

      if (futureQueues.length === 0) {
        futureQueuesHtml = '<div class="empty-future-queues">ไม่มีคิวในอนาคต</div>';
      } else {
        // Group by date
        var queuesByDate = {};
        futureQueues.forEach(function (queue) {
          if (!queuesByDate[queue.date]) {
            queuesByDate[queue.date] = [];
          }
          queuesByDate[queue.date].push(queue);
        });

        Object.keys(queuesByDate).sort().forEach(function (dateStr) {
          var dateQueues = queuesByDate[dateStr];
          var thaiDate = formatDateThai(dateStr);

          futureQueuesHtml += '<div class="future-queue-card">';
          futureQueuesHtml += '<div class="future-queue-date">📅 ' + thaiDate + ' (' + dateQueues.length + ' คิว)</div>';
          futureQueuesHtml += '<div class="future-queue-items">';

          dateQueues.forEach(function (queue) {
            var vehicle = vehiclesMap[queue.car_id];
            var driver = driversMap[queue.driver_id];
            var plate = vehicle ? vehicle.license_plate : (queue.car_id ? queue.car_id.substring(0, 8) : '-');
            var driverName = driver ? (driver.full_name || driver.first_name + ' ' + driver.last_name) : (queue.driver_id ? queue.driver_id.substring(0, 8) : '-');
            var destination = queue.destination || queue.mission || '-';
            var timeStart = queue.time_start || '-';
            var timeEnd = queue.time_end || '-';

            var statusText = {
              'pending': 'รอการอนุมัติ',
              'active': 'กำลังดำเนินการ',
              'running': 'กำลังเดินทาง'
            };
            var statusDisplay = statusText[queue.status] || queue.status;

            futureQueuesHtml += '<div class="future-queue-item">';
            futureQueuesHtml += '<div class="future-queue-info">';
            futureQueuesHtml += '<div class="future-queue-time">🕐 ' + timeStart + (timeEnd !== '-' ? ' - ' + timeEnd : '') + ' | ' + statusDisplay + '</div>';
            futureQueuesHtml += '<div class="future-queue-plate">🚗 ' + plate + '</div>';
            futureQueuesHtml += '<div class="future-queue-destination">📍 ' + destination + '</div>';
            futureQueuesHtml += '<div class="future-queue-destination" style="font-size: 0.85em; color: var(--color-text-muted);">👤 ' + driverName + '</div>';
            futureQueuesHtml += '</div>';
            futureQueuesHtml += '</div>';
          });

          futureQueuesHtml += '</div>';
          futureQueuesHtml += '</div>';
        });
      }

      document.getElementById('futureQueuesList').innerHTML = futureQueuesHtml;
    }

    function changeMonth(direction) {
      currentMonth += direction;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      } else if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      loadQueues();
    }

    function goToToday() {
      var today = new Date();
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();
      loadQueues();
    }

    async function loadHistory() {
      try {
        showLoading('historyList');

        var filters = {};
        var dateFrom = document.getElementById('dateFrom').value;
        var dateTo = document.getElementById('dateTo').value;
        var filterCar = document.getElementById('filterCar').value;

        if (dateFrom) filters.date_from = dateFrom;
        if (dateTo) filters.date_to = dateTo;
        if (filterCar) filters.car_id = filterCar;

        // Backend getUsageRecords will automatically filter by driver_id
        var result = await apiCall('getUsageRecords', { filters: filters });
        hideLoading('historyList');

        if (result.success && result.data && result.data.records && result.data.records.length > 0) {
          var records = result.data.records;

          // Transform records
          records.forEach(function (record) {
            if (record.datetime) {
              var dt = record.datetime.split(' ');
              record.date = dt[0];
              if (record.record_type === 'before_trip') {
                record.time_out = dt[1] || '';
              } else if (record.record_type === 'after_trip') {
                record.time_in = dt[1] || '';
              }
            }
          });

          // Calculate stats
          var tripsByDate = {};
          var uniqueDates = {};

          records.forEach(function (record) {
            var date = record.date || (record.datetime ? record.datetime.split(' ')[0] : '');
            if (!date) return;

            uniqueDates[date] = true;

            if (!tripsByDate[date]) {
              tripsByDate[date] = {};
            }

            var carId = record.car_id;
            if (!tripsByDate[date][carId]) {
              tripsByDate[date][carId] = { before: null, after: null };
            }

            if (record.record_type === 'before_trip') {
              tripsByDate[date][carId].before = record;
            } else if (record.record_type === 'after_trip') {
              tripsByDate[date][carId].after = record;
            }
          });

          // Calculate totals
          var totalTrips = 0;
          var totalDistance = 0;

          Object.keys(tripsByDate).forEach(function (date) {
            Object.keys(tripsByDate[date]).forEach(function (carId) {
              var trip = tripsByDate[date][carId];
              if (trip.before && trip.after) {
                totalTrips++;
                var beforeMileage = parseFloat(trip.before.mileage || 0);
                var afterMileage = parseFloat(trip.after.mileage || 0);
                if (afterMileage > beforeMileage) {
                  totalDistance += (afterMileage - beforeMileage);
                }
              } else if (trip.before || trip.after) {
                totalTrips++;
              }
            });
          });

          document.getElementById('totalTrips').textContent = totalTrips;
          document.getElementById('totalDistance').textContent = totalDistance.toLocaleString('th-TH');
          document.getElementById('totalDays').textContent = Object.keys(uniqueDates).length;

          var html = '<div class="timeline-view">';

          var sortedDates = Object.keys(tripsByDate).sort().reverse();

          sortedDates.forEach(function (date) {
            html += '<div class="timeline-item">';
            html += '<div class="timeline-marker"></div>';
            html += '<div class="timeline-date">' + formatDateThai(date) + '</div>';
            html += '<div class="timeline-queues">';

            var dayTrips = tripsByDate[date];
            Object.keys(dayTrips).forEach(function (carId) {
              var trip = dayTrips[carId];
              var vehicle = vehiclesMap[carId];
              var vehicleName = vehicle ? (vehicle.license_plate + ' - ' + vehicle.brand + ' ' + vehicle.model) : carId;

              html += '<div class="timeline-queue">';
              html += '<div class="queue-time">';
              if (trip.before) {
                var beforeTime = trip.before.datetime ? trip.before.datetime.split(' ')[1] : '-';
                html += beforeTime;
              }
              html += ' - ';
              if (trip.after) {
                var afterTime = trip.after.datetime ? trip.after.datetime.split(' ')[1] : '-';
                html += afterTime;
              } else {
                html += '-';
              }
              html += '</div>';
              html += '<div class="queue-title">รถ: ' + vehicleName + '</div>';
              html += '<div class="queue-details">';
              if (trip.before && trip.before.destination) {
                html += '<div class="detail-item"><span class="detail-label">สถานที่ไป</span><span class="detail-value">' + trip.before.destination + '</span></div>';
              }
              if (trip.before && trip.before.requested_by) {
                html += '<div class="detail-item"><span class="detail-label">ผู้ขอใช้</span><span class="detail-value">' + trip.before.requested_by + '</span></div>';
              }
              if (trip.before && trip.after) {
                var beforeMileage = parseFloat(trip.before.mileage || 0);
                var afterMileage = parseFloat(trip.after.mileage || 0);
                var distance = afterMileage - beforeMileage;
                if (distance > 0) {
                  html += '<div class="detail-item"><span class="detail-label">ระยะทาง</span><span class="detail-value">' + distance.toLocaleString('th-TH') + ' กม.</span></div>';
                }
                html += '<div class="detail-item"><span class="detail-label">เลขไมล์</span><span class="detail-value">' + beforeMileage.toLocaleString('th-TH') + ' → ' + afterMileage.toLocaleString('th-TH') + ' กม.</span></div>';
              } else if (trip.before) {
                html += '<div class="detail-item"><span class="detail-label">เลขไมล์</span><span class="detail-value">' + parseFloat(trip.before.mileage || 0).toLocaleString('th-TH') + ' กม. (ยังไม่กลับ)</span></div>';
              } else if (trip.after) {
                html += '<div class="detail-item"><span class="detail-label">เลขไมล์</span><span class="detail-value">' + parseFloat(trip.after.mileage || 0).toLocaleString('th-TH') + ' กม.</span></div>';
              }
              html += '</div>';
              html += '</div>';
            });

            html += '</div></div>';
          });

          html += '</div>';

          document.getElementById('historyList').innerHTML = html;
        } else {
          document.getElementById('historyList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>ไม่มีประวัติการใช้งาน</p></div>';
          document.getElementById('totalTrips').textContent = '0';
          document.getElementById('totalDistance').textContent = '0';
          document.getElementById('totalDays').textContent = '0';
        }
      } catch (error) {
        hideLoading('historyList');
        document.getElementById('historyList').innerHTML = '<div class="empty-state">' + handleError(error) + '</div>';
      }
    }

    function formatDateThai(dateStr) {
      if (!dateStr) return '-';
      try {
        var date = new Date(dateStr + 'T00:00:00');
        var thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
          'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        var day = date.getDate();
        var month = thaiMonths[date.getMonth()];
        var year = date.getFullYear() + 543;
        return day + ' ' + month + ' ' + year;
      } catch (e) {
        return dateStr;
      }
    }

    function showLoading(elementId) {
      document.getElementById(elementId).innerHTML = '<div class="loading">กำลังโหลดข้อมูล...</div>';
    }

    function hideLoading(elementId) {
      // Loading will be replaced by content
    }
  </script>
