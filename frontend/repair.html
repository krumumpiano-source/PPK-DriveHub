<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ซ่อมบำรุง - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>
    window.API_BASE_URL = CONFIG.API_BASE_URL;
    window.currentPage = 'repair';
    window.REQUIRE_AUTH = true;
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js"></script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    /* Horizontal Stepper */
    .stepper{display:flex;align-items:flex-start;margin:.75rem 0 .5rem;position:relative}
    .stepper-step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
    .stepper-step::before{content:'';position:absolute;top:10px;right:50%;left:0;height:2px;background:var(--color-border);z-index:0}
    .stepper-step:first-child::before{display:none}
    .stepper-step.done::before{background:var(--color-success)}
    .stepper-step.active::before{background:var(--color-primary)}
    .stepper-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--color-border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:.6rem;position:relative;z-index:1;transition:all .2s}
    .stepper-step.done .stepper-dot{background:var(--color-success);border-color:var(--color-success);color:#fff}
    .stepper-step.active .stepper-dot{background:var(--color-primary);border-color:var(--color-primary);color:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.18)}
    .stepper-step.rejected .stepper-dot{background:var(--color-danger);border-color:var(--color-danger);color:#fff}
    .stepper-label{font-size:.68rem;margin-top:3px;color:var(--color-text-muted);text-align:center;line-height:1.2}
    .stepper-step.done .stepper-label{color:var(--color-success)}
    .stepper-step.active .stepper-label{color:var(--color-primary);font-weight:600}

    /* Summary Cards */
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.75rem;margin-bottom:1.25rem}
    .summary-card{background:var(--color-bg-white);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:.75rem;text-align:center;transition:box-shadow .15s}
    .summary-card:hover{box-shadow:var(--shadow-md)}
    .summary-card .sc-icon{font-size:1.25rem;margin-bottom:2px}
    .summary-card .sc-value{font-size:1.4rem;font-weight:700;line-height:1.2}
    .summary-card .sc-label{font-size:.75rem;color:var(--color-text-light);margin-top:2px}
    .sc-pending .sc-value{color:#92400e}
    .sc-progress .sc-value{color:var(--color-primary)}
    .sc-done .sc-value{color:#065f46}
    .sc-cost .sc-value{color:#9d174d;font-size:1.1rem}

    /* Card action bar */
    .repair-card-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--color-border)}
    .repair-card-actions .spacer{flex:1}

    .repair-card{background:var(--color-bg-white);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem;margin-bottom:.75rem;transition:box-shadow .15s}
    .repair-card:hover{box-shadow:var(--shadow-md)}
    .repair-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;flex-wrap:wrap}
    .repair-card-title{font-weight:600;font-size:.95rem}
    .repair-card-body{margin-top:.75rem;font-size:.88rem;color:var(--color-text-light)}
    .repair-card-body p{margin-bottom:4px}

    .status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:500}
    .status-requested{background:#fef3c7;color:#92400e}
    .status-approved{background:#dbeafe;color:#1e40af}
    .status-inspected{background:#e0e7ff;color:#3730a3}
    .status-documented{background:#ede9fe;color:#5b21b6}
    .status-repairing{background:#fce7f3;color:#9d174d}
    .status-completed{background:#d1fae5;color:#065f46}
    .status-rejected{background:#fee2e2;color:#991b1b}

    .alert-card{border-left:4px solid var(--color-warning);background:#fffbeb;padding:.75rem 1rem;border-radius:var(--radius-md);margin-bottom:.5rem;font-size:.88rem}
    .alert-card.critical{border-left-color:var(--color-danger);background:#fef2f2}
    .alert-card.resolved{border-left-color:var(--color-success);background:#f0fdf4;opacity:.7}

    .detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem;margin-top:.75rem}
    .detail-item label{display:block;font-size:.78rem;color:var(--color-text-light);margin-bottom:2px}
    .detail-item span{font-size:.88rem;font-weight:500}

    .file-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
    .file-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--color-bg-light);border-radius:16px;font-size:.78rem;color:var(--color-primary);cursor:pointer}
    .file-chip:hover{background:var(--color-primary);color:#fff}

    /* ── History Cards ── */
    .h-card{background:#fff;border-radius:var(--radius-lg,8px);border:1px solid var(--color-border);margin-bottom:12px;overflow:hidden;transition:box-shadow .2s}
    .h-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
    .h-card-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;gap:10px;flex-wrap:wrap;cursor:pointer}
    .h-card-header:hover{background:#f8fafc}
    .h-card-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:1;min-width:0}
    .h-card-date{font-weight:600;font-size:.9rem;color:var(--color-text);white-space:nowrap}
    .h-card-type{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600;white-space:nowrap}
    .h-card-type.t-repair{background:#fef3c7;color:#92400e}
    .h-card-type.t-scheduled_maintenance{background:#dbeafe;color:#1e40af}
    .h-card-type.t-inspection{background:#ede9fe;color:#5b21b6}
    .h-card-type.t-other{background:#e5e7eb;color:#374151}
    .h-card-vehicle{font-size:.85rem;color:var(--color-text-muted);display:flex;align-items:center;gap:4px}
    .h-card-cost{font-weight:700;font-size:1rem;color:var(--color-primary);white-space:nowrap}
    .h-card-body{display:none;padding:0 16px 14px;border-top:1px solid var(--color-border)}
    .h-card-body.open{display:block}
    .h-card-desc{font-size:.88rem;color:var(--color-text);margin:10px 0 6px;line-height:1.5}
    .h-card-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:.82rem;color:var(--color-text-muted);margin:8px 0}
    .h-card-meta span{display:inline-flex;gap:3px;align-items:center}
    .h-card-items{margin-top:10px;border:1px solid var(--color-border);border-radius:var(--radius-md,6px);overflow:hidden}
    .h-card-items table{width:100%;border-collapse:collapse;font-size:.82rem}
    .h-card-items th{background:#f8fafc;padding:6px 10px;text-align:left;font-weight:600;font-size:.78rem;color:var(--color-text-muted);border-bottom:1px solid var(--color-border)}
    .h-card-items td{padding:6px 10px;border-bottom:1px solid #f0f0f0}
    .h-card-items tr:last-child td{border-bottom:none}
    .h-card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--color-border);justify-content:flex-end}
    .h-card-expand{font-size:.8rem;color:var(--color-text-muted);display:flex;align-items:center;gap:3px}
    /* ── Maintenance Panel ── */
    .mnt-panel{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1px solid #bbf7d0;border-radius:var(--radius-lg,8px);padding:14px 16px;margin-bottom:1rem}
    .mnt-panel h4{margin:0 0 10px;font-size:.92rem;color:#166534}
    .mnt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
    .mnt-item{background:#fff;border:1px solid #d1fae5;border-radius:var(--radius-md,6px);padding:8px 12px;font-size:.82rem}
    .mnt-item.overdue{border-color:#fca5a5;background:#fef2f2}
    .mnt-item.warning{border-color:#fde68a;background:#fffbeb}
    .mnt-item.stale{border-color:#d1d5db;background:#f9fafb;opacity:.75}
    .mnt-item-name{font-weight:600;font-size:.84rem}
    .mnt-item-info{color:var(--color-text-muted);font-size:.78rem;margin-top:2px}
    .mnt-section-hdr{font-weight:600;font-size:.85rem;margin:10px 0 6px;display:flex;align-items:center;gap:4px}
    /* ── History Summary Stats ── */
    .h-stat{background:#fff;border:1px solid var(--color-border);border-radius:var(--radius-md,6px);padding:10px 14px;min-width:120px;text-align:center}
    .h-stat-val{font-size:1.15rem;font-weight:700;color:var(--color-primary)}
    .h-stat-lbl{font-size:.78rem;color:var(--color-text-muted);margin-top:2px}

    @media(max-width:600px){
      .detail-grid{grid-template-columns:1fr}
      .stepper-label{font-size:.6rem}
      .stepper-dot{width:18px;height:18px;font-size:.5rem}
      .summary-grid{grid-template-columns:repeat(2,1fr)}
      .summary-card{padding:.5rem}
      .summary-card .sc-value{font-size:1.2rem}
      .h-card-header{padding:10px 12px}
      .h-card-body{padding:0 12px 12px}
      .h-card-cost{font-size:.9rem}
      .mnt-grid{grid-template-columns:1fr}
      .h-hide-sm{display:none}
    }
    /* ── History Table ── */
    .h-tbl-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--color-border);background:#fff}
    .h-tbl{width:100%;border-collapse:collapse;font-size:.84rem;min-width:680px}
    .h-tbl thead th{background:#f8fafc;padding:8px 10px;text-align:left;font-weight:600;font-size:.78rem;color:var(--color-text-muted);border-bottom:2px solid var(--color-border);white-space:nowrap}
    .h-tbl td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
    .h-tbl tbody tr:last-child td{border-bottom:none}
    .h-tbl tbody tr:hover td{background:#f8fafc}
    .h-tbl .t-cost{font-weight:700;color:var(--color-primary);text-align:right;white-space:nowrap}
    .h-tbl .t-muted{color:var(--color-text-muted);font-size:.78rem}
    .h-tbl .t-desc{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .h-tbl .t-veh{white-space:nowrap;font-weight:600;font-size:.84rem}
    .h-tbl .t-mile{white-space:nowrap;font-size:.78rem;color:var(--color-text-muted)}
    .h-srch{padding:7px 12px;border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:.88rem;flex:1;min-width:180px}
    /* ── Workflow Status Bar ── */
    .wf-status-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.75rem}
    .wsb{padding:4px 11px;border-radius:20px;border:1px solid var(--color-border);background:#fff;cursor:pointer;font-size:.82rem;transition:all .15s;display:inline-flex;align-items:center;gap:3px}
    .wsb:hover{border-color:var(--color-primary);color:var(--color-primary)}
    .wsb.on{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
    .wsb-n{background:rgba(0,0,0,.1);border-radius:10px;padding:0 5px;font-size:.72rem}
    .wsb.on .wsb-n{background:rgba(255,255,255,.22)}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔧 ซ่อมบำรุง</h1>
      <p>ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>
    <div id="navigation"></div>
    <div class="content">
      <div id="alertContainer"></div>

      <!-- Summary KPIs -->
      <div class="summary-grid" id="summaryCards">
        <div class="summary-card sc-pending">
          <div class="sc-icon">📨</div>
          <div class="sc-value" id="sumPending">-</div>
          <div class="sc-label">รอดำเนินการ</div>
        </div>
        <div class="summary-card sc-progress">
          <div class="sc-icon">🔨</div>
          <div class="sc-value" id="sumProgress">-</div>
          <div class="sc-label">กำลังซ่อม</div>
        </div>
        <div class="summary-card sc-done">
          <div class="sc-icon">✅</div>
          <div class="sc-value" id="sumDone">-</div>
          <div class="sc-label">เสร็จเดือนนี้</div>
        </div>
        <div class="summary-card sc-cost">
          <div class="sc-icon">💰</div>
          <div class="sc-value" id="sumCost">-</div>
          <div class="sc-label">ค่าซ่อมเดือนนี้</div>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
        <a href="repair-history.html" class="btn btn-secondary">📋 ประวัติซ่อม</a>
        <a href="repair-inspection.html" class="btn btn-secondary">🔍 ตรวจสภาพ</a>
      </div>

      <!-- ═══════ Tab 1: แจ้งซ่อม / ติดตามสถานะ ═══════ -->
      <div id="tab-workflow" class="tab-content active">
        <div class="actions-bar" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem">
          <button class="btn btn-primary" onclick="openReportModal()">➕ แจ้งซ่อม</button>
          <select id="wfFilterCar" onchange="loadWorkflow()" style="padding:8px;border-radius:var(--radius-md);border:1px solid var(--color-border);font-size:.88rem">
            <option value="">รถทั้งหมด</option>
          </select>
          <select id="wfFilterStatus" onchange="loadWorkflow()" style="padding:8px;border-radius:var(--radius-md);border:1px solid var(--color-border);font-size:.88rem">
            <option value="">ทุกสถานะ</option>
            <option value="requested">รอพิจารณา</option>
            <option value="approved">อนุมัติแล้ว</option>
            <option value="inspected">ตรวจสภาพแล้ว</option>
            <option value="documented">ทำบันทึกแล้ว</option>
            <option value="repairing">กำลังซ่อม</option>
            <option value="completed">ซ่อมเสร็จ</option>
            <option value="rejected">ไม่อนุมัติ</option>
          </select>
        </div>
        <div id="wfStatusBar" class="wf-status-bar"></div>
        <div id="wfLoading" class="loading" style="display:none">กำลังโหลด...</div>
        <div id="wfList"></div>
      </div>
    </div>
  </div>

  <!-- ═══════ Modal: แจ้งซ่อม ═══════ -->
  <div id="reportModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>🔧 แจ้งซ่อม</h2>
        <button class="modal-close" onclick="closeReportModal()">×</button>
      </div>
      <div class="modal-body">
        <form id="reportForm" onsubmit="submitReport(event)">
          <div class="form-group">
            <label>รถ *</label>
            <select id="rpt_car_id" required><option value="">เลือกรถ</option></select>
          </div>
          <div class="form-group">
            <label>อาการ/ปัญหา *</label>
            <textarea id="rpt_issue" rows="3" required placeholder="อธิบายอาการเสียหรือปัญหาที่พบ"></textarea>
          </div>
          <div class="form-group">
            <label>พนักงานขับรถที่แจ้ง</label>
            <select id="rpt_driver"><option value="">-- เลือก (ถ้ามี) --</option></select>
          </div>
          <div class="form-group">
            <label>เลขไมล์ปัจจุบัน</label>
            <input type="number" id="rpt_mileage" placeholder="กม.">
          </div>
          <div class="form-group">
            <label>หมายเหตุ</label>
            <textarea id="rpt_notes" rows="2" placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" id="rptSubmitBtn" style="width:100%">📩 ส่งแจ้งซ่อม</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ═══════ Modal: Workflow Action (reusable) ═══════ -->
  <div id="actionModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="actTitle">ดำเนินการ</h2>
        <button class="modal-close" onclick="closeActionModal()">×</button>
      </div>
      <div class="modal-body">
        <form id="actionForm" onsubmit="submitAction(event)">
          <div id="actFields"></div>
          <button type="submit" class="btn btn-primary" id="actSubmitBtn" style="width:100%;margin-top:.75rem">✅ ยืนยัน</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ═══════ Modal: รายละเอียดซ่อม ═══════ -->
  <div id="detailModal" class="modal-overlay">
    <div class="modal" style="max-width:650px">
      <div class="modal-header">
        <h2>🔧 รายละเอียดการซ่อม</h2>
        <button class="modal-close" onclick="closeDetailModal()">×</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <div style="background:var(--color-bg-light);padding:20px;text-align:center;color:var(--color-text-muted);font-size:.9em;margin-top:20px">
    <p>ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
  </div>

  <script>
    /* ─── State ─── */
    var vehicles = [], drivers = [], currentTab = 'workflow';
    var editingId = null, currentAction = null, currentRepairId = null;
    var isDriverMode = false;
    var _wfToken = 0;

    var STATUS_MAP = {
      requested:  { label: 'รอพิจารณา',    icon: '📨', cls: 'status-requested' },
      approved:   { label: 'อนุมัติแล้ว',   icon: '✅', cls: 'status-approved' },
      inspected:  { label: 'ตรวจสภาพแล้ว', icon: '🔍', cls: 'status-inspected' },
      documented: { label: 'ทำบันทึกแล้ว', icon: '📄', cls: 'status-documented' },
      repairing:  { label: 'กำลังซ่อม',    icon: '🔨', cls: 'status-repairing' },
      completed:  { label: 'ซ่อมเสร็จ',    icon: '✅', cls: 'status-completed' },
      rejected:   { label: 'ไม่อนุมัติ',    icon: '❌', cls: 'status-rejected' }
    };
    var STEP_ORDER = ['requested','approved','inspected','documented','repairing','completed'];

    /* ─── Init ─── */
    function waitForCommon(){return new Promise(function(resolve){if(typeof apiCall==='function'&&typeof getCurrentUser==='function'){resolve();return}var c=0;var t=setInterval(function(){c++;if(typeof apiCall==='function'&&typeof getCurrentUser==='function'){clearInterval(t);resolve()}else if(c>50){clearInterval(t);resolve()}},100)})}

    function setupDriverMode(){
      var user=getCurrentUser();
      if(!user) return;
      var hasRepairPerm = (typeof hasModulePermission==='function' && hasModulePermission('repair','view')) || (user.role==='admin');
      if(!hasRepairPerm && (user.driver_id || user.role==='driver')){
        isDriverMode=true;
        document.getElementById('summaryCards').style.display='none';
        document.querySelector('.header h1').textContent='🔧 แจ้งซ่อม';
        document.querySelector('.header p').textContent='แจ้งปัญหา/อาการเสีย และติดตามสถานะการซ่อม';
        // Hide filter dropdowns for driver
        var wfFilter=document.getElementById('wfFilterCar');
        if(wfFilter) wfFilter.style.display='none';
        var wfSFilter=document.getElementById('wfFilterStatus');
        if(wfSFilter) wfSFilter.style.display='none';
        // Auto-select driver in report form
        setTimeout(function(){
          var sel=document.getElementById('rpt_driver');
          if(sel) sel.value=user.driver_id;
        },600);
      }
    }

    document.addEventListener('DOMContentLoaded', async function(){
      await waitForCommon();
      if(typeof requireAuth==='function'&&!requireAuth()) return;
      setupDriverMode();
      await Promise.all([loadVehicles(), loadDrivers()]);
      loadWorkflow();
      if(!isDriverMode) loadSummary();
      var _params=new URLSearchParams(location.search);
      if(_params.get('from')==='inspection'){
        setTimeout(function(){
          openReportModal();
          if(_params.get('car_id')) document.getElementById('rpt_car_id').value=_params.get('car_id');
          if(_params.get('issue')) document.getElementById('rpt_issue').value=_params.get('issue');
        },800);
      }
      setTimeout(function(){if(typeof initAllThaiDateTimePickers==='function') initAllThaiDateTimePickers()},500);
    });

    /* ─── Summary KPIs ─── */
    async function loadSummary(){
      try{
        var r=await apiCall('getRepairs',{});
        var all=(r.success&&r.data)?(Array.isArray(r.data)?r.data:[]):[];
        var pending=0,progress=0,doneMonth=0,costMonth=0;
        var now=new Date();
        var ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
        all.forEach(function(rp){
          if(['requested','approved','inspected','documented'].indexOf(rp.status)!==-1) pending++;
          if(rp.status==='repairing') progress++;
          if(rp.status==='completed'){
            var dc=rp.date_completed||rp.date_reported||'';
            if(dc.substring(0,7)===ym){ doneMonth++; costMonth+=(rp.cost||0); }
          }
        });
        document.getElementById('sumPending').textContent=pending;

    /* ─── Helpers ─── */
    function vLabel(carId, row){
      // Prefer joined fields from API row when available (avoids dependence on vehicles cache)
      if(row&&(row.license_plate||row.brand||row.model)){
        return ((row.license_plate||'')+' '+(row.brand||'')+' '+(row.model||'')).trim()||carId||'-';
      }
      var v=vehicles.find(function(x){return x.id===carId});
      return v?(v.license_plate+' '+(v.brand||'')+' '+(v.model||'')).trim():carId||'-';
    }
    function dLabel(driverId){
      var d=drivers.find(function(x){return x.driver_id===driverId});
      return d?((d.title||'')+' '+(d.first_name||'')+' '+(d.last_name||'')).trim():(driverId||'-');
    }
    function fmtDate(s){
      if(!s) return '-';
      try{
        var p=s.split(/[T ]/);var dd=p[0].split('-');
        var months=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
        return parseInt(dd[2])+' '+months[parseInt(dd[1])-1]+' '+(parseInt(dd[0])+543);
      }catch(e){return s}
    }
    function statusBadge(s){
      var m=STATUS_MAP[s]||{label:s,icon:'',cls:''};
      return '<span class="status-badge '+m.cls+'">'+m.icon+' '+m.label+'</span>';
    }
    function showAlert(msg,type){
      var c=document.getElementById('alertContainer');
      c.innerHTML='<div class="alert alert-'+type+'">'+msg+'</div>';
      setTimeout(function(){c.innerHTML=''},5000);
    }

    /* ═══════════════════════════════════════════════════
       Tab 1: Workflow — แจ้งซ่อม / ติดตามสถานะ
       ═══════════════════════════════════════════════════ */
    async function loadWorkflow(){
      var el=document.getElementById('wfList');
      document.getElementById('wfLoading').style.display='block';
      el.innerHTML='';
      try{
        var filters={active_only:1};
        var fc=document.getElementById('wfFilterCar').value;
        var fs=document.getElementById('wfFilterStatus').value;
        if(fc) filters.car_id=fc;
        var r=await apiCall('getRepairs',filters);
        var allRaw=(r.success&&r.data)?(Array.isArray(r.data)?r.data:[]):[];
        // Build status bar (allRaw มีแต่ active records แล้ว)
        var counts={};
        allRaw.forEach(function(rp){counts[rp.status]=(counts[rp.status]||0)+1});
        var totalActive=allRaw.length;
        var barDefs=[{s:'',l:'ทั้งหมด'},{s:'requested',l:'รอพิจารณา'},{s:'approved',l:'อนุมัติแล้ว'},{s:'inspected',l:'ตรวจสภาพ'},{s:'documented',l:'ทำบันทึก'},{s:'repairing',l:'กำลังซ่อม'},{s:'rejected',l:'ไม่อนุมัติ'}];
        var barHtml='';
        barDefs.forEach(function(b){
          var n=b.s?(counts[b.s]||0):totalActive;
          if(!b.s||n>0){barHtml+='<button class="wsb'+(fs===b.s?' on':'')+'" onclick="setWfStatus(\''+b.s+'\')">'+b.l+' <span class="wsb-n">'+n+'</span></button>'}
        });
        document.getElementById('wfStatusBar').innerHTML=barHtml;
        // Client-side status filter (ไม่ต้อง filter completed เพราะ server กรองแล้ว)
        var list=fs?allRaw.filter(function(x){return x.status===fs}):allRaw;
        // In driver mode, show only this driver's reports
        if(isDriverMode){
          var user=getCurrentUser();
          if(user&&user.driver_id){
            list=list.filter(function(x){return x.requested_by_driver_id==user.driver_id||x.reporter_name===(user.full_name||'')});
          }
        }
        if(list.length===0){
          el.innerHTML='<div class="empty-state"><div class="empty-state-icon">🔧</div><p>'+(isDriverMode?'ยังไม่มีรายการแจ้งซ่อมของคุณ':'ไม่มีรายการแจ้งซ่อม')+'</p></div>';
        } else {
          el.innerHTML='';
          // Chunked rendering: render 15 cards ต่อ frame ป้องกัน UI ค้าง
          var _idx=0; var _tkn=++_wfToken;
          (function renderChunk(){
            if(_tkn!==_wfToken) return;
            var html='';
            for(var _end=Math.min(_idx+15,list.length);_idx<_end;_idx++) html+=renderWorkflowCard(list[_idx]);
            el.insertAdjacentHTML('beforeend',html);
            if(_idx<list.length) requestAnimationFrame(renderChunk);
          })();
        }
      }catch(e){console.error(e);el.innerHTML='<p style="color:var(--color-danger)">โหลดข้อมูลไม่สำเร็จ</p>'}
      finally{document.getElementById('wfLoading').style.display='none'}
    }

    function setWfStatus(s){
      document.getElementById('wfFilterStatus').value=s;
      loadWorkflow();
    }

    function renderWorkflowCard(rp){
      var user=getCurrentUser();
      var isAdmin=user&&(user.role==='admin'||hasModulePermission('repair','edit'));
      var sm=STATUS_MAP[rp.status]||{label:rp.status,icon:'',cls:''};
      var borderColors={requested:'#f59e0b',approved:'#3b82f6',inspected:'#6366f1',documented:'#8b5cf6',repairing:'#ec4899',completed:'#10b981',rejected:'#ef4444'};

      var html='<div class="repair-card" style="border-left:4px solid '+(borderColors[rp.status]||'var(--color-border)')+'">';
      html+='<div class="repair-card-header">';
      html+='<div class="repair-card-title">'+vLabel(rp.car_id, rp)+'</div>';
      html+=statusBadge(rp.status);
      html+='</div>';
      html+='<div class="repair-card-body">';
      html+='<p>📝 '+(rp.issue_description||'-')+'</p>';
      html+='<p style="font-size:.8rem;color:var(--color-text-muted)">📅 '+fmtDate(rp.date_reported)+' • 👤 '+(rp.reporter_name||'-')+'</p>';

      // Horizontal stepper
      var currentIdx=STEP_ORDER.indexOf(rp.status);
      var isRejected=rp.status==='rejected';
      var stepShort={requested:'แจ้ง',approved:'อนุมัติ',inspected:'ตรวจ',documented:'บันทึก',repairing:'ซ่อม',completed:'เสร็จ'};
      html+='<div class="stepper">';
      STEP_ORDER.forEach(function(step,i){
        var isDone=i<currentIdx;
        var isActive=i===currentIdx;
        var cls=isDone?'done':(isActive?'active':'');
        if(isRejected&&i===0) cls='rejected';
        var sl=STATUS_MAP[step]||{icon:''};
        html+='<div class="stepper-step '+cls+'">';
        html+='<div class="stepper-dot">'+(isDone?'✓':(isActive?sl.icon:''))+'</div>';
        html+='<div class="stepper-label">'+stepShort[step]+'</div>';
        html+='</div>';
      });
      if(isRejected){
        html+='<div class="stepper-step rejected">';
        html+='<div class="stepper-dot">✕</div>';
        html+='<div class="stepper-label">ปฏิเสธ</div>';
        html+='</div>';
      }
      html+='</div>';
      if(rp.status==='repairing'&&rp.garage_name) html+='<p style="font-size:.8rem;color:var(--color-text-muted)">🏪 '+rp.garage_name+'</p>';
      if(rp.status==='completed'&&rp.cost) html+='<p style="font-size:.8rem;color:var(--color-text-muted)">💰 '+rp.cost.toLocaleString()+' บาท</p>';
      if(isRejected&&rp.rejection_reason) html+='<p style="font-size:.8rem;color:var(--color-danger)">❌ '+rp.rejection_reason+'</p>';
      html+='</div>'; // end body

      html+='<div class="repair-card-actions">';
      if(isAdmin&&!isRejected){
        if(rp.status==='requested'){
          html+='<button class="btn btn-primary" style="padding:5px 14px;font-size:.84rem" onclick="openAction(\'approve\',\''+rp.id+'\')">✅ อนุมัติ</button>';
          html+='<button class="btn btn-danger" style="padding:5px 14px;font-size:.84rem" onclick="openAction(\'reject\',\''+rp.id+'\')">❌ ไม่อนุมัติ</button>';
        }
        if(rp.status==='approved') html+='<button class="btn btn-primary" style="padding:5px 14px;font-size:.84rem" onclick="openAction(\'inspect\',\''+rp.id+'\')">🔍 ตรวจสภาพ</button>';
        if(rp.status==='inspected') html+='<button class="btn btn-primary" style="padding:5px 14px;font-size:.84rem" onclick="openAction(\'document\',\''+rp.id+'\')">📄 ทำบันทึก</button>';
        if(rp.status==='documented') html+='<button class="btn btn-primary" style="padding:5px 14px;font-size:.84rem" onclick="openAction(\'start-repair\',\''+rp.id+'\')">🔨 เริ่มซ่อม</button>';
        if(rp.status==='repairing') html+='<button class="btn btn-primary" style="padding:5px 14px;font-size:.84rem" onclick="openAction(\'complete\',\''+rp.id+'\')">✅ ซ่อมเสร็จ</button>';
      }
      html+='<div class="spacer"></div>';
      html+='<button class="btn btn-ghost" style="padding:5px 12px;font-size:.84rem" onclick="showDetail(\''+rp.id+'\')">📄 ดูเพิ่มเติม</button>';
      html+='</div>';
      if(typeof renderAuditMeta==='function') html+=renderAuditMeta(rp);
      html+='</div>'; // end card
      return html;
    }

        if(rp.taken_by) html+='<div class="detail-item"><label>ผู้นำไปซ่อม</label><span>'+rp.taken_by+'</span></div>';
        if(rp.claim_number) html+='<div class="detail-item"><label>เลขเคลม/อุบัติเหตุ</label><span>'+rp.claim_number+'</span></div>';
        if(rp.insurance_company) html+='<div class="detail-item"><label>บริษัทประกัน</label><span>'+rp.insurance_company+'</span></div>';
        html+='</div>';
        // ค่าใช้จ่าย
        if(rp.labour_cost||rp.parts_cost||rp.grand_total||rp.cost){
          html+='<hr style="margin:1rem 0;border-color:var(--color-border)">';
          html+='<strong style="font-size:.9rem">💰 ค่าใช้จ่าย</strong>';
          html+='<div class="detail-grid" style="margin-top:.5rem">';
          if(rp.labour_cost) html+='<div class="detail-item"><label>ค่าแรง</label><span>'+rp.labour_cost.toLocaleString()+' บาท</span></div>';
          if(rp.parts_cost) html+='<div class="detail-item"><label>ค่าอะไหล่</label><span>'+rp.parts_cost.toLocaleString()+' บาท</span></div>';
          if(rp.discount_amount) html+='<div class="detail-item"><label>ส่วนลด</label><span>-'+rp.discount_amount.toLocaleString()+' บาท</span></div>';
          if(rp.vat_amount) html+='<div class="detail-item"><label>VAT 7%</label><span>'+rp.vat_amount.toLocaleString()+' บาท</span></div>';
          var total=rp.grand_total||rp.cost||0;
          html+='<div class="detail-item"><label>ยอดรวมทั้งสิ้น</label><span style="font-weight:700;color:var(--color-primary)">'+total.toLocaleString()+' บาท</span></div>';
          html+='</div>';
        }
        // รายการอะไหล่แยกชิ้น
        if(rp.items_detail&&rp.items_detail.length){
          html+='<hr style="margin:1rem 0;border-color:var(--color-border)">';
          html+='<strong style="font-size:.9rem">🔩 รายการอะไหล่/ค่าแรง</strong>';
          html+='<div style="overflow-x:auto;margin-top:.5rem"><table class="table" style="font-size:.82rem"><thead><tr>';
          html+='<th>รหัส</th><th>รายการ</th><th>จำนวน</th><th>ราคา/หน่วย</th><th>ส่วนลด</th><th>สุทธิ</th></tr></thead><tbody>';
          rp.items_detail.forEach(function(it){
            html+='<tr>';
            html+='<td>'+(it.part_code||'-')+'</td>';
            html+='<td>'+(it.description||'-')+'</td>';
            html+='<td>'+(it.quantity||1)+'</td>';
            html+='<td>'+(it.unit_price?it.unit_price.toLocaleString():'-')+'</td>';
            html+='<td>'+(it.discount_amount?it.discount_amount.toLocaleString():'-')+'</td>';
            html+='<td>'+(it.net_amount?it.net_amount.toLocaleString():'-')+'</td>';
            html+='</tr>';
          });
          html+='</tbody></table></div>';
        }
        html+='<hr style="margin:1rem 0;border-color:var(--color-border)">';
        html+='<p><strong>อาการ:</strong> '+(rp.issue_description||'-')+'</p>';
        if(rp.repair_items){
          var items=[];try{items=JSON.parse(rp.repair_items)}catch(e){items=rp.repair_items?[rp.repair_items]:[]}
          if(items.length) html+='<p><strong>รายการซ่อม:</strong> '+items.join(', ')+'</p>';
        }
        if(rp.notes) html+='<p><strong>หมายเหตุ:</strong> '+rp.notes+'</p>';
        if(rp.inspection_notes) html+='<p><strong>ผลตรวจสภาพ:</strong> '+rp.inspection_notes+'</p>';
        if(rp.memo_notes) html+='<p><strong>บันทึกข้อความ:</strong> '+rp.memo_notes+'</p>';
        if(rp.rejection_reason) html+='<p style="color:var(--color-danger)"><strong>เหตุผลที่ไม่อนุมัติ:</strong> '+rp.rejection_reason+'</p>';

        // Documents
        var docs=[
          {label:'ใบเสนอราคา',key:'quotation_documents'},
          {label:'บันทึกข้อความ',key:'memo_documents'},
          {label:'ใบเสร็จ',key:'receipt_documents'},
          {label:'เอกสาร',key:'documents'}
        ];
        docs.forEach(function(d){
          if(rp[d.key]){
            var arr=[];try{arr=JSON.parse(rp[d.key])}catch(e){}
            if(arr.length){
              html+='<p style="margin-top:8px"><strong>'+d.label+':</strong></p><div class="file-chips">';
              arr.forEach(function(url,i){
                html+='<a class="file-chip" href="'+url+'" target="_blank">📎 ไฟล์ '+(i+1)+'</a>';
              });
              html+='</div>';
            }
          }
        });

        // ผู้บันทึก / ผู้แก้ไข
        if(typeof renderAuditMeta==='function'){
          html+='<hr style="margin:1rem 0;border-color:var(--color-border)">';
          html+=renderAuditMeta(rp);
        }

        body.innerHTML=html;
      }catch(e){body.innerHTML='<p style="color:var(--color-danger)">เกิดข้อผิดพลาด</p>'}
    }
    function closeDetailModal(){document.getElementById('detailModal').classList.remove('show')}
  </script>
</body>
</html>
