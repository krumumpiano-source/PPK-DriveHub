<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าระบบ - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>window.API_BASE_URL = CONFIG.API_BASE_URL; window.currentPage = 'settings';</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <script>
    window.REQUIRE_AUTH = true;
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { }

    .container { });
            await apiCall('updateSystemSetting', { key: 'tax_alert_months', value: taxMonths });
            await apiCall('updateSystemSetting', { key: 'insurance_alert_months', value: insMonths });

            for (var i = 0; i < maintenanceItems.length; i++) {
              var item = maintenanceItems[i];
              var kmVal = parseInt(el('maintenance_' + item.key + '_km') && el('maintenance_' + item.key + '_km').value, 10);
              var moVal = parseInt(el('maintenance_' + item.key + '_months') && el('maintenance_' + item.key + '_months').value, 10);
              if (isNaN(kmVal)) kmVal = item.default_km;
              if (isNaN(moVal)) moVal = item.default_months;
              await apiCall('updateSystemSetting', { key: 'maintenance_' + item.key + '_km', value: kmVal });
              await apiCall('updateSystemSetting', { key: 'maintenance_' + item.key + '_months', value: moVal });
            }

            showAlert('บันทึกการตั้งค่าสำเร็จ', 'success');
          } catch (error) {
            console.error('Error saving settings:', error);
            showAlert(typeof handleError !== 'undefined' ? handleError(error) : 'บันทึกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
          }
        }

        async function resetToDefault() {
          if (!confirm('คุณต้องการรีเซ็ตการตั้งค่าทั้งหมดเป็นค่าเริ่มต้นหรือไม่?')) {
            return;
          }

          try {
            var result = await apiCall('resetAdminSettingsToDefault', {});

            if (result.success) {
              showAlert('รีเซ็ตเป็นค่าเริ่มต้นสำเร็จ', 'success');
              loadSettings();
            } else {
              showAlert(typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'), 'error');
            }
          } catch (error) {
            showAlert(typeof handleError !== 'undefined' ? handleError(error) : 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
          }
        }

        function showAlert(message, type) {
          var container = document.getElementById('alertContainer');
          var alert = document.createElement('div');
          alert.className = 'alert alert-' + type;
          alert.textContent = message;
          container.innerHTML = '';
          container.appendChild(alert);

          setTimeout(function () {
            alert.remove();
          }, 5000);
        }
      </script>

      <div
        style="background: var(--color-bg-light); padding: 20px; text-align: center; color: var(--color-text-muted); font-size: 0.9em; margin-top: 20px;">
        <p>ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
      </div>
    </body>

</html>
