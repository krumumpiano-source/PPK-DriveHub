<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>การแจ้งเตือน - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>window.API_BASE_URL = CONFIG.API_BASE_URL; window.currentPage = 'notifications'; window.REQUIRE_AUTH = true;</script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    .notification-item {
      background: white;
      border: 2px solid #e9ecef;
      border-radius: var(--radius-xl);
      padding: 20px;
      margin-bottom: 15px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .notification-item:hover {
      box-shadow: var(--shadow-card);
      transform: translateY(-2px);
    }

    .notification-item.unread {
      border-left: 4px solid var(--color-primary);
      background: var(--color-bg-light);
    }

    .notification-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .notification-title {
      font-size: 1.1em;
      font-weight: 600;
      color: var(--color-text);
    }

    .notification-time {
      font-size: 0.85em;
      color: var(--color-text-muted);
    }

    .notification-message {
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    .notification-type {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75em;
      font-weight: 600;
      margin-top: 10px;
    }

    .type-queue {
      background: var(--color-bg-info);
      color: #1976d2;
    }

    .type-fuel {
      background: var(--color-bg-warning);
      color: #f57c00;
    }

    .type-repair {
      background: #fce4ec;
      color: #c2185b;
    }

    .type-system {
      background: var(--color-bg-success);
      color: #388e3c;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🔔 การแจ้งเตือน</h1>
      <p>ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>

    <div id="navigation"></div>

    <div class="content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>การแจ้งเตือนทั้งหมด</h2>
        <button class="btn btn-primary" onclick="markAllAsRead()">✓ ทำเครื่องหมายว่าอ่านทั้งหมด</button>
      </div>

      <div id="notificationsList">
        <div class="loading">กำลังโหลดข้อมูล...</div>
      </div>
    </div>
  </div>


  <script>
    // Check authentication (ไม่ redirect — ให้แสดงหน้าได้)
    var isAuthenticated = requireAuth();
    if (!isAuthenticated) {
      console.warn('Not authenticated, but showing page anyway');
    }

    var currentUser = getCurrentUser();

    async function initPage() {
      await loadNotifications();

      // Auto refresh every 30 seconds
      setInterval(function () {
        loadNotifications();
      }, 30000);
    }

    async function loadNotifications() {
      try {
        showLoading('notificationsList');

        var result = await apiCall('getNotifications', {});
        hideLoading('notificationsList');

        if (result.success && result.data && result.data.notifications && result.data.notifications.length > 0) {
          var notifications = result.data.notifications;

          var html = '';
          notifications.forEach(function (notif) {
            var isUnread = !notif.read;
            var typeClass = 'type-' + (notif.type || 'system');

            html += '<div class="notification-item' + (isUnread ? ' unread' : '') + '" onclick="markAsRead(\'' + notif.id + '\'); return false;">';
            html += '<div class="notification-header">';
            html += '<div class="notification-title">' + (notif.title || 'การแจ้งเตือน') + '</div>';
            html += '<div class="notification-time">' + formatNotificationTime(notif.created_at) + '</div>';
            html += '</div>';
            html += '<div class="notification-message">' + (notif.message || '') + '</div>';
            html += '<span class="notification-type ' + typeClass + '">' + getNotificationTypeLabel(notif.type) + '</span>';
            html += '</div>';
          });

          document.getElementById('notificationsList').innerHTML = html;
        } else {
          document.getElementById('notificationsList').innerHTML = '<div class="empty-state">ไม่มีการแจ้งเตือน</div>';
        }
      } catch (error) {
        hideLoading('notificationsList');
        document.getElementById('notificationsList').innerHTML = '<div class="empty-state">' + handleError(error) + '</div>';
      }
    }

    // Mark notification as read
    async function markAsRead(notificationId) {
      try {
        showLoading('notificationsList');
        var result = await apiCall('markNotificationRead', { notificationId: notificationId });
        hideLoading('notificationsList');
        if (result.success) {
          loadNotifications();
        } else {
          showAlert(typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'), 'error');
        }
      } catch (error) {
        hideLoading('notificationsList');
        showAlert(handleError(error), 'error');
      }
    }

    // Mark all as read
    async function markAllAsRead() {
      try {
        var notifications = document.querySelectorAll('.notification-item.unread');
        if (notifications.length === 0) {
          showAlert('ไม่มีการแจ้งเตือนที่ยังไม่ได้อ่าน', 'info');
          return;
        }

        if (!showConfirm('คุณต้องการทำเครื่องหมายว่าอ่านทั้งหมดหรือไม่?',
          function () {
            doMarkAllAsRead(notifications);
          }
        )) return;
      } catch (error) {
        showAlert(handleError(error), 'error');
      }
    }

    async function doMarkAllAsRead(notifications) {
      try {
        showLoading('notificationsList');
        var promises = [];

        notifications.forEach(function (item) {
          var onclickAttr = item.getAttribute('onclick');
          if (onclickAttr) {
            var match = onclickAttr.match(/'([^']+)'/);
            if (match && match[1]) {
              promises.push(apiCall('markNotificationRead', { notificationId: match[1] }));
            }
          }
        });

        await Promise.all(promises);
        hideLoading('notificationsList');
        showAlert('ทำเครื่องหมายว่าอ่านทั้งหมดแล้ว', 'success');
        loadNotifications();
      } catch (error) {
        hideLoading('notificationsList');
        showAlert(handleError(error), 'error');
      }
    }

    // Format notification time
    function formatNotificationTime(dateString) {
      if (!dateString) return '';
      var date = new Date(dateString);
      var now = new Date();
      var diff = now - date;

      var minutes = Math.floor(diff / 60000);
      var hours = Math.floor(minutes / 60);
      var days = Math.floor(hours / 24);

      if (minutes < 1) return 'เมื่อสักครู่';
      if (minutes < 60) return minutes + ' นาทีที่แล้ว';
      if (hours < 24) return hours + ' ชั่วโมงที่แล้ว';
      if (days < 7) return days + ' วันที่แล้ว';

      return formatDateThai(dateString.split('T')[0]);
    }

    function getNotificationTypeLabel(type) {
      var labels = {
        'queue': 'คิวรถ',
        'fuel': 'น้ำมัน',
        'repair': 'ซ่อมบำรุง',
        'system': 'ระบบ'
      };
      return labels[type] || 'อื่นๆ';
    }

    initPage();
  </script>

  <div class="footer"
    style="background: var(--color-bg-light); padding: 20px; text-align: center; color: var(--color-text-muted); border-top: 2px solid #e9ecef; font-size: 0.9em; margin-top: 40px;">
    <p>ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
  </div>
</body>

</html>
