<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>เลือกรายการ - PPK DriveHub</title>
  <script>/* URLSearchParams polyfill */
  if(!window.URLSearchParams){window.URLSearchParams=function(q){var d={};(q||'').replace(/^\?/,'').split('&').forEach(function(s){if(!s)return;var i=s.indexOf('='),k=decodeURIComponent((i<0?s:s.slice(0,i)).replace(/\+/g,' '));d[k]=i<0?'':decodeURIComponent(s.slice(i+1).replace(/\+/g,' '));});this.get=function(k){return d.hasOwnProperty(k)?d[k]:null};this.has=function(k){return d.hasOwnProperty(k)};};};
  </script>
  <script src="config.js"></script>
  <script>window.API_BASE_URL = CONFIG.API_BASE_URL; window.currentPage = 'qr-hub'; window.REQUIRE_AUTH = false;</script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-family), sans-serif;
      background: #1e293b;
      background: -webkit-linear-gradient(315deg, #1e293b 0%, #334155 50%, #1e293b 100%);
      background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%);
      min-height: 100vh;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* hub-container: opacity:1 เสมอ — ห้ามซ่อน */
    .hub-container {
      background: white;
      border-radius: 24px;
      -webkit-box-shadow: 0 25px 80px rgba(0,0,0,0.5);
      box-shadow: 0 25px 80px rgba(0,0,0,0.5);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
      opacity: 1; /* fallback สำคัญ */
    }

    /* Animation เป็น progressive enhancement เท่านั้น */
    @supports (animation: a 0s ease both) {
      .hub-container {
        -webkit-animation: hub-in 0.35s ease-out both;
        animation: hub-in 0.35s ease-out both;
      }
    }
    @-webkit-keyframes hub-in {
      from { opacity: 0; -webkit-transform: scale(0.9) translateY(20px); transform: scale(0.9) translateY(20px); }
      to   { opacity: 1; -webkit-transform: none; transform: none; }
    }
    @keyframes hub-in {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to   { opacity: 1; transform: none; }
    }

    .hub-header {
      background: #4f46e5;
      background: -webkit-linear-gradient(135deg, #4f46e5, #7c3aed);
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      padding: 24px 20px 20px;
      text-align: center;
    }

    .hub-header-icon {
      font-size: 2.4em;
      margin-bottom: 8px;
      display: block;
      line-height: 1;
    }

    .hub-car-name {
      font-size: 1.35em;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .hub-car-detail {
      font-size: 0.85em;
      opacity: 0.8;
      min-height: 1.2em;
    }

    .hub-prompt {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.88em;
      font-weight: 500;
      margin-top: 12px;
      display: inline-block;
    }

    /* Loading skeleton */
    .hub-car-name.loading {
      background: rgba(255,255,255,0.25);
      border-radius: 6px;
      color: transparent;
      min-width: 120px;
      display: inline-block;
      -webkit-animation: shimmer 1.2s ease-in-out infinite;
      animation: shimmer 1.2s ease-in-out infinite;
    }
    @-webkit-keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }
    @keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }

    .hub-body {
      padding: 20px 16px 16px;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-box-direction: normal;
      -webkit-flex-direction: column;
      flex-direction: column;
    }

    .hub-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 18px 20px;
      cursor: pointer;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      text-align: left;
      text-decoration: none;
      color: white;
      font-family: var(--font-family), sans-serif;
      margin-bottom: 10px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-transition: opacity 0.12s;
      transition: opacity 0.12s;
    }
    .hub-btn:last-child { margin-bottom: 0; }
    .hub-btn:active { opacity: 0.82; }
    .hub-btn:hover { text-decoration: none; }

    .hub-btn-icon {
      font-size: 1.8em;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      width: 44px;
      text-align: center;
      margin-right: 14px; /* ใช้ margin แทน gap เพื่อรองรับทุก browser */
    }

    .hub-btn-title {
      font-size: 1em;
      font-weight: 700;
      line-height: 1.2;
      display: block;
    }
    .hub-btn-sub {
      font-size: 0.78em;
      opacity: 0.82;
      margin-top: 2px;
      display: block;
    }

    .btn-usage  { background: #4f46e5; background: -webkit-linear-gradient(135deg,#4f46e5,#6366f1); background: linear-gradient(135deg,#4f46e5,#6366f1); -webkit-box-shadow: 0 4px 16px rgba(79,70,229,0.35); box-shadow: 0 4px 16px rgba(79,70,229,0.35); }
    .btn-fuel   { background: #059669; background: -webkit-linear-gradient(135deg,#059669,#10b981); background: linear-gradient(135deg,#059669,#10b981); -webkit-box-shadow: 0 4px 16px rgba(5,150,105,0.35); box-shadow: 0 4px 16px rgba(5,150,105,0.35); }
    .btn-check  { background: #d97706; background: -webkit-linear-gradient(135deg,#d97706,#f59e0b); background: linear-gradient(135deg,#d97706,#f59e0b); -webkit-box-shadow: 0 4px 16px rgba(217,119,6,0.32); box-shadow: 0 4px 16px rgba(217,119,6,0.32); }
    .btn-repair { background: #dc2626; background: -webkit-linear-gradient(135deg,#dc2626,#ef4444); background: linear-gradient(135deg,#dc2626,#ef4444); -webkit-box-shadow: 0 4px 16px rgba(220,38,38,0.30); box-shadow: 0 4px 16px rgba(220,38,38,0.30); }

    .hub-footer {
      text-align: center;
      padding: 12px 16px 18px;
      font-size: 0.75em;
      color: #94a3b8;
      border-top: 1px solid #f1f5f9;
    }
  </style>
</head>
<body>
  <div class="hub-container">
    <div class="hub-header">
      <span class="hub-header-icon">&#128661;</span>
      <div class="hub-car-name loading" id="carName">กำลังโหลด...</div>
      <div class="hub-car-detail" id="carDetail"></div>
      <div class="hub-prompt">เลือกรายการที่ต้องการ</div>
    </div>

    <div class="hub-body">
      <a class="hub-btn btn-usage" id="btnUsage" href="#">
        <span class="hub-btn-icon">&#128203;</span>
        <span class="hub-btn-text">
          <span class="hub-btn-title">บันทึกการใช้รถ</span>
          <span class="hub-btn-sub">ออกเดินทาง / กลับจากเดินทาง</span>
        </span>
      </a>
      <a class="hub-btn btn-fuel" id="btnFuel" href="#">
        <span class="hub-btn-icon">&#9981;</span>
        <span class="hub-btn-text">
          <span class="hub-btn-title">บันทึกเติมน้ำมัน</span>
          <span class="hub-btn-sub">บันทึกการเติมน้ำมัน ลิตร/ราคา</span>
        </span>
      </a>
      <a class="hub-btn btn-check" id="btnCheck" href="#">
        <span class="hub-btn-icon">&#10003;</span>
        <span class="hub-btn-text">
          <span class="hub-btn-title">ตรวจสภาพรถประจำวัน</span>
          <span class="hub-btn-sub">ตรวจสภาพก่อนออกเดินทาง</span>
        </span>
      </a>
      <a class="hub-btn btn-repair" id="btnRepair" href="#">
        <span class="hub-btn-icon">&#128295;</span>
        <span class="hub-btn-text">
          <span class="hub-btn-title">แจ้งซ่อม</span>
          <span class="hub-btn-sub">แจ้งปัญหา / ความเสียหาย</span>
        </span>
      </a>
    </div>

    <div class="hub-footer">
      PPK DriveHub &#8212; โรงเรียนพะเยาพิทยาคม
    </div>
  </div>

  <script>
    var carId = null;

    function getBase() {
      var origin = window.location.origin ||
        (window.location.protocol + '//' + window.location.hostname +
         (window.location.port ? ':' + window.location.port : ''));
      return origin + window.location.pathname.replace(/[^/]*$/, '');
    }

    function init() {
      try {
        var params = new URLSearchParams(window.location.search);
        carId = params.get('car') || params.get('qr') || params.get('car_id');

        if (!carId) {
          document.getElementById('carName').textContent = 'ไม่พบรหัสรถ';
          document.getElementById('carName').className = 'hub-car-name';
          document.getElementById('carDetail').textContent = 'กรุณาสแกน QR Code ที่ถูกต้อง';
          disableAll();
          return;
        }

        var base = getBase();
        var enc = encodeURIComponent(carId);

        document.getElementById('btnUsage').href = base + 'qr-usage-record.html?car=' + enc;
        document.getElementById('btnFuel').href  = base + 'qr-fuel-record.html?car='  + enc;
        document.getElementById('btnCheck').href = base + 'qr-daily-check.html?car='  + enc;

        var token = (typeof API !== 'undefined') ? API.getToken() : null;
        var repairUrl = base + 'repair.html?car_id=' + enc;
        document.getElementById('btnRepair').href = token
          ? repairUrl
          : base + 'login.html?next=' + encodeURIComponent(repairUrl);

        // Load car name
        var nameEl = document.getElementById('carName');
        if (typeof fetch !== 'undefined') {
          fetch('/api/vehicles/qr-info?car_id=' + enc)
            .then(function(r) { return r.json(); })
            .catch(function() { return {}; })
            .then(function(res) {
              nameEl.className = 'hub-car-name';
              if (res && res.success && res.data) {
                var d = res.data;
                nameEl.textContent = d.license_plate || carId;
                var parts = [];
                if (d.brand) parts.push(d.brand);
                if (d.model) parts.push(d.model);
                if (d.fuel_type) parts.push(d.fuel_type);
                document.getElementById('carDetail').textContent = parts.join(' · ');
              } else {
                nameEl.textContent = 'ทะเบียน: ' + carId;
                document.getElementById('carDetail').textContent = 'ไม่พบข้อมูลในระบบ';
              }
            });
        } else {
          nameEl.className = 'hub-car-name';
          nameEl.textContent = 'ทะเบียน: ' + carId;
        }
      } catch (e) {
        try {
          document.getElementById('carName').className = 'hub-car-name';
          document.getElementById('carName').textContent = 'เกิดข้อผิดพลาด';
          document.getElementById('carDetail').textContent = e.message || '';
        } catch (e2) {}
      }
    }

    function disableAll() {
      var ids = ['btnUsage', 'btnFuel', 'btnCheck', 'btnRepair'];
      for (var i = 0; i < ids.length; i++) {
        var el = document.getElementById(ids[i]);
        if (el) {
          el.style.opacity = '0.4';
          el.style.pointerEvents = 'none';
          el.removeAttribute('href');
        }
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
