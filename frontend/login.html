<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>window.API_BASE_URL = CONFIG.API_BASE_URL; window.currentPage = 'login';</script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background: var(--gradient-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: var(--radius-2xl);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      max-width: 440px;
      width: 100%;
      overflow: hidden;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      background: var(--gradient-primary);
      color: white;
      padding: 36px 30px 32px;
      text-align: center;
    }

    .login-header h1 {
      font-size: 1.9em;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .login-header p {
      font-size: 0.92em;
      opacity: 0.92;
      line-height: 1.5;
    }

    .login-body {
      padding: 32px 30px 28px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--color-text);
      font-weight: 600;
      font-size: 0.93em;
    }

    .form-group input {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e2e8f0;
      border-radius: var(--radius-md);
      font-size: 1em;
      transition: all 0.25s;
      font-family: inherit;
      background: #f8fafc;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(66,133,244,0.15);
      background: #fff;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 48px;
    }

    .toggle-password {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 10px;
      font-size: 1.2em;
      color: #94a3b8;
      transition: color 0.2s;
      border-radius: var(--radius-sm);
      line-height: 1;
    }

    .toggle-password:hover {
      color: var(--color-primary);
    }

    .login-links {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 24px;
    }

    .login-links a {
      color: var(--color-primary);
      text-decoration: none;
      font-size: 0.9em;
      font-weight: 500;
      transition: color 0.2s;
    }

    .login-links a:hover {
      color: var(--color-primary-dark, #1a56db);
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 15px 20px;
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 14px rgba(30,64,175,0.35);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(30,64,175,0.45);
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login .btn-icon {
      font-size: 1.3em;
    }

    .btn-register {
      width: 100%;
      padding: 14px 20px;
      background: white;
      color: #1e40af;
      border: 2px solid #93c5fd;
      border-radius: 12px;
      font-size: 1.02em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-register:hover {
      background: #eff6ff;
      border-color: #3b82f6;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59,130,246,0.2);
    }

    .btn-register .btn-icon {
      font-size: 1.2em;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: #94a3b8;
      font-size: 0.85em;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e2e8f0;
    }

    .divider span {
      padding: 0 14px;
    }

    .alert {
      padding: 12px 15px;
      border-radius: var(--radius-md);
      margin-bottom: 20px;
      font-size: 0.9em;
    }

    .alert-error {
      background: var(--color-bg-danger);
      color: var(--color-danger-dark);
      border-left: 4px solid #c62828;
    }

    .alert-success {
      background: var(--color-bg-success);
      color: var(--color-secondary-dark);
      border-left: 4px solid #2e7d32;
    }

    .login-logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 18px;
      background: rgba(255,255,255,0.18);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      border: 2px solid rgba(255,255,255,0.25);
    }

    .login-logo svg {
      width: 52px;
      height: 52px;
      fill: white;
    }

    .login-footer {
      margin-top: 24px;
      text-align: center;
      color: rgba(255, 255, 255, 0.88);
      font-size: 0.88em;
      max-width: 440px;
      line-height: 1.6;
    }

    .login-footer p {
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5z"/><circle cx="7.5" cy="14.5" r="1.5"/><circle cx="16.5" cy="14.5" r="1.5"/></svg>
      </div>
      <h1>PPK DriveHub</h1>
      <p>ระบบจัดการยานพาหนะ<br>โรงเรียนพะเยาพิทยาคม 2569</p>
    </div>
    <div class="login-body">
      <div id="alert-container"></div>

      <form id="loginForm" onsubmit="handleLogin(event); return false;">
        <div class="form-group">
          <label for="username">ชื่อผู้ใช้ / รหัสประจำตัว</label>
          <input type="text" id="username" name="username" required autocomplete="username" autofocus
            placeholder="กรอกชื่อผู้ใช้หรืออีเมล">
        </div>

        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" required autocomplete="current-password"
              placeholder="กรอกรหัสผ่าน">
            <button type="button" class="toggle-password" onclick="togglePassword('password', this)" title="แสดง/ซ่อนรหัสผ่าน">
              👁️
            </button>
          </div>
        </div>

        <div class="login-links">
          <a href="forgot-password.html">ลืมรหัสผ่าน?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-icon">➡️</span>
          <span>เข้าสู่ระบบ</span>
        </button>
      </form>

      <div class="divider"><span>หรือ</span></div>

      <button type="button" class="btn-register" onclick="window.location.href='register.html'">
        <span class="btn-icon">✍️</span>
        <span>สมัครเข้าใช้งานครั้งแรก</span>
      </button>
    </div>
  </div>

  <script>
    function togglePassword(inputId, btn) {
      var input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
        btn.title = 'ซ่อนรหัสผ่าน';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
        btn.title = 'แสดงรหัสผ่าน';
      }
    }

    // handleLogin is specific to this page

    // Auto-redirect to setup if no admin exists
    (async function checkNeedsSetup() {
      try {
        var result = await API.get('/api/setup');
        if (result.success && result.data && result.data.needs_setup) {
          window.location.href = 'setup.html';
        }
      } catch (e) { /* ignore */ }
    })();

    async function handleLogin(event) {
      event.preventDefault();

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var loginBtn = document.getElementById('loginBtn');
      var alertContainer = document.getElementById('alert-container');

      if (!username || !password) {
        showAlert('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน', 'error');
        return;
      }

      // Disable button
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="btn-icon">⏳</span><span>กำลังเข้าสู่ระบบ...</span>';
      alertContainer.innerHTML = '';

      try {
        var result = await apiCall('login', {
          username: username,
          password: password
        });

        if (result.success && result.data && result.data.token) {
          // Save Bearer token + user via API helper
          var rememberMe = document.getElementById('remember-me') ? document.getElementById('remember-me').checked : true;
          API.setToken(result.data.token, rememberMe);
          // Build user object from flat response
          var userData = {
            id: result.data.user_id,
            username: result.data.username,
            display_name: result.data.display_name,
            role: result.data.role,
            permissions: result.data.permissions || {},
            must_change_password: result.data.must_change_password,
            pdpa_accepted: result.data.pdpa_accepted
          };
          API.setUser(userData);

          if (result.data.must_change_password) {
            alert('กรุณาเปลี่ยนรหัสผ่านก่อนใช้งาน');
            window.location.href = 'change-password.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        } else {
          var msg = (result.message && /[\u0E00-\u0E7F]/.test(result.message)) ? result.message : 'เข้าสู่ระบบไม่สำเร็จ กรุณาตรวจสอบชื่อผู้ใช้และรหัสผ่าน';
          showAlert(msg, 'error');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<span class="btn-icon">➡️</span><span>เข้าสู่ระบบ</span>';
        }
      } catch (error) {
        var msg = error.message || 'ดำเนินการไม่สำเร็จ';
        if (msg === 'AUTHENTICATION_REQUIRED') msg = 'กรุณาล็อกอินใหม่';
        showAlert(msg, 'error');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span class="btn-icon">➡️</span><span>เข้าสู่ระบบ</span>';
      }
    }
  </script>

  <footer class="login-footer">
    <p>ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
  </footer>
</body>

</html>
