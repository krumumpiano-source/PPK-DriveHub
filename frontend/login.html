<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>window.API_BASE_URL = CONFIG.API_BASE_URL; window.currentPage = 'login';</script>
  <link rel="stylesheet" href="common.css">
  <script src="offline-mock.js"></script>
  <script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sarabun', 'Kanit', sans-serif;
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      width: 100%;
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .login-header h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }

    .login-header p {
      font-size: 1em;
      opacity: 0.95;
    }

    .login-body {
      padding: 40px 30px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 0.95em;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: all 0.3s;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4285f4;
      box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(66, 133, 244, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: white;
      color: #4285f4;
      border: 2px solid #4285f4;
      margin-top: 15px;
    }

    .btn-secondary:hover {
      background: #f5f5f5;
    }

    .alert {
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9em;
    }

    .alert-error {
      background: #ffebee;
      color: #c62828;
      border-left: 4px solid #c62828;
    }

    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
      border-left: 4px solid #2e7d32;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .school-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5em;
    }

    .login-footer {
      margin-top: 24px;
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.9em;
      max-width: 450px;
      line-height: 1.5;
    }

    .login-footer p {
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-header">
      <div class="school-logo">🏫</div>
      <h1>PPK DriveHub</h1>
      <p>ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>
    <div class="login-body">
      <div id="alert-container"></div>

      <form id="loginForm" onsubmit="handleLogin(event); return false;">
        <div class="form-group">
          <label for="username">ชื่อผู้ใช้ / รหัสประจำตัว</label>
          <input type="text" id="username" name="username" required autocomplete="username" autofocus>
        </div>

        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <div style="text-align: right; margin-bottom: 20px;">
          <a href="forgot-password.html" style="color: #4285f4; text-decoration: none; font-size: 0.9em;">
            ลืมรหัสผ่าน?
          </a>
        </div>

        <button type="submit" class="btn" id="loginBtn">
          🔐 เข้าสู่ระบบ
        </button>
      </form>

      <button type="button" class="btn btn-secondary" onclick="window.location.href='register.html'">
        📝 สมัครเข้าใช้งานครั้งแรก
      </button>
    </div>
  </div>

  <script>
    // handleLogin is specific to this page
    async function handleLogin(event) {
      event.preventDefault();

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var loginBtn = document.getElementById('loginBtn');
      var alertContainer = document.getElementById('alert-container');

      if (!username || !password) {
        showAlert('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน', 'error');
        return;
      }

      // Disable button
      loginBtn.disabled = true;
      loginBtn.textContent = 'กำลังเข้าสู่ระบบ...';
      alertContainer.innerHTML = '';

      try {
        var result = await apiCall('login', {
          username: username,
          password: password
        });

        if (result.success) {
          // Save JWT token for API calls
          if (result.data.token) {
            sessionStorage.setItem('ppk_drivehub_token', result.data.token);
          }
          // Save user info for display
          sessionStorage.setItem('ppk_drivehub_user', JSON.stringify({
            user_id: result.data.user_id,
            full_name: result.data.full_name,
            role: result.data.role,
            first_login: result.data.first_login,
            permissions: result.data.permissions || {}
          }));

          // Check if first login - require password change
          if (result.data.first_login) {
            alert('กรุณาเปลี่ยนรหัสผ่านก่อนใช้งาน');
            window.location.href = 'change-password.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        } else {
          var msg = (result.message && /[\u0E00-\u0E7F]/.test(result.message)) ? result.message : 'เข้าสู่ระบบไม่สำเร็จ กรุณาตรวจสอบชื่อผู้ใช้และรหัสผ่าน';
          showAlert(msg, 'error');
          loginBtn.disabled = false;
          loginBtn.textContent = '🔐 เข้าสู่ระบบ';
        }
      } catch (error) {
        var msg = error.message || 'ดำเนินการไม่สำเร็จ';
        if (msg === 'AUTHENTICATION_REQUIRED') msg = 'กรุณาล็อกอินใหม่';
        showAlert(msg, 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = '🔐 เข้าสู่ระบบ';
      }
    }
  </script>

  <footer class="login-footer">
    <p>ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
  </footer>
</body>

</html>
