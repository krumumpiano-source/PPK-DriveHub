<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข้อมูลพื้นฐาน - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>window.REQUIRE_AUTH = true; window.API_BASE_URL = CONFIG.API_BASE_URL; window.currentPage = 'basic-info';</script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    .header {
      background: var(--gradient-primary);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 2em; margin-bottom: 8px; }
    .header p { font-size: 1em; opacity: 0.92; }
    .content { padding: 30px; }

    .info-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 0;
    }
    .info-tab {
      padding: 12px 24px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 1em;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.25s;
    }
    .info-tab:hover { color: var(--color-primary); }
    .info-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-bar input {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      border: 2px solid #e2e8f0;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 0.95em;
    }
    .search-bar input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(66,133,244,0.12);
    }

    .info-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.93em;
    }
    .info-table th {
      background: #f1f5f9;
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      color: #334155;
      white-space: nowrap;
      border-bottom: 2px solid #e2e8f0;
    }
    .info-table td {
      padding: 11px 14px;
      border-bottom: 1px solid #f1f5f9;
      color: #475569;
    }
    .info-table tr:hover td {
      background: #f8fafc;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .status-dot.active { background: #22c55e; }
    .status-dot.inactive { background: #ef4444; }
    .status-dot.maintenance { background: #f59e0b; }
    .status-dot.on_leave { background: #f59e0b; }

    .vehicle-type-badge, .driver-status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.85em;
      font-weight: 500;
    }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }
    .summary-card .count {
      font-size: 2em;
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1.2;
    }
    .summary-card .label {
      font-size: 0.88em;
      color: #64748b;
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
    }
    .empty-state .icon { font-size: 2.5em; margin-bottom: 12px; }

    .info-table tbody tr { cursor: pointer; transition: background 0.15s; }
    .info-table tbody tr:hover td { background: #eff6ff; }

    .detail-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      overflow-y: auto;
    }
    .detail-overlay.show { display: flex; }

    .detail-panel {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 640px;
      overflow: hidden;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .detail-header {
      background: var(--gradient-primary, linear-gradient(135deg, #1e3a5f, #2d5f8a));
      color: white;
      padding: 24px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .detail-header h2 { font-size: 1.4em; margin: 0; }
    .detail-header .close-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 1.3em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .detail-header .close-btn:hover { background: rgba(255,255,255,0.35); }

    .detail-body {
      padding: 24px 28px;
    }

    .detail-section {
      margin-bottom: 20px;
    }
    .detail-section-title {
      font-size: 0.85em;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid #e2e8f0;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid #f8fafc;
      gap: 12px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      color: #64748b;
      font-weight: 500;
      font-size: 0.9em;
      white-space: nowrap;
      min-width: 120px;
    }
    .detail-value {
      color: #1e293b;
      font-weight: 500;
      text-align: right;
      word-break: break-word;
      font-size: 0.93em;
    }
    .detail-value.empty { color: #cbd5e1; font-style: italic; }

    .detail-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
    }
    .detail-badge.active { background: #dcfce7; color: #166534; }
    .detail-badge.maintenance { background: #fef3c7; color: #92400e; }
    .detail-badge.inactive { background: #fee2e2; color: #991b1b; }
    .detail-badge.on_leave { background: #fef3c7; color: #92400e; }

    @media (max-width: 768px) {
      .content { padding: 16px; }
      .info-table th, .info-table td { padding: 8px 10px; font-size: 0.85em; }
      .info-tabs { gap: 4px; }
      .info-tab { padding: 10px 14px; font-size: 0.9em; }
      .detail-overlay { padding: 20px 10px; }
      .detail-header { padding: 18px 20px; }
      .detail-body { padding: 18px 20px; }
      .detail-row { flex-direction: column; gap: 2px; }
      .detail-value { text-align: left; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="navigation"></div>
    <div class="header">
      <h1>📋 ข้อมูลพื้นฐาน</h1>
      <p>ข้อมูลยานพาหนะและพนักงานขับรถ</p>
    </div>
    <div class="content">
      <div class="info-tabs">
        <button class="info-tab active" onclick="switchTab('vehicles')">🚙 ข้อมูลรถ</button>
        <button class="info-tab" onclick="switchTab('drivers')">👷 พนักงานขับรถ</button>
      </div>

      <!-- Tab: Vehicles -->
      <div id="tab-vehicles" class="tab-content active">
        <div id="vehicle-summary" class="summary-cards"></div>
        <div class="search-bar">
          <input type="text" id="vehicleSearch" placeholder="ค้นหา... ทะเบียน, ยี่ห้อ, รุ่น" oninput="filterVehicles()">
        </div>
        <div class="table-wrap">
          <table class="info-table">
            <thead>
              <tr>
                <th>ลำดับ</th>
                <th>ทะเบียน</th>
                <th>ยี่ห้อ / รุ่น</th>
                <th>ประเภท</th>
                <th>สี</th>
                <th>ปีจดทะเบียน</th>
                <th>สถานะ</th>
              </tr>
            </thead>
            <tbody id="vehicleTableBody">
              <tr><td colspan="7" class="empty-state"><div class="icon">⏳</div>กำลังโหลด...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Tab: Drivers -->
      <div id="tab-drivers" class="tab-content">
        <div id="driver-summary" class="summary-cards"></div>
        <div class="search-bar">
          <input type="text" id="driverSearch" placeholder="ค้นหา... ชื่อ, เบอร์โทร, ใบขับขี่" oninput="filterDrivers()">
        </div>
        <div class="table-wrap">
          <table class="info-table">
            <thead>
              <tr>
                <th>ลำดับ</th>
                <th>ชื่อ-สกุล</th>
                <th>เบอร์โทร</th>
                <th>เลขใบขับขี่</th>
                <th>วันหมดอายุ</th>
                <th>สถานะ</th>
              </tr>
            </thead>
            <tbody id="driverTableBody">
              <tr><td colspan="6" class="empty-state"><div class="icon">⏳</div>กำลังโหลด...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailOverlay" class="detail-overlay" onclick="if(event.target===this)closeDetail()">
    <div class="detail-panel">
      <div class="detail-header">
        <h2 id="detailTitle">รายละเอียด</h2>
        <button class="close-btn" onclick="closeDetail()" title="ปิด">&times;</button>
      </div>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>

  <script>
    var allVehicles = [];
    var allDrivers = [];

    function switchTab(tab) {
      document.querySelectorAll('.info-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
    }

    function escHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    var vehicleTypeMap = {
      sedan: 'รถเก๋ง', suv: 'SUV', pickup: 'กระบะ', van: 'รถตู้',
      bus: 'รถบัส', truck: 'รถบรรทุก', motorcycle: 'จักรยานยนต์', other: 'อื่นๆ'
    };
    var vehicleStatusMap = {
      active: 'พร้อมใช้งาน', maintenance: 'ซ่อมบำรุง', inactive: 'ปลดระวาง', reserved: 'จองแล้ว'
    };
    var driverStatusMap = {
      active: 'พร้อมปฏิบัติงาน', inactive: 'ไม่ได้ปฏิบัติงาน', on_leave: 'ลา', suspended: 'พักงาน'
    };

    async function loadData() {
      try {
        var [vehicleResult, driverResult] = await Promise.all([
          apiCall('getVehicles'),
          apiCall('getDrivers')
        ]);

        if (vehicleResult.success) {
          if (Array.isArray(vehicleResult.data)) {
            allVehicles = vehicleResult.data;
          } else if (vehicleResult.data && vehicleResult.data.vehicles) {
            allVehicles = vehicleResult.data.vehicles;
          }
        }
        if (driverResult.success && Array.isArray(driverResult.data)) {
          allDrivers = driverResult.data;
        }

        renderVehicleSummary();
        renderDriverSummary();
        renderVehicles(allVehicles);
        renderDrivers(allDrivers);
      } catch (e) {
        document.getElementById('vehicleTableBody').innerHTML =
          '<tr><td colspan="7" class="empty-state"><div class="icon">❌</div>โหลดข้อมูลไม่สำเร็จ</td></tr>';
      }
    }

    function renderVehicleSummary() {
      var total = allVehicles.length;
      var active = allVehicles.filter(function(v) { return v.status === 'active'; }).length;
      var maint = allVehicles.filter(function(v) { return v.status === 'maintenance'; }).length;
      document.getElementById('vehicle-summary').innerHTML =
        '<div class="summary-card"><div class="count">' + total + '</div><div class="label">รถทั้งหมด</div></div>' +
        '<div class="summary-card"><div class="count" style="color:#22c55e;">' + active + '</div><div class="label">พร้อมใช้งาน</div></div>' +
        '<div class="summary-card"><div class="count" style="color:#f59e0b;">' + maint + '</div><div class="label">ซ่อมบำรุง</div></div>';
    }

    function renderDriverSummary() {
      var total = allDrivers.length;
      var active = allDrivers.filter(function(d) { return d.status === 'active'; }).length;
      var onLeave = allDrivers.filter(function(d) { return d.status === 'on_leave'; }).length;
      document.getElementById('driver-summary').innerHTML =
        '<div class="summary-card"><div class="count">' + total + '</div><div class="label">พนักงานทั้งหมด</div></div>' +
        '<div class="summary-card"><div class="count" style="color:#22c55e;">' + active + '</div><div class="label">พร้อมปฏิบัติงาน</div></div>' +
        '<div class="summary-card"><div class="count" style="color:#f59e0b;">' + onLeave + '</div><div class="label">ลา</div></div>';
    }

    function renderVehicles(list) {
      if (list.length === 0) {
        document.getElementById('vehicleTableBody').innerHTML =
          '<tr><td colspan="7" class="empty-state"><div class="icon">🚙</div>ยังไม่มีข้อมูลรถ</td></tr>';
        return;
      }
      var html = '';
      list.forEach(function(v, i) {
        var statusClass = v.status || 'active';
        html += '<tr onclick="showVehicleDetail(\'' + v.id + '\')">';
        html += '<td>' + (i + 1) + '</td>';
        html += '<td><strong>' + escHtml(v.license_plate) + '</strong></td>';
        html += '<td>' + escHtml(v.brand || '') + ' ' + escHtml(v.model || '') + '</td>';
        html += '<td>' + escHtml(v.vehicle_type || '-') + '</td>';
        html += '<td>' + escHtml(v.color || '-') + '</td>';
        html += '<td>' + (v.year || '-') + '</td>';
        html += '<td><span class="status-dot ' + statusClass + '"></span>' + (vehicleStatusMap[v.status] || v.status || '-') + '</td>';
        html += '</tr>';
      });
      document.getElementById('vehicleTableBody').innerHTML = html;
    }

    function renderDrivers(list) {
      if (list.length === 0) {
        document.getElementById('driverTableBody').innerHTML =
          '<tr><td colspan="6" class="empty-state"><div class="icon">👷</div>ยังไม่มีข้อมูลพนักงาน</td></tr>';
        return;
      }
      var html = '';
      list.forEach(function(d, i) {
        var statusClass = d.status || 'active';
        var expiry = d.license_expiry ? formatDateThai(d.license_expiry) : '-';
        var isExpired = d.license_expiry && new Date(d.license_expiry) < new Date();
        html += '<tr onclick="showDriverDetail(\'' + d.id + '\')">';
        html += '<td>' + (i + 1) + '</td>';
        html += '<td><strong>' + escHtml(d.name || d.full_name || '') + '</strong></td>';
        html += '<td>' + escHtml(d.phone || '-') + '</td>';
        html += '<td>' + escHtml(d.license_number || '-') + '</td>';
        html += '<td' + (isExpired ? ' style="color:#ef4444;font-weight:600;"' : '') + '>' + expiry + (isExpired ? ' (หมดอายุ)' : '') + '</td>';
        html += '<td><span class="status-dot ' + statusClass + '"></span>' + (driverStatusMap[d.status] || d.status || '-') + '</td>';
        html += '</tr>';
      });
      document.getElementById('driverTableBody').innerHTML = html;
    }

    function filterVehicles() {
      var q = document.getElementById('vehicleSearch').value.toLowerCase();
      if (!q) { renderVehicles(allVehicles); return; }
      var filtered = allVehicles.filter(function(v) {
        return (v.license_plate || '').toLowerCase().indexOf(q) !== -1 ||
               (v.brand || '').toLowerCase().indexOf(q) !== -1 ||
               (v.model || '').toLowerCase().indexOf(q) !== -1;
      });
      renderVehicles(filtered);
    }

    function filterDrivers() {
      var q = document.getElementById('driverSearch').value.toLowerCase();
      if (!q) { renderDrivers(allDrivers); return; }
      var filtered = allDrivers.filter(function(d) {
        return ((d.name || d.full_name || '') + ' ' + (d.phone || '') + ' ' + (d.license_number || '')).toLowerCase().indexOf(q) !== -1;
      });
      renderDrivers(filtered);
    }

    function formatDateThai(dateStr) {
      if (!dateStr) return '-';
      try {
        var d = new Date(dateStr);
        return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
      } catch (e) { return dateStr; }
    }

    var fuelMap = { diesel: 'ดีเซล', gasoline: 'เบนซิน', hybrid: 'ไฮบริด', electric: 'ไฟฟ้า' };

    function showVehicleDetail(id) {
      var v = allVehicles.find(function(x) { return x.id === id; });
      if (!v) return;
      document.getElementById('detailTitle').textContent = '🚙 ' + (v.license_plate || 'รายละเอียดรถ');
      var regDate = formatDateThai(v.registration_date);
      var statusBadge = '<span class="detail-badge ' + (v.status || 'active') + '">' + (vehicleStatusMap[v.status] || v.status || '-') + '</span>';
      var catText = v.vehicle_category === 'support' ? 'รถใช้งานสนับสนุน' : 'รถใช้งานหลัก';

      var html = '';
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">ข้อมูลทั่วไป</div>';
      html += detailRow('เลขทะเบียน', v.license_plate);
      html += detailRow('จังหวัด', v.province);
      html += detailRow('ยี่ห้อ', v.brand);
      html += detailRow('รุ่น', v.model);
      html += detailRow('รุ่นปี (พ.ศ.)', v.year);
      html += detailRow('สี', v.color);
      html += detailRow('ชนิดรถ', v.vehicle_type);
      html += detailRow('จำนวนที่นั่ง', v.seat_count ? v.seat_count + ' ที่นั่ง' : '');
      html += detailRow('ชนิดเชื้อเพลิง', fuelMap[v.fuel_type] || v.fuel_type);
      html += detailRow('ประเภทการใช้งาน', catText);
      html += detailRow('สถานะ', statusBadge, true);
      html += '</div>';

      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">ทะเบียนและเครื่องยนต์</div>';
      html += detailRow('เลขทะเบียน (ในเล่ม)', v.registration_number);
      html += detailRow('เลขตัวถัง (VIN)', v.chassis_number);
      html += detailRow('เลขเครื่องยนต์', v.engine_number);
      html += detailRow('วันจดทะเบียน', regDate !== '-' ? regDate : '');
      html += detailRow('เลขไมล์ปัจจุบัน', v.current_mileage ? Number(v.current_mileage).toLocaleString() + ' กม.' : '');
      html += '</div>';

      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">เจ้าของ / ผู้ครอบครอง</div>';
      html += detailRow('ชื่อเจ้าของ', v.owner_name);
      html += detailRow('ที่อยู่', v.owner_address);
      html += '</div>';

      if (v.notes) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section-title">หมายเหตุ</div>';
        html += '<div style="color:#475569;font-size:0.93em;line-height:1.6;">' + escHtml(v.notes) + '</div>';
        html += '</div>';
      }

      document.getElementById('detailBody').innerHTML = html;
      document.getElementById('detailOverlay').classList.add('show');
    }

    function showDriverDetail(id) {
      var d = allDrivers.find(function(x) { return x.id === id; });
      if (!d) return;
      document.getElementById('detailTitle').textContent = '👷 ' + (d.name || d.full_name || 'รายละเอียดพนักงาน');
      var statusBadge = '<span class="detail-badge ' + (d.status || 'active') + '">' + (driverStatusMap[d.status] || d.status || '-') + '</span>';
      var expiry = formatDateThai(d.license_expiry);
      var isExpired = d.license_expiry && new Date(d.license_expiry) < new Date();

      var html = '';
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">ข้อมูลส่วนตัว</div>';
      html += detailRow('ชื่อ-สกุล', d.name || d.full_name);
      html += detailRow('เบอร์โทร', d.phone);
      html += detailRow('สถานะ', statusBadge, true);
      html += '</div>';

      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">ใบอนุญาตขับขี่</div>';
      html += detailRow('เลขใบขับขี่', d.license_number);
      html += detailRow('ประเภทใบขับขี่', d.license_type);
      html += detailRow('วันหมดอายุ', expiry + (isExpired ? ' <span style="color:#ef4444;font-weight:600;">(หมดอายุ)</span>' : ''), isExpired);
      html += '</div>';

      if (d.notes) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section-title">หมายเหตุ</div>';
        html += '<div style="color:#475569;font-size:0.93em;line-height:1.6;">' + escHtml(d.notes) + '</div>';
        html += '</div>';
      }

      document.getElementById('detailBody').innerHTML = html;
      document.getElementById('detailOverlay').classList.add('show');
    }

    function detailRow(label, value, isHtml) {
      var val = value ? (isHtml ? String(value) : escHtml(String(value))) : '';
      var cls = val ? 'detail-value' : 'detail-value empty';
      return '<div class="detail-row"><span class="detail-label">' + label + '</span><span class="' + cls + '">' + (val || '-') + '</span></div>';
    }

    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('show');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeDetail();
    });

    loadData();
  </script>
</body>

</html>
