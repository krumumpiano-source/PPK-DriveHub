<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เปลี่ยนรหัสผ่านครั้งแรก - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>window.API_BASE_URL = CONFIG.API_BASE_URL; window.currentPage = 'change-password';</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sarabun', 'Kanit', sans-serif;
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
      min-height: 100vh;
      padding: 0;
    }

    .box {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 1.5em;
    }

    p {
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.95;
    }

    #msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }

    .alert-error {
      background: #ffebee;
      color: #c62828;
    }

    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🔐 เปลี่ยนรหัสผ่านครั้งแรก</h1>
    <p>กรุณาตั้งรหัสผ่านใหม่ก่อนใช้งานระบบ (อย่างน้อย 8 ตัวอักษร มีอักษรและตัวเลข)</p>
    <form id="form">
      <div class="form-group">
        <label>รหัสผ่านเดิม (ที่ Admin กำหนด)</label>
        <input type="password" id="oldPassword" required placeholder="รหัสผ่านเดิม">
      </div>
      <div class="form-group">
        <label>รหัสผ่านใหม่</label>
        <input type="password" id="newPassword" required placeholder="รหัสผ่านใหม่" minlength="8">
      </div>
      <div class="form-group">
        <label>ยืนยันรหัสผ่านใหม่</label>
        <input type="password" id="newPasswordConfirm" required placeholder="ยืนยันรหัสผ่านใหม่">
      </div>
      <button type="submit" class="btn">เปลี่ยนรหัสผ่าน</button>
    </form>
    <div id="msg"></div>
    <p style="margin-top: 20px; font-size: 0.9em;"><a href="profile.html" style="color: #4285f4;">ไปตั้งค่าส่วนตัว
        (เปลี่ยนรหัสผ่าน)</a></p>

    <div
      style="margin-top: 24px; padding-top: 20px; border-top: 1px solid #e0e0e0; text-align: center; color: #666; font-size: 0.9em;">
      <p style="margin: 0;">ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>
  </div>
  <script>
    // Check authentication using common.js function
    var isAuthenticated = checkAuth();
    var user = getCurrentUser();

    if (!isAuthenticated || !user) {
      console.warn('Not authenticated');
      var msg = document.getElementById('msg');
      if (msg) {
        msg.className = 'alert-error';
        msg.textContent = 'กรุณาล็อกอินก่อนจึงจะเปลี่ยนรหัสผ่านได้';
        msg.style.display = 'block';
      }
      // Redirect to login after 2 seconds
      setTimeout(function () { window.location.href = 'login.html'; }, 2000);
    }
    document.getElementById('form').addEventListener('submit', async function (e) {
      e.preventDefault();

      if (!isAuthenticated || !user) {
        var msg = document.getElementById('msg');
        msg.className = 'alert-error';
        msg.textContent = 'กรุณาล็อกอินก่อนจึงจะเปลี่ยนรหัสผ่านได้';
        msg.style.display = 'block';
        return;
      }

      var oldP = document.getElementById('oldPassword').value;
      var newP = document.getElementById('newPassword').value;
      var confirmP = document.getElementById('newPasswordConfirm').value;
      var msg = document.getElementById('msg');
      msg.style.display = 'none';
      if (newP !== confirmP) {
        msg.className = 'alert-error'; msg.textContent = 'รหัสผ่านใหม่กับยืนยันไม่ตรงกัน'; msg.style.display = 'block';
        return;
      }

      // Validate password policy
      var policyError = validatePasswordPolicy(newP);
      if (policyError) {
        msg.className = 'alert-error'; msg.textContent = policyError; msg.style.display = 'block';
        return;
      }
      try {
        var result = await apiCall('changePassword', { userId: user.id, oldPassword: oldP, newPassword: newP });
        if (result.success) {
          msg.className = 'alert-success'; msg.textContent = 'เปลี่ยนรหัสผ่านสำเร็จ กำลังไปหน้าแรก...'; msg.style.display = 'block';
          setTimeout(function () { window.location.href = 'dashboard.html'; }, 2000);
        } else {
          msg.className = 'alert-error'; msg.textContent = typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'); msg.style.display = 'block';
        }
      } catch (err) {
        msg.className = 'alert-error'; msg.textContent = handleError(err); msg.style.display = 'block';
      }
    });
  </script>
</body>

</html>
