<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าส่วนตัว - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>window.API_BASE_URL = CONFIG.API_BASE_URL; window.currentPage = 'profile'; window.REQUIRE_AUTH = true;</script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { }

    .container { };
    var editingField = null;

    function selectTitleForEdit(value) {
      var displayEl = document.getElementById('displayTitle');
      if (!displayEl) return;

      var hiddenInputEl = displayEl.querySelector('input[type="hidden"]');
      var customInputEl = displayEl.querySelector('input[type="text"]');
      var buttons = displayEl.querySelectorAll('.title-option-btn');

      buttons.forEach(function (btn) {
        btn.classList.remove('active');
      });

      var selectedBtn = displayEl.querySelector('.title-option-btn[data-title="' + value + '"]');
      if (selectedBtn) {
        selectedBtn.classList.add('active');
      }

      if (value === '__custom__') {
        if (hiddenInputEl) hiddenInputEl.value = '';
        if (customInputEl) {
          customInputEl.style.display = 'block';
          customInputEl.focus();
        }
      } else {
        if (hiddenInputEl) hiddenInputEl.value = value;
        if (customInputEl) {
          customInputEl.style.display = 'none';
          customInputEl.value = '';
        }
      }
    }

    window.addEventListener('DOMContentLoaded', function () {
      // Check authentication (ไม่ redirect — ให้แสดงหน้าได้)
      var isAuthenticated = requireAuth();
      if (!isAuthenticated) {
        console.warn('Not authenticated, but showing page anyway');
        return; // แสดงหน้าได้แต่ไม่โหลดข้อมูล
      }

      currentUser = getCurrentUser();
      if (!currentUser || !currentUser.id) {
        console.warn('No current user, but showing page anyway');
        return;
      }

      loadProfile();
    });

    async function loadProfile() {
      try {
        var result = await apiCall('getMe', {});

        if (result.success && result.data) {
          var user = result.data;

          if (user.profile_image) {
            document.getElementById('profileImage').src = user.profile_image;
            document.getElementById('profileImage').style.display = 'block';
            document.getElementById('profileImagePlaceholder').style.display = 'none';
          } else {
            document.getElementById('profileImage').style.display = 'none';
            document.getElementById('profileImagePlaceholder').style.display = 'flex';
          }

          // Store original data
          originalProfileData = {
            title: user.title || '',
            full_name: user.full_name || '',
            department: user.department || '',
            phone: user.phone || ''
          };

          document.getElementById('displayTitle').textContent = user.title || '-';
          document.getElementById('displayFullName').textContent = user.full_name || '-';
          document.getElementById('displayEmail').textContent = user.email || '-';
          document.getElementById('displayDepartment').textContent = user.department || '-';
          document.getElementById('displayPhone').textContent = user.phone || '-';

          var canEdit = checkCanEditProfile();
          if (!canEdit) {
            document.querySelectorAll('.info-display.editable').forEach(function (el) {
              el.classList.remove('editable');
              el.onclick = null;
            });
          }

          var roleText = '';
          if (user.role === 'admin' || user.role === 'super_admin') {
            roleText = user.role === 'super_admin' ? 'ผู้ดูแลระบบสูงสุด (Super Admin)' : 'ผู้ดูแลระบบ (Admin)';
          } else {
            roleText = 'ผู้ใช้ทั่วไป';
          }
          document.getElementById('displayRole').textContent = roleText;

          if (user.created_at) {
            var createdAt = user.created_at;
            if (typeof formatDateThai === 'function') {
              createdAt = formatDateThai(createdAt.split('T')[0]);
            }
            document.getElementById('displayCreatedAt').textContent = createdAt;
          }

          var statusText = user.active !== false ? 'ใช้งาน' : 'ไม่ใช้งาน';
          var statusColor = user.active !== false ? '#2e7d32' : '#c62828';
          document.getElementById('displayStatus').innerHTML = '<span style="color: ' + statusColor + '; font-weight: 600;">' + statusText + '</span>';

          if (user.approved_at) {
            var approvedAt = user.approved_at;
            if (typeof formatDateThai === 'function') {
              approvedAt = formatDateThai(approvedAt.split('T')[0]);
            }
            document.getElementById('displayApprovedAtValue').textContent = approvedAt;
            document.getElementById('displayApprovedAt').style.display = 'block';
          }

          document.getElementById('accountInfoSection').style.display = 'block';

          var permissionsList = document.getElementById('permissionsList');
          permissionsList.innerHTML = '';

          if (user.role === 'admin') {
            permissionsList.innerHTML = '<span class="permission-badge">สิทธิ์เต็มทุกโมดูล</span>';
          } else if (user.permissions && Object.keys(user.permissions).length > 0) {
            var permissionLabels = {
              queue: 'จัดคิวรถ',
              fuel: 'บันทึกน้ำมัน',
              repair: 'บันทึกซ่อม',
              reports: 'ดูรายงาน',
              vehicles: 'จัดการรถ',
              drivers: 'จัดการคนขับ',
              usage_log: 'ดูบันทึกการใช้รถ'
            };

            var permissionLevels = {
              view: 'ดู',
              create: 'สร้าง',
              edit: 'แก้ไข'
            };

            for (var module in user.permissions) {
              var badge = document.createElement('span');
              badge.className = 'permission-badge';
              badge.textContent = (permissionLabels[module] || module) + ': ' + (permissionLevels[user.permissions[module]] || user.permissions[module]);
              permissionsList.appendChild(badge);
            }
          } else {
            permissionsList.innerHTML = '<span style="color: var(--color-text-muted);">ไม่มีสิทธิ์พิเศษ</span>';
          }

        }
      } catch (error) {
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">' + (typeof handleError !== 'undefined' ? handleError(error) : 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง') + '</div>';
      }
    }

    function checkCanEditProfile() {
      // Can edit if: own profile OR admin
      if (!currentUser || !currentUser.id) {
        return false;
      }

      // Admin can edit any profile
      if (currentUser.role === 'admin' || currentUser.role === 'super_admin') {
        return true;
      }

      // User can only edit own profile
      // This is handled by backend, but we check here for UI
      return true; // User can always see edit button for own profile
    }

    function startEdit(fieldName) {
      if (!checkCanEditProfile()) {
        alert('คุณไม่มีสิทธิ์แก้ไขข้อมูลนี้');
        return;
      }

      // Cancel any ongoing edit
      if (editingField && editingField !== fieldName) {
        cancelEdit(editingField);
      }

      editingField = fieldName;
      var displayEl = document.getElementById('display' + capitalizeFirst(fieldName));
      var containerEl = document.getElementById('edit' + capitalizeFirst(fieldName));
      var currentValue = displayEl.textContent === '-' ? '' : displayEl.textContent;

      // Store original value
      containerEl.dataset.originalValue = currentValue;

      containerEl.classList.add('editing');

      var input;
      if (fieldName === 'title') {
        var container = document.createElement('div');
        container.style.position = 'relative';

        var optionsDiv = document.createElement('div');
        optionsDiv.className = 'title-options';
        optionsDiv.style.marginBottom = '8px';

        var titles = ['นาย', 'นาง', 'นางสาว', '__custom__'];
        var titleLabels = ['นาย', 'นาง', 'นางสาว', 'อื่นๆ'];

        titles.forEach(function (title, index) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'title-option-btn';
          btn.setAttribute('data-title', title);
          btn.textContent = titleLabels[index];
          btn.onclick = function () {
            selectTitleForEdit(title);
          };
          optionsDiv.appendChild(btn);
        });

        var hiddenInput = document.createElement('input');
        hiddenInput.type = 'hidden';
        hiddenInput.id = 'edit_title_hidden';

        var customInput = document.createElement('input');
        customInput.type = 'text';
        customInput.id = 'edit_title_custom';
        customInput.placeholder = 'พิมพ์คำนำหน้าของคุณ';
        customInput.style.cssText = 'display: none; margin-top: 8px; width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: var(--radius-md); font-size: 1em; font-family: inherit;';

        if (currentValue === 'นาย' || currentValue === 'นาง' || currentValue === 'นางสาว' || !currentValue) {
          hiddenInput.value = currentValue || '';
          var initialBtn = optionsDiv.querySelector('[data-title="' + (currentValue || '') + '"]');
          if (initialBtn) initialBtn.classList.add('active');
          customInput.style.display = 'none';
        } else {
          hiddenInput.value = '';
          var customBtn = optionsDiv.querySelector('[data-title="__custom__"]');
          if (customBtn) customBtn.classList.add('active');
          customInput.value = currentValue;
          customInput.style.display = 'block';
        }

        container.appendChild(optionsDiv);
        container.appendChild(hiddenInput);
        container.appendChild(customInput);
        input = container;
      } else if (fieldName === 'phone') {
        input = document.createElement('input');
        input.type = 'tel';
        input.pattern = '[0-9]{9,10}';
        input.maxLength = 10;
        input.placeholder = 'เช่น 0812345678';
        input.value = currentValue;
      } else {
        input = document.createElement('input');
        input.type = 'text';
        input.value = currentValue;
        if (fieldName === 'full_name') {
          input.required = true;
          input.placeholder = 'กรุณากรอกชื่อ-สกุล';
        } else if (fieldName === 'department') {
          input.placeholder = 'เช่น งานยานพาหนะ, กลุ่มสาระการเรียนรู้';
        }
      }

      // Replace display with input
      displayEl.innerHTML = '';
      displayEl.appendChild(input);
      input.focus();

      // Select all text for easy editing
      if (input.type === 'text' || input.type === 'tel') {
        input.select();
      }
    }

    function cancelEdit(fieldName) {
      if (!fieldName) fieldName = editingField;
      if (!fieldName) return;

      var containerEl = document.getElementById('edit' + capitalizeFirst(fieldName));
      var displayEl = document.getElementById('display' + capitalizeFirst(fieldName));
      var originalValue = containerEl.dataset.originalValue || '-';

      // Restore original value
      displayEl.textContent = originalValue || '-';

      containerEl.classList.remove('editing');

      editingField = null;
    }

    async function saveField(fieldName, event) {
      if (event) {
        event.stopPropagation();
        event.preventDefault();
      }

      var containerEl = document.getElementById('edit' + capitalizeFirst(fieldName));
      var displayEl = document.getElementById('display' + capitalizeFirst(fieldName));

      var newValue = '';
      if (fieldName === 'title') {
        var hiddenInputEl = displayEl.querySelector('input[type="hidden"]');
        var customInputEl = displayEl.querySelector('input[type="text"]');
        if (hiddenInputEl && customInputEl) {
          if (hiddenInputEl.value === '') {
            // Custom title
            newValue = customInputEl.value.trim();
            if (!newValue) {
              alert('กรุณากรอกคำนำหน้า');
              customInputEl.focus();
              return;
            }
          } else {
            newValue = hiddenInputEl.value || '';
          }
        } else {
          cancelEdit(fieldName);
          return;
        }
      } else {
        var input = displayEl.querySelector('input, select');
        if (!input) {
          cancelEdit(fieldName);
          return;
        }
        newValue = input.value.trim();
      }

      // Validation
      if (fieldName === 'full_name' && !newValue) {
        alert('กรุณากรอกชื่อ-สกุล');
        var inputEl = displayEl.querySelector('input');
        if (inputEl) inputEl.focus();
        return;
      }

      if (fieldName === 'phone' && newValue && !/^[0-9]{9,10}$/.test(newValue)) {
        alert('เบอร์โทรศัพท์ต้องเป็นตัวเลข 9-10 หลัก');
        var inputEl = displayEl.querySelector('input');
        if (inputEl) inputEl.focus();
        return;
      }

      if (fieldName === 'title' && !newValue) {
        alert('กรุณาเลือกหรือกรอกคำนำหน้า');
        var hiddenInputEl = displayEl.querySelector('input[type="hidden"]');
        var customInputEl = displayEl.querySelector('input[type="text"]');
        if (hiddenInputEl && hiddenInputEl.value === '' && customInputEl) {
          customInputEl.focus();
        }
        return;
      }

      var originalValue = containerEl.dataset.originalValue || '';
      if (newValue === originalValue) {
        cancelEdit(fieldName);
        return;
      }

      // Disable save button
      var saveBtn = containerEl.querySelector('.btn-save');
      saveBtn.disabled = true;
      saveBtn.textContent = 'กำลังบันทึก...';

      try {
        var updateData = {};
        updateData[fieldName] = newValue;

        var result = await apiCall('updateProfile', updateData);

        if (result.success) {
          displayEl.textContent = newValue || '-';

          originalProfileData[fieldName] = newValue;

          containerEl.classList.remove('editing');
          editingField = null;

          showTemporaryAlert('✅ บันทึกข้อมูลสำเร็จ', 'success');

          if (fieldName === 'title' || fieldName === 'full_name') {
            var title = fieldName === 'title' ? newValue : originalProfileData.title;
            var fullName = fieldName === 'full_name' ? newValue : originalProfileData.full_name;
            // Note: We don't update displayFullName here as it's separate field
          }
        } else {
          alert(typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'));
          saveBtn.disabled = false;
          saveBtn.textContent = '💾 บันทึก';
        }
      } catch (error) {
        alert(typeof handleError !== 'undefined' ? handleError(error) : 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง');
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 บันทึก';
      }
    }

    function capitalizeFirst(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function showTemporaryAlert(message, type) {
      var alertContainer = document.getElementById('alert-container');
      alertContainer.innerHTML = '<div class="alert alert-' + type + '">' + message + '</div>';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(function () {
        alertContainer.innerHTML = '';
      }, 3000);
    }

    async function handleChangePassword(event) {
      event.preventDefault();

      var oldPassword = document.getElementById('old_password').value;
      var newPassword = document.getElementById('new_password').value;
      var newPasswordConfirm = document.getElementById('new_password_confirm').value;

      // Validation
      if (!oldPassword) {
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">กรุณากรอกรหัสผ่านปัจจุบัน</div>';
        document.getElementById('old_password').focus();
        return;
      }

      if (!newPassword) {
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">กรุณากรอกรหัสผ่านใหม่</div>';
        document.getElementById('new_password').focus();
        return;
      }

      if (newPassword !== newPasswordConfirm) {
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">รหัสผ่านใหม่ไม่ตรงกัน กรุณาตรวจสอบอีกครั้ง</div>';
        document.getElementById('new_password_confirm').focus();
        return;
      }

      // Validate password policy
      var passwordError = validatePasswordPolicy(newPassword);
      if (passwordError) {
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">' + passwordError + '</div>';
        document.getElementById('new_password').focus();
        return;
      }

      // Confirm before changing
      if (!confirm('คุณต้องการเปลี่ยนรหัสผ่านหรือไม่?\n\nหลังจากเปลี่ยนรหัสผ่านแล้ว คุณจะต้องใช้รหัสผ่านใหม่ในการเข้าสู่ระบบ')) {
        return;
      }

      var changeBtn = document.getElementById('changePasswordBtn');
      changeBtn.disabled = true;
      changeBtn.textContent = 'กำลังเปลี่ยนรหัสผ่าน...';

      try {
        var result = await apiCall('changePassword', {
          userId: currentUser.id,
          oldPassword: oldPassword,
          newPassword: newPassword
        });

        if (result.success) {
          document.getElementById('alert-container').innerHTML = '<div class="alert alert-success">✅ เปลี่ยนรหัสผ่านสำเร็จ กรุณาใช้รหัสผ่านใหม่ในการเข้าสู่ระบบครั้งต่อไป</div>';
          window.scrollTo({ top: 0, behavior: 'smooth' });
          setTimeout(function () {
            resetPasswordForm();
          }, 2000);
        } else {
          document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">' + (typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง')) + '</div>';
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      } catch (error) {
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">' + (typeof handleError !== 'undefined' ? handleError(error) : 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง') + '</div>';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } finally {
        changeBtn.disabled = false;
        changeBtn.textContent = '🔐 เปลี่ยนรหัสผ่าน';
      }
    }

    function resetPasswordForm() {
      document.getElementById('passwordForm').reset();
      document.getElementById('password-strength').innerHTML = '';
      document.getElementById('password-match').innerHTML = '';
    }

    function validatePasswordPolicy(password) {
      if (password.length < 8) {
        return 'รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร';
      }
      if (!/[a-zA-Z]/.test(password)) {
        return 'รหัสผ่านต้องมีอักษรภาษาอังกฤษอย่างน้อย 1 ตัว';
      }
      if (!/[0-9]/.test(password)) {
        return 'รหัสผ่านต้องมีตัวเลขอย่างน้อย 1 ตัว';
      }
      if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
        return 'รหัสผ่านต้องมีเครื่องหมายพิเศษอย่างน้อย 1 ตัว';
      }
      return null;
    }

    // Real-time password validation
    var newPasswordInput = document.getElementById('new_password');
    if (newPasswordInput) {
      newPasswordInput.addEventListener('input', function () {
        var password = this.value;
        var strengthDiv = document.getElementById('password-strength');

        if (password.length === 0) {
          strengthDiv.innerHTML = '';
          return;
        }

        var errors = [];
        var checks = [];

        if (password.length >= 8) {
          checks.push('✓ ความยาวเพียงพอ');
        } else {
          errors.push('ความยาวไม่ถึง 8 ตัว');
        }

        if (/[a-zA-Z]/.test(password)) {
          checks.push('✓ มีอักษรภาษาอังกฤษ');
        } else {
          errors.push('ไม่มีอักษรภาษาอังกฤษ');
        }

        if (/[0-9]/.test(password)) {
          checks.push('✓ มีตัวเลข');
        } else {
          errors.push('ไม่มีตัวเลข');
        }

        if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
          checks.push('✓ มีเครื่องหมายพิเศษ');
        } else {
          errors.push('ไม่มีเครื่องหมายพิเศษ');
        }

        if (errors.length === 0) {
          strengthDiv.innerHTML = '<span style="color: #34a853; font-weight: 600;">✓ รหัสผ่านถูกต้องตามเงื่อนไขทั้งหมด</span>';
        } else {
          strengthDiv.innerHTML = '<div style="color: #ea4335;"><strong>ยังขาด:</strong> ' + errors.join(', ') + '</div>';
        }
      });
    }

    // Password match validation
    var passwordConfirmInput = document.getElementById('new_password_confirm');
    if (passwordConfirmInput) {
      passwordConfirmInput.addEventListener('input', function () {
        var password = document.getElementById('new_password').value;
        var passwordConfirm = this.value;
        var matchDiv = document.getElementById('password-match');

        if (passwordConfirm.length === 0) {
          matchDiv.innerHTML = '';
          return;
        }

        if (password === passwordConfirm) {
          matchDiv.innerHTML = '<span style="color: #34a853; font-weight: 600;">✓ รหัสผ่านตรงกัน</span>';
        } else {
          matchDiv.innerHTML = '<span style="color: #ea4335; font-weight: 600;">⚠️ รหัสผ่านไม่ตรงกัน</span>';
        }
      });
    }

    // Profile Image Functions
    function handleProfileImageSelect(event) {
      var file = event.target.files[0];
      if (!file) return;

      // Validate file type
      if (!file.type.startsWith('image/')) {
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">❌ กรุณาเลือกรูปภาพเท่านั้น (JPG, PNG, GIF)</div>';
        event.target.value = ''; // Clear input
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      // Validate file size (max 5MB)
      if (file.size > 5 * 1024 * 1024) {
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">❌ ขนาดไฟล์ต้องไม่เกิน 5MB (ขนาดปัจจุบัน: ' + (file.size / 1024 / 1024).toFixed(2) + ' MB)</div>';
        event.target.value = ''; // Clear input
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      selectedProfileImageFile = file;

      var reader = new FileReader();
      reader.onload = function (e) {
        document.getElementById('previewImage').src = e.target.result;
        document.getElementById('profileImagePreview').style.display = 'block';
        // Scroll to preview
        document.getElementById('profileImagePreview').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      };
      reader.readAsDataURL(file);
    }

    function cancelProfileImageUpload() {
      selectedProfileImageFile = null;
      document.getElementById('profileImageInput').value = '';
      document.getElementById('profileImagePreview').style.display = 'none';
    }

    async function uploadProfileImage() {
      if (!selectedProfileImageFile) {
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">กรุณาเลือกรูปภาพ</div>';
        return;
      }

      var uploadBtn = document.getElementById('uploadImageBtn');
      uploadBtn.disabled = true;
      uploadBtn.textContent = 'กำลังอัปโหลด...';

      try {
        // Convert file to base64
        var reader = new FileReader();
        reader.onload = async function (e) {
          var base64Data = e.target.result;

          try {
            var result = await apiCall('updateProfile', {
              profile_image_base64: base64Data,
              profile_image_name: selectedProfileImageFile.name
            });

            if (result.success) {
              document.getElementById('alert-container').innerHTML = '<div class="alert alert-success">✅ อัปโหลดรูปโปรไฟล์สำเร็จ</div>';
              window.scrollTo({ top: 0, behavior: 'smooth' });

              if (result.data && result.data.file_url) {
                document.getElementById('profileImage').src = result.data.file_url;
                document.getElementById('profileImage').style.display = 'block';
                document.getElementById('profileImagePlaceholder').style.display = 'none';
              }

              cancelProfileImageUpload();

              // Reload profile to get updated data after a delay
              setTimeout(function () {
                loadProfile();
              }, 500);
            } else {
              document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">' + (typeof getUserMessage !== 'undefined' ? getUserMessage(result.message) : (result.message || 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง')) + '</div>';
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }
          } catch (error) {
            document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">' + (typeof handleError !== 'undefined' ? handleError(error) : 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง') + '</div>';
          } finally {
            uploadBtn.disabled = false;
            uploadBtn.textContent = '💾 บันทึกรูป';
          }
        };
        reader.readAsDataURL(selectedProfileImageFile);
      } catch (error) {
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">' + (typeof handleError !== 'undefined' ? handleError(error) : 'ดำเนินการไม่สำเร็จ กรุณาลองใหม่อีกครั้ง') + '</div>';
        uploadBtn.disabled = false;
        uploadBtn.textContent = '💾 บันทึกรูป';
      }
    }
  </script>
</body>

</html>
