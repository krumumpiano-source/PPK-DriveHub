<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลืมรหัสผ่าน - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>window.API_BASE_URL = CONFIG.API_BASE_URL; window.currentPage = 'forgot-password';</script>
  <link rel="stylesheet" href="common.css">
  <script src="offline-mock.js"></script>
  <script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sarabun', 'Kanit', sans-serif;
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8em;
      margin-bottom: 10px;
    }

    .body {
      padding: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 0.95em;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: all 0.3s;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4285f4;
      box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(66, 133, 244, 0.3);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: white;
      color: #4285f4;
      border: 2px solid #4285f4;
      margin-top: 15px;
    }

    .btn-secondary:hover {
      background: #f5f5f5;
    }

    .alert {
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9em;
    }

    .alert-info {
      background: #e3f2fd;
      color: #1565c0;
      border-left: 4px solid #1565c0;
    }

    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
      border-left: 4px solid #2e7d32;
    }

    .alert-error {
      background: #ffebee;
      color: #c62828;
      border-left: 4px solid #c62828;
    }

    .info-box {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 0.9em;
      color: #856404;
    }

    .forgot-password-footer {
      margin-top: 24px;
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.9em;
      max-width: 450px;
      line-height: 1.5;
    }

    .forgot-password-footer p {
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🔑 ลืมรหัสผ่าน</h1>
      <p>PPK DriveHub</p>
    </div>
    <div class="body">
      <div class="info-box">
        <strong>💡 วิธีใช้งาน</strong>
        กรอกอีเมลที่ใช้สมัครสมาชิก ระบบจะส่งลิงก์รีเซ็ตรหัสผ่านไปยังอีเมลของคุณ
      </div>

      <div id="alert-container"></div>

      <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event); return false;">
        <div class="form-group">
          <label for="email">อีเมล <span style="color: #f44336;">*</span></label>
          <input type="email" id="email" name="email" required autofocus>
        </div>

        <button type="submit" class="btn" id="submitBtn">
          📧 ส่งลิงก์รีเซ็ตรหัสผ่าน
        </button>
      </form>

      <button type="button" class="btn btn-secondary" onclick="window.location.href='login.html'">
        ← กลับไปหน้าเข้าสู่ระบบ
      </button>
    </div>
  </div>


  <script>
    async function handleForgotPassword(event) {
      event.preventDefault();

      var email = document.getElementById('email').value.trim();
      var submitBtn = document.getElementById('submitBtn');
      var alertContainer = document.getElementById('alert-container');

      if (!email) {
        alertContainer.innerHTML = '<div class="alert alert-error">กรุณากรอกอีเมล</div>';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'กำลังส่ง...';
      alertContainer.innerHTML = '';

      try {
        var result = await apiCall('forgotPassword', {
          email: email
        });

        if (result.success) {
          alertContainer.innerHTML = '<div class="alert alert-success">' + result.message + '</div>';
          document.getElementById('forgotPasswordForm').reset();
        } else {
          alertContainer.innerHTML = '<div class="alert alert-error">' + result.message + '</div>';
          submitBtn.disabled = false;
          submitBtn.textContent = '📧 ส่งลิงก์รีเซ็ตรหัสผ่าน';
        }
      } catch (error) {
        alertContainer.innerHTML = '<div class="alert alert-error">' + handleError(error) + '</div>';
        submitBtn.disabled = false;
        submitBtn.textContent = '📧 ส่งลิงก์รีเซ็ตรหัสผ่าน';
      }
    }
  </script>

  <footer class="forgot-password-footer">
    <p>ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
  </footer>
</body>

</html>
