<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงาน - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>
    window.API_BASE_URL = CONFIG.API_BASE_URL;
    window.currentPage = 'reports';
    window.REQUIRE_AUTH = true;
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@9.7.1/build/index.umd.js"></script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script>
  <script src="js/export-utils.js?v=3"></script>
  <script src="common.js"></script>
  <style>
    * { box-sizing: border-box; }
    .report-tabs { display:flex;gap:6px;background:var(--color-bg-light);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:8px;margin-bottom:16px;flex-wrap:wrap; }
    .report-tab { flex:1 1 auto;padding:10px 18px;border:none;border-radius:var(--radius-md);font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer;background:transparent;color:var(--color-text-muted);transition:all .15s;white-space:nowrap; }
    .report-tab:hover { background:white;color:var(--color-text); }
    .report-tab.active { background:var(--color-primary);color:white;box-shadow:0 2px 8px rgba(99,102,241,.3); }
    .filter-panel { background:white;border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm); }
    .filter-row { display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end; }
    .date-mode-pills { display:flex;gap:4px;background:var(--color-bg-light);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:3px; }
    .date-mode-pill { padding:6px 14px;border:none;border-radius:calc(var(--radius-md) - 2px);font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;background:transparent;color:var(--color-text-muted);transition:all .15s; }
    .date-mode-pill.active { background:white;color:var(--color-primary);box-shadow:var(--shadow-sm); }
    .date-range-pills { display:flex;gap:4px;background:var(--color-bg-light);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:2px; }
    .date-range-pill { padding:3px 10px;border:none;border-radius:calc(var(--radius-md) - 2px);font-family:inherit;font-size:.75rem;font-weight:600;cursor:pointer;background:transparent;color:var(--color-text-muted);transition:all .15s; }
    .date-range-pill.active { background:white;color:var(--color-primary);box-shadow:var(--shadow-sm); }
    .filter-group { display:flex;flex-direction:column;gap:4px;min-width:120px; }
    .filter-group label { font-size:.72rem;font-weight:700;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.04em; }
    .filter-group input,.filter-group select { padding:7px 10px;border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:.87rem;font-family:inherit;color:var(--color-text);background:white; }
    .filter-group input:focus,.filter-group select:focus { outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(99,102,241,.1); }
    .filter-sep { width:1px;height:36px;background:var(--color-border);align-self:flex-end; }
    .action-bar { display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap; }
    .action-bar .btn { font-size:.85rem;padding:8px 16px; }
    .stats-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px; }
    .stat-card { background:white;border:1px solid var(--color-border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:16px 14px;position:relative;overflow:hidden; }
    .stat-card::before { content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient-primary); }
    .stat-card.warn::before { background:linear-gradient(90deg,#f59e0b,#d97706); }
    .stat-card.danger::before { background:linear-gradient(90deg,#ef4444,#dc2626); }
    .stat-card.success::before { background:linear-gradient(90deg,#10b981,#059669); }
    .stat-card h3 { font-size:.72rem;font-weight:700;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px; }
    .stat-card .value { font-size:1.8rem;font-weight:700;color:var(--color-primary);line-height:1.1;margin-bottom:3px; }
    .stat-card .unit { font-size:.78rem;color:var(--color-text-light); }
    .stat-card .sub { font-size:.78rem;color:var(--color-text-muted);margin-top:4px; }
    .report-section { background:white;border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:0;margin-bottom:14px;box-shadow:var(--shadow-sm);overflow:hidden; }
    .section-header { display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid var(--color-border);background:var(--color-bg-lighter,#f8f9fa); }
    .section-title { font-size:.95rem;font-weight:700;color:var(--color-text); }
    .section-body { padding:0;overflow-x:auto; }
    .report-table { width:100%;border-collapse:collapse;font-size:.86rem; }
    .report-table thead { background:var(--color-bg-lighter,#f8f9fa); }
    .report-table th { padding:10px 12px;text-align:left;font-weight:700;font-size:.74rem;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.03em;border-bottom:2px solid var(--color-border);white-space:nowrap; }
    .report-table td { padding:10px 12px;border-bottom:1px solid var(--color-border-light,#f0f1f5);vertical-align:middle; }
    .report-table tbody tr:last-child td { border-bottom:none; }
    .report-table tbody tr:hover td { background:var(--color-primary-bg,#eef2ff); }
    .report-table tfoot td { padding:10px 12px;font-weight:700;border-top:2px solid var(--color-border);background:var(--color-bg-lighter,#f8f9fa); }
    tr.row-no-record { background:rgba(245,158,11,.07) !important; }
    tr.row-anomaly { background:rgba(217,119,6,.12) !important; }
    tr.row-incomplete { background:rgba(251,191,36,.05) !important; }
    .badge { display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:999px;font-size:.74rem;font-weight:700;white-space:nowrap; }
    .badge-green  { background:#d1fae5;color:#065f46; }
    .badge-blue   { background:#dbeafe;color:#1e40af; }
    .badge-yellow { background:#fef3c7;color:#92400e; }
    .badge-red    { background:#fee2e2;color:#991b1b; }
    .badge-gray   { background:#f1f5f9;color:#64748b; }
    .badge-orange { background:#ffedd5;color:#c2410c; }
    .badge-violet { background:#ede9fe;color:#5b21b6; }
    .no-record-cell { color:#dc2626;font-size:.82rem;font-weight:600; }
    .mileage-inferred { color:var(--color-text-muted);font-size:.78rem; }
    .kpi-note { background:#eff6ff;border-left:3px solid var(--color-primary);padding:10px 14px;border-radius:var(--radius-md);margin:12px 18px 16px;font-size:.83rem;color:var(--color-text);line-height:1.6; }
    .empty-state { text-align:center;padding:50px 20px;color:var(--color-text-light); }
    .empty-state-icon { font-size:3rem;margin-bottom:12px;opacity:.5; }
    .loading-state { text-align:center;padding:50px 20px;color:var(--color-text-muted); }
    @media(max-width:768px){ .stats-grid{grid-template-columns:repeat(2,1fr)} .report-tab{padding:8px 12px;font-size:.82rem} .filter-sep{display:none} }
    .word-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:4px 0 8px;}
    .word-card{background:white;border:1px solid var(--color-border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:22px 20px;display:flex;flex-direction:column;gap:12px;}
    .word-card h3{margin:0;font-size:1rem;font-weight:700;color:var(--color-text);}
    .word-card p{margin:0;font-size:.82rem;color:var(--color-text-muted);line-height:1.5;}
    .word-card .word-card-meta{font-size:.78rem;color:var(--color-text-light);background:var(--color-bg-light);padding:6px 10px;border-radius:var(--radius-md);}
    .word-card .btn-word{margin-top:auto;padding:10px;border:none;border-radius:var(--radius-md);background:var(--color-primary);color:white;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .15s;}
    .word-card .btn-word:hover{opacity:.88;}
    .word-card .btn-word:disabled{opacity:.5;cursor:not-allowed;}
    .word-info{background:#eef2ff;border:1px solid #c7d2fe;border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:16px;font-size:.85rem;color:#3730a3;}
    .wmode-pill{padding:6px 14px;border:none;border-radius:20px;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;background:transparent;color:var(--color-text-muted);transition:all .15s;}
    .wmode-pill.active{background:var(--color-primary);color:white;}
    @media(max-width:480px){ .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px} .stat-card .value{font-size:1.5rem} }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 รายงาน</h1>
      <p>ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>
    <div id="navigation"></div>
    <div class="content">
      <div id="alertContainer"></div>

      <div class="report-tabs">
        <button class="report-tab active" onclick="switchTab('trips',this)">🚗 การใช้งานรถ</button>
        <button class="report-tab" onclick="switchTab('drivers',this)">👤 พนักงานขับรถ</button>
        <button class="report-tab" onclick="switchTab('fuel',this)">⛽ เชื้อเพลิง</button>
        <button class="report-tab" onclick="switchTab('repairs',this)">🔧 ซ่อมบำรุง</button>
        <button class="report-tab" onclick="switchTab('word',this)">📄 เอกสาร Word</button>
      </div>

      <div class="filter-panel">
        <div class="filter-row">
          <div class="filter-group">
            <label>รูปแบบช่วงเวลา</label>
            <div class="date-mode-pills">
              <button class="date-mode-pill active" onclick="setDateMode('day',this)">วัน</button>
              <button class="date-mode-pill" onclick="setDateMode('month',this)">เดือน</button>
              <button class="date-mode-pill" onclick="setDateMode('year',this)">ปี</button>
              <button class="date-mode-pill" onclick="setDateMode('fiscal',this)">ปีงบประมาณ</button>
            </div>
            <div class="date-range-pills" style="margin-top:6px;display:flex;gap:6px;">
              <button class="date-range-pill active" onclick="setRangeMode('single',this)">เดี่ยว</button>
              <button class="date-range-pill" onclick="setRangeMode('range',this)">ช่วง</button>
            </div>
          </div>
          <div id="filter-day" class="filter-row" style="gap:8px">
            <div class="filter-group"><label id="lbl-day-from">วันที่</label><input type="date" id="dayFrom" onchange="onSingleDateChange('day')"></div>
            <div class="filter-group" id="fg-day-to"><label>ถึงวันที่</label><input type="date" id="dayTo" onchange="loadReport()"></div>
          </div>
          <div id="filter-month" class="filter-row" style="gap:8px;display:none">
            <div class="filter-group"><label id="lbl-month-from">เดือน</label><input type="month" id="monthFrom" onchange="onSingleDateChange('month')"></div>
            <div class="filter-group" id="fg-month-to"><label>ถึงเดือน</label><input type="month" id="monthTo" onchange="loadReport()"></div>
          </div>
          <div id="filter-year" class="filter-row" style="gap:8px;display:none">
            <div class="filter-group"><label id="lbl-year-from">ปี (พ.ศ.)</label><select id="yearFrom" onchange="onSingleDateChange('year')"></select></div>
            <div class="filter-group" id="fg-year-to"><label>ถึงปี (พ.ศ.)</label><select id="yearTo" onchange="loadReport()"></select></div>
          </div>
          <div id="filter-fiscal" class="filter-row" style="gap:8px;display:none">
            <div class="filter-group"><label id="lbl-fiscal-from">ปีงบประมาณ (พ.ศ.)</label><select id="fiscalYear" onchange="onSingleDateChange('fiscal')"></select></div>
            <div class="filter-group" id="fg-fiscal-to"><label>ถึงปีงบประมาณ (พ.ศ.)</label><select id="fiscalYearTo" onchange="loadReport()"></select></div>
          </div>
          <div class="filter-sep"></div>
          <div class="filter-group" id="fg-car" style="display:none">
            <label>รถ</label>
            <select id="filterCar" onchange="loadReport()"><option value="">ทุกคัน</option></select>
          </div>
          <div class="filter-group" id="fg-driver" style="display:none">
            <label>คนขับ</label>
            <select id="filterDriver" onchange="loadReport()"><option value="">ทุกคน</option></select>
          </div>
        </div>
      </div>

      <div class="action-bar">
        <button class="btn btn-secondary" onclick="loadReport()">🔃 รีเฟรช</button>
        <button class="btn btn-primary" onclick="exportExcel()">📊 Export Excel</button>
        <button class="btn btn-secondary" onclick="printReport()">🖨️ พิมพ์ / PDF</button>
      </div>

      <div id="reportLoading" class="loading-state" style="display:none">กำลังโหลดข้อมูล...</div>
      <div id="reportContent"></div>
    </div>
  </div>

  <script>
    var currentTab = 'trips';
    var dateMode = 'day';
    var rangeMode = 'single';
    var _lastPayload = null;

    /* ═══ เกณฑ์มาตรฐานอัตราสิ้นเปลือง (กม./ลิตร) ── ตรงกับ fuel-ledger.html ═══
       แก้ไขค่า default หรือเพิ่มทะเบียนรถแต่ละคันได้ที่นี่ */
    var KPL_THRESHOLDS = {
      'default': 10.0
      // 'ทะเบียนรถ': 9.0
    };
    function getKplThreshold(lp) { return KPL_THRESHOLDS[lp] || KPL_THRESHOLDS['default']; }
    function kplReportBadge(val, lp) {
      if (val == null || val === 0) return '-';
      var thr = getKplThreshold(lp);
      var ok = val >= thr;
      return '<span class="badge '+(ok?'badge-green':'badge-red')+'">'
        + Number(val).toFixed(2)+' กม./ลิตร '+(ok?'✅':'⚠️')+'</span>';
    }

    document.addEventListener('DOMContentLoaded', function () {
      requireAuth();
      initYearOptions();
      var today = new Date();
      var lastMonth = new Date(today);
      lastMonth.setMonth(lastMonth.getMonth() - 1);
      document.getElementById('dayFrom').value = fmtDate(lastMonth);
      document.getElementById('dayTo').value = fmtDate(today);
      var ym = today.getFullYear() + '-' + pad(today.getMonth() + 1);
      document.getElementById('monthFrom').value = ym;
      document.getElementById('monthTo').value = ym;
      loadCarFilter();
      loadDriverFilter();
      updateFilterVisibility();
      _applyRangeModeVisibility();
      loadReport();
    });

    function initYearOptions() {
      var yearFrom = document.getElementById('yearFrom');
      var yearTo = document.getElementById('yearTo');
      var fiscalYear = document.getElementById('fiscalYear');
      var fiscalYearTo = document.getElementById('fiscalYearTo');
      var cy = new Date().getFullYear() + 543;
      for (var y = cy + 1; y >= cy - 10; y--) {
        var o1 = document.createElement('option'); o1.value = y; o1.textContent = y; yearFrom.appendChild(o1);
        var o2 = document.createElement('option'); o2.value = y; o2.textContent = y; yearTo.appendChild(o2);
        var o3 = document.createElement('option'); o3.value = y; o3.textContent = 'พ.ศ. '+y; fiscalYear.appendChild(o3);
        var o4 = document.createElement('option'); o4.value = y; o4.textContent = 'พ.ศ. '+y; fiscalYearTo.appendChild(o4);
      }
      var currentFY = new Date().getFullYear() + 543 + (new Date().getMonth() >= 9 ? 1 : 0);
      fiscalYear.value = currentFY;
      fiscalYearTo.value = currentFY;
    }

    function pad(n) { return String(n).padStart(2,'0'); }
    function fmtDate(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
    function fmtNum(n) { return Number(n||0).toLocaleString('th-TH'); }
    function fmtMoney(n) { return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    function fmtDateTH(s) { return formatDateThai(s); }
    function fmtDateTimeTH(s) { return s ? formatDateTimeThai(s) : null; }
    function htmlEsc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ── แทรกบันทึก "ใช้รถโดยไม่บันทึกข้อมูล" ระหว่างคิวที่ไมล์ไม่ต่อเนื่อง ─
    // จัดกลุ่มตามทะเบียน เรียงเวลา ถ้าพบว่าไมล์ออกของคิวถัดไป > ไมล์กลับของคิวก่อน
    // เกิน GAP_THRESHOLD กม. → แทรก record สังเคราะห์ระหว่างกลาง
    function preprocessTripsWithGaps(records) {
      if (!records || !records.length) return records || [];
      var GAP_THRESHOLD = 5;
      var byCar = {}, keys = [];
      records.forEach(function(rec){
        var cid = rec.license_plate || rec.car_id || '_';
        if (!byCar[cid]) { byCar[cid] = []; keys.push(cid); }
        byCar[cid].push(rec);
      });
      keys.forEach(function(cid){
        byCar[cid].sort(function(a,b){
          return ((a.date||'')+' '+(a.time_start||'')).localeCompare((b.date||'')+' '+(b.time_start||''));
        });
      });
      var result = [];
      keys.forEach(function(cid){
        var list = byCar[cid];
        for (var i=0; i<list.length; i++) {
          result.push(list[i]);
          if (i+1 < list.length) {
            var cur = list[i], nxt = list[i+1];
            if (cur.mileage_end!=null && nxt.mileage_start!=null) {
              var gap = nxt.mileage_start - cur.mileage_end;
              if (gap > GAP_THRESHOLD) {
                result.push({
                  _synthetic: true,
                  date: nxt.date,
                  time_start: cur.time_end || cur.time_start || '',
                  time_end: nxt.time_start || '',
                  license_plate: cur.license_plate,
                  car_id: cur.car_id,
                  requester_display_name: '-',
                  requested_by: '-',
                  destination: '-',
                  mission: 'มีการใช้รถโดยไม่บันทึกข้อมูล',
                  driver_name: 'ไม่ทราบ',
                  driver_id: null,
                  actual_departure: null,
                  actual_return: null,
                  mileage_start: cur.mileage_end,
                  mileage_end: nxt.mileage_start,
                  status: 'completed'
                });
              }
            }
          }
        }
      });
      result.sort(function(a,b){
        return ((a.date||'')+' '+(a.time_start||'')).localeCompare((b.date||'')+' '+(b.time_start||''));
      });
      return result;
    }

    // ── ตรวจสอบความผิดปกติของเลขไมล์ ──────────────────────────────
    // r = record (มี mileage_start, mileage_end, prev_ret_mileage, next_dep_mileage)
    // avgKm = ระยะทางเฉลี่ยของรถคันนี้ (null = ไม่ตรวจ outlier)
    // คืน array of {msg, level} เมื่อพบความผิดปกติ
    function detectMileageAnomalies(r, avgKm) {
      if (r._synthetic) return [];
      var issues = [];
      var ms = r.mileage_start, me = r.mileage_end;
      if (ms != null && me != null) {
        if (me < ms)
          issues.push({msg:'เลขไมล์กลับ ('+me+') น้อยกว่าตอนออก ('+ms+') — น่าจะพิมพ์ผิด', level:'error'});
        else if (me === ms)
          issues.push({msg:'เลขไมล์ออกและกลับเหมือนกัน ('+ms+') ระยะทาง 0 กม. — น่าจะพิมพ์ผิด', level:'warn'});
      }
      if (me != null && r.next_dep_mileage != null && me > r.next_dep_mileage + 50) {
        var over = me - r.next_dep_mileage;
        issues.push({msg:'เลขไมล์กลับ ('+me+') สูงกว่าเลขไมล์ออกของคิวถัดไป ('+r.next_dep_mileage+') อยู่ '+over+' กม. — เลขไมล์กลับน่าจะพิมพ์ผิด', level:'error'});
      }
      if (ms != null && r.prev_ret_mileage != null) {
        var gap = ms - r.prev_ret_mileage;
        if (gap > 50)
          issues.push({msg:'เลขไมล์ออก ('+ms+') สูงกว่าตอนกลับจากเที่ยวก่อน ('+r.prev_ret_mileage+') อยู่ '+gap+' กม. — อาจมีการใช้รถโดยไม่บันทึก หรือพิมพ์ผิด', level:'warn'});
        else if (gap < -50)
          issues.push({msg:'เลขไมล์ออก ('+ms+') ต่ำกว่าตอนกลับจากเที่ยวก่อน ('+r.prev_ret_mileage+') อยู่ '+Math.abs(gap)+' กม. — น่าจะพิมพ์ผิด', level:'warn'});
      }
      if (avgKm && avgKm > 0) {
        var effS = ms!=null?ms:(r.prev_ret_mileage!=null?r.prev_ret_mileage:null);
        var effE = me!=null?me:(r.next_dep_mileage!=null?r.next_dep_mileage:null);
        if (effS!=null && effE!=null && effE>effS) {
          var km = effE - effS;
          var threshold = Math.max(200, avgKm * 3);
          if (km > threshold)
            issues.push({msg:'ระยะทางเที่ยวนี้ '+km+' กม. สูงผิดปกติ (ปกติเฉลี่ย '+Math.round(avgKm)+' กม.) — กรุณาตรวจสอบ', level:'warn'});
        }
      }
      return issues;
    }
    function buildQuery(params) {
      var parts = [];
      Object.keys(params).forEach(function(k) {
        if (params[k]!==undefined && params[k]!==null && params[k]!=='') parts.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k]));
      });
      return parts.length ? '?'+parts.join('&') : '';
    }
    function emptyState(icon, msg) { return '<div class="empty-state"><div class="empty-state-icon">'+icon+'</div><p>'+htmlEsc(msg)+'</p></div>'; }
    function statCard(title, value, unit, sub, variant) {
      return '<div class="stat-card'+(variant?' '+variant:'')+'"><h3>'+title+'</h3>'
        +'<div class="value">'+value+'</div>'
        +'<div class="unit">'+unit+'</div>'
        +(sub?'<div class="sub">'+sub+'</div>':'')
        +'</div>';
    }
    function statusBadge(status) {
      var map = {active:['badge-green','ใช้งาน'],inactive:['badge-gray','ไม่ใช้งาน'],maintenance:['badge-yellow','ซ่อมบำรุง'],completed:['badge-green','เสร็จแล้ว'],in_progress:['badge-blue','กำลังซ่อม'],reported:['badge-yellow','แจ้งซ่อม'],cancelled:['badge-red','ยกเลิก'],scheduled:['badge-violet','นัดหมาย'],ongoing:['badge-blue','กำลังไป'],leave:['badge-yellow','ลา']};
      var s = map[status]||['badge-gray',status||'-'];
      return '<span class="badge '+s[0]+'">'+s[1]+'</span>';
    }

    function getDateRange() {
      if (dateMode==='day') {
        var df=document.getElementById('dayFrom').value;
        var dt=rangeMode==='single'?df:document.getElementById('dayTo').value;
        return {date_from:df, date_to:dt};
      }
      if (dateMode==='month') {
        var mf=document.getElementById('monthFrom').value;
        var mt=rangeMode==='single'?mf:document.getElementById('monthTo').value;
        if (!mf) return {date_from:'',date_to:''};
        var lastDay=new Date(parseInt(mt.substr(0,4)),parseInt(mt.substr(5,2)),0);
        return {date_from:mf+'-01', date_to:fmtDate(lastDay)};
      }
      if (dateMode==='year') {
        var yf=parseInt(document.getElementById('yearFrom').value)-543;
        var yt=rangeMode==='single'?yf:(parseInt(document.getElementById('yearTo').value)-543);
        return {date_from:yf+'-01-01', date_to:yt+'-12-31'};
      }
      if (dateMode==='fiscal') {
        var fyf=parseInt(document.getElementById('fiscalYear').value);
        var fyt=rangeMode==='single'?fyf:parseInt(document.getElementById('fiscalYearTo').value);
        var ceFrom=(fyf-543)-1; var ceTo=fyt-543;
        return {date_from:ceFrom+'-10-01', date_to:ceTo+'-09-30'};
      }
      return {date_from:'',date_to:''};
    }
    function getRangeLabel() {
      var r=getDateRange();
      if (!r.date_from && !r.date_to) return '';
      if (rangeMode==='single') return fmtDateTH(r.date_from);
      if (r.date_from===r.date_to) return fmtDateTH(r.date_from);
      return fmtDateTH(r.date_from)+' - '+fmtDateTH(r.date_to);
    }

    function _applyRangeModeVisibility() {

      var toIds={day:'fg-day-to',month:'fg-month-to',year:'fg-year-to',fiscal:'fg-fiscal-to'};
      var lblFrom={day:'lbl-day-from',month:'lbl-month-from',year:'lbl-year-from',fiscal:'lbl-fiscal-from'};

      if(lbl){
        var map={day:{single:'\u0e27\u0e31\u0e19\u0e17\u0e35\u0e48',range:'\u0e15\u0e31\u0e49\u0e07\u0e41\u0e15\u0e48\u0e27\u0e31\u0e19\u0e17\u0e35\u0e48'},month:{single:'\u0e40\u0e14\u0e37\u0e2d\u0e19',range:'\u0e15\u0e31\u0e49\u0e07\u0e41\u0e15\u0e48\u0e40\u0e14\u0e37\u0e2d\u0e19'},year:{single:'\u0e1b\u0e35 (\u0e1e.\u0e28.)',range:'\u0e15\u0e31\u0e49\u0e07\u0e41\u0e15\u0e48\u0e1b\u0e35 (\u0e1e.\u0e28.)'},fiscal:{single:'\u0e1b\u0e35\u0e07\u0e1a\u0e1b\u0e23\u0e30\u0e21\u0e32\u0e13 (\u0e1e.\u0e28.)',range:'\u0e15\u0e31\u0e49\u0e07\u0e41\u0e15\u0e48\u0e1b\u0e35\u0e07\u0e1a (\u0e1e.\u0e28.)'}};
        if(map[dateMode]) lbl.textContent=map[dateMode][rangeMode]||lbl.textContent;
      }
    }
    function onSingleDateChange(mode) {
      if(rangeMode==='single') {
        if(mode==='day') document.getElementById('dayTo').value=document.getElementById('dayFrom').value;
        else if(mode==='month') document.getElementById('monthTo').value=document.getElementById('monthFrom').value;
        else if(mode==='year') document.getElementById('yearTo').value=document.getElementById('yearFrom').value;
        else if(mode==='fiscal') document.getElementById('fiscalYearTo').value=document.getElementById('fiscalYear').value;
      }
      loadReport();
    }

    async function loadReport() {

        var html='';

    /* ═══ TAB 1: การใช้งานรถ ═══════════════════════════════════════ */
    async function renderTrips() {
      var range=getDateRange();
      var carId=document.getElementById('filterCar').value;
      var driverId=document.getElementById('filterDriver').value;
      var params=buildQuery({date_from:range.date_from,date_to:range.date_to,car_id:carId||undefined,driver_id:driverId||undefined});
      var r=await API.get('/api/reports/trips'+params);
      var payload=(r&&r.data)?r.data:(r||{});
      var records=payload.records||[];
      records = preprocessTripsWithGaps(records);
      payload.records = records;
      var summary=payload.summary||{};
      _lastPayload={tab:'trips',payload:payload,range:range};

      var carQueues={};
      records.forEach(function(rec) {
        var cid=rec.license_plate||rec.car_id||'_';
        if (!carQueues[cid]) carQueues[cid]=[];
        carQueues[cid].push(rec);
      });
      Object.keys(carQueues).forEach(function(cid) {
        carQueues[cid].sort(function(a,b) {
          return ((a.date||'')+' '+(a.time_start||'')).localeCompare((b.date||'')+' '+(b.time_start||''));
        });
      });

      function inferKm(rec,all) {
        var ms=rec.mileage_start, me=rec.mileage_end;
        // หาไมล์กลับของคิวก่อนหน้า / ไมล์ออกของคิวถัดไป (รถคันเดียวกัน)
        var prevRet=null, nextDep=null;
        if (all) {
          var idx=all.indexOf(rec);
          if (idx>=0) {
            for (var i=idx-1; i>=0; i--) { if (all[i].mileage_end!=null) { prevRet=all[i].mileage_end; break; } }
            for (var j=idx+1; j<all.length; j++) { if (all[j].mileage_start!=null) { nextDep=all[j].mileage_start; break; } }
          }
        }
        var effS = ms!=null ? ms : prevRet;
        var effE = me!=null ? me : nextDep;
        var inferred = (ms==null || me==null);
        if (effS!=null && effE!=null && effE>=effS) return {km:effE-effS, inferred:inferred};
        return {km:null, inferred:false};
      }

      var processed=records.map(function(rec) {
        var cid=rec.license_plate||rec.car_id||'_';
        var km=inferKm(rec,carQueues[cid]);
        return Object.assign({},rec,{_km:km.km,_inf:km.inferred});
      });

      var totalKm=0,kmCnt=0,noRec=0,incomp=0;
      processed.forEach(function(rec) {
        if (!rec.actual_departure && !rec.actual_return) noRec++;
        else if (!rec.actual_departure || !rec.actual_return) incomp++;
        if (rec._km!=null) { totalKm+=rec._km; kmCnt++; }
      });

      // Pre-compute avg km per car สำหรับ outlier
      var _rCarKms={};
      processed.forEach(function(rec){
        if(rec._km!=null&&!rec._inf){var k=rec.license_plate||'_';if(!_rCarKms[k])_rCarKms[k]=[];_rCarKms[k].push(rec._km);}
      });
      var _rCarAvg={};
      Object.keys(_rCarKms).forEach(function(k){var a=_rCarKms[k];_rCarAvg[k]=a.reduce(function(s,v){return s+v;},0)/a.length;});
      // Detect anomalies per record
      processed=processed.map(function(rec){
        var issues=detectMileageAnomalies(rec,_rCarAvg[rec.license_plate||'_']);
        return Object.assign({},rec,{_anomalies:issues});
      });
      var anomalyCount=processed.filter(function(r){return r._anomalies&&r._anomalies.length;}).length;

      var rl=getRangeLabel();
      var h='<div class="stats-grid">';
      h+=statCard('🚗 จำนวนเที่ยว',fmtNum(summary.total||0),'เที่ยว','เสร็จ '+fmtNum(summary.completed||0)+' | ยกเลิก '+fmtNum(summary.cancelled||0));
      h+=statCard('🛣️ ระยะทางรวม',fmtNum(totalKm),'กม.','จาก '+fmtNum(kmCnt)+' เที่ยวที่มีข้อมูล','success');
      h+=statCard('⚠️ ไม่มีบันทึกเลย',fmtNum(noRec),'เที่ยว','ขาดทั้งออกและกลับ',noRec>0?'warn':'');
      h+=statCard('🔔 บันทึกไม่ครบ',fmtNum(incomp),'เที่ยว','ขาดออกหรือกลับ',incomp>0?'warn':'');
      h+=statCard('🔍 เลขไมล์น่าสงสัย',fmtNum(anomalyCount),'รายการ','ตรวจสอบได้ด้านล่าง',anomalyCount>0?'warn':'');
      h+='</div>';
      if (!processed.length) return h+emptyState('🚗','ไม่พบข้อมูลในช่วงเวลาที่เลือก');

      var wds=['อา','จ','อ','พ','พฤ','ศ','ส'];
      h+='<div class="report-section"><div class="section-header"><span class="section-title">📋 รายการใช้รถ'+(rl?' ('+rl+')':'')+'</span>'
        +(anomalyCount>0?'<button onclick="this.dataset.f=this.dataset.f===\'1\'?\'0\':\'1\';document.querySelectorAll(\'tr.row-ok\').forEach(function(t){t.style.display=this.dataset.f===\'1\'?\'none\':\'\';}.bind(this));this.textContent=this.dataset.f===\'1\'?\'แสดงทั้งหมด\':\'🔍 แสดงเฉพาะน่าสงสัย ('+anomalyCount+')\'" data-f="0" style="margin-left:auto;padding:4px 12px;font-size:.8rem;border-radius:6px;border:1px solid #d97706;color:#d97706;background:#fffbeb;cursor:pointer">🔍 แสดงเฉพาะน่าสงสัย ('+anomalyCount+')</button>':'')
        +'<span style="font-size:.8rem;color:var(--color-text-muted)">'+fmtNum(processed.length)+' รายการ</span></div>';
      h+='<div class="section-body"><table class="report-table"><thead><tr><th>วันที่</th><th>เวลา</th><th>ทะเบียน</th><th>ผู้ขอ</th><th>จุดหมาย/ภารกิจ</th><th>คนขับ</th><th>บันทึกออก</th><th>บันทึกกลับ</th><th>ระยะทาง</th><th>สถานะ</th></tr></thead><tbody>';
      processed.forEach(function(rec) {
        var d=new Date(rec.date);
        var wd=isNaN(d)?'':wds[d.getDay()];
        var isWE=!isNaN(d)&&(d.getDay()===0||d.getDay()===6);
        var noR=!rec.actual_departure&&!rec.actual_return;
        var inc=!noR&&(!rec.actual_departure||!rec.actual_return);
        var hasAnomaly=rec._anomalies&&rec._anomalies.length>0;
        var rc=hasAnomaly?'row-anomaly':(noR?'row-no-record':(inc?'row-incomplete':'row-ok'));
        var dep=rec.actual_departure?fmtDateTimeTH(rec.actual_departure):'<span class="no-record-cell">🔴 ไม่มีการบันทึก</span>';
        var ret=rec.actual_return?fmtDateTimeTH(rec.actual_return):'<span class="no-record-cell">🔴 ไม่มีการบันทึก</span>';
        var kmC='-';
        if (rec._km!=null) {
          kmC=fmtNum(rec._km)+' กม.';
          if (rec._inf) kmC+='<div class="mileage-inferred">📐 คำนวณจากไมล์ข้างเคียง</div>';
        }
        if (hasAnomaly) {
          var aStyle=rec._anomalies.some(function(a){return a.level==='error';});
          kmC+='<div style="font-size:.78em;color:'+(aStyle?'#dc2626':'#d97706')+';margin-top:2px">'
            +rec._anomalies.map(function(a){return '⚠️ '+htmlEsc(a.msg);}).join('<br>')+'</div>';
        }
        h+='<tr class="'+rc+'">';
        h+='<td>'+fmtDateTH(rec.date)+' <span style="font-size:.8em;color:'+(isWE?'#dc2626':'inherit')+'">'+wd+'</span></td>';
        h+='<td style="white-space:nowrap">'+htmlEsc((rec.time_start||'')+(rec.time_end?'–'+rec.time_end:''))+'</td>';
        h+='<td><strong>'+htmlEsc(rec.license_plate||'-')+'</strong></td>';
        h+='<td>'+htmlEsc(rec.requester_display_name||rec.requested_by||'-')+'</td>';
        h+='<td style="max-width:200px"><div>'+htmlEsc(rec.destination||'-')+'</div>'+(rec.mission?'<div style="font-size:.8em;color:var(--color-text-muted);margin-top:2px">'+htmlEsc(rec.mission)+'</div>':'')+'</td>';
        var isAutoGap=rec.mission&&rec.mission.indexOf('ไม่บันทึกข้อมูล')>=0;
        var driverCell=isAutoGap?'<span style="color:#9ca3af;font-style:italic">ไม่ทราบ</span>':htmlEsc(rec.driver_name||'-');
        h+='<td>'+driverCell+'</td>';
        h+='<td style="white-space:nowrap">'+dep+'</td>';
        h+='<td style="white-space:nowrap">'+ret+'</td>';
        h+='<td style="white-space:nowrap">'+kmC+'</td>';
        h+='<td>'+statusBadge(rec.status)+'</td>';
        h+='</tr>';
      });
      h+='</tbody></table></div>';
      h+='<div class="kpi-note">🔴 ไม่มีการบันทึก = ไม่มีการสแกน QR หน้ารถ | 📐 คำนวณจากไมล์ข้างเคียง = ใช้เลขไมล์คิวก่อนหน้า/ถัดไปของรถคันเดียวกัน</div>';
      h+='</div>';
      return h;
    }

    /* ═══ TAB 2: พนักงานขับรถ ══════════════════════════════════════ */
    async function renderDrivers() {
      var range=getDateRange();
      var driverId=document.getElementById('filterDriver').value;
      var params=buildQuery({date_from:range.date_from,date_to:range.date_to,driver_id:driverId||undefined});
      var r=await API.get('/api/reports/driver-summary'+params);
      var payload=(r&&r.data)?r.data:(r||{});
      var drivers=payload.drivers||[];
      var summary=payload.summary||{};
      _lastPayload={tab:'drivers',payload:payload,range:range};

      var rl=getRangeLabel();
      var h='<div class="stats-grid">';
      h+=statCard('👤 พนักงานที่ขับงาน',fmtNum(summary.total_drivers||0),'คน','');
      h+=statCard('🚗 เที่ยวรวม',fmtNum(summary.total_trips||0),'เที่ยว','');
      h+=statCard('🛣️ ระยะทางรวม',fmtNum(Math.round(summary.total_km||0)),'กม.','');
      h+=statCard('⏱️ ชั่วโมงขับรวม',Number(summary.total_hours||0).toFixed(1),'ชม.','');
      h+=statCard('📅 วันหยุดสัปดาห์',fmtNum(summary.weekend_trips||0),'เที่ยว','เสาร์/อาทิตย์',summary.weekend_trips>0?'warn':'');
      h+='</div>';

      var active=drivers.filter(function(d){return d.trip_count>0;});
      if (!active.length) return h+emptyState('👤','ไม่พบข้อมูลในช่วงเวลาที่เลือก');

      h+='<div class="report-section"><div class="section-header"><span class="section-title">👤 สรุปการทำงานพนักงานขับรถ'+(rl?' ('+rl+')':'')+'</span></div>';
      h+='<div class="section-body"><table class="report-table"><thead><tr><th>ชื่อ</th><th>จำนวนเที่ยว</th><th>ระยะทาง (กม.)</th><th>ชม.ขับ</th><th>วันทำการ</th><th>วันหยุดสัปดาห์</th><th>บันทึกไม่ครบ</th><th>สถานะ</th></tr></thead><tbody>';
      drivers.forEach(function(d) {
        if (!d.trip_count) return;
        var ir=d.trip_count>0?Math.round((d.trips_incomplete||0)/d.trip_count*100):0;
        h+='<tr>';
        h+='<td><strong>'+htmlEsc(d.driver_name||'-')+'</strong></td>';
        h+='<td>'+fmtNum(d.trip_count||0)+'</td>';

        h+='<td>'+Number(d.total_hours||0).toFixed(1)+'</td>';
        h+='<td>'+fmtNum(d.weekday_trips||0)+' วัน</td>';
        h+='<td>'+(d.weekend_trips>0?'<span class="badge badge-orange">'+fmtNum(d.weekend_trips)+' เที่ยว</span>':'<span class="badge badge-gray">0</span>')+'</td>';
        h+='<td>'+(d.trips_incomplete>0?'<span class="badge badge-yellow">'+d.trips_incomplete+' เที่ยว ('+ir+'%)</span>':'<span class="badge badge-green">ครบ</span>')+'</td>';
        h+='<td>'+statusBadge(d.driver_status)+'</td>';
        h+='</tr>';
      });
      h+='</tbody></table></div>';
      h+='<div class="kpi-note">📅 วันหยุดสัปดาห์ = เสาร์/อาทิตย์ ตามกฎหมายแรงงาน | ระยะทางและชั่วโมงขับนับจากเที่ยวที่มีข้อมูลไมล์/เวลาครบ</div>';
      h+='</div>';
      return h;

    function exportExcel() {
      if (!_lastPayload) { alert('ยังไม่มีข้อมูล'); return; }
      var t=_lastPayload.tab, p=_lastPayload.payload, r=_lastPayload.range;
      var ds=(r.date_from||'all')+'_'+(r.date_to||'all');
      if (t==='trips')   return exportTripsExcel(p,ds);
      if (t==='drivers') return exportDriversExcel(p,ds);
      if (t==='fuel')    return exportFuelExcel(p,ds);
      if (t==='repairs') return exportRepairsExcel(p,ds);
    }

    function exportTripsExcel(p,ds) {
      var recs=p.records||[];
      if (!recs.length) { alert('ไม่มีข้อมูล'); return; }
      function fmtDT(s){
        if(!s) return 'ไม่มีการบันทึก';
        return formatDateTimeThai(s);
      }
      var hdr=['วันที่','เวลาสแกนออก','เวลาสแกนเข้า','ทะเบียน','ผู้ขอ','จุดหมาย','ภารกิจ','คนขับ','ก่อนออกเดินทาง','กลับมาจากเดินทาง','เลขไมล์ก่อนออก','เลขไมล์กลับมา','ระยะทาง (กม.)','หมายเหตุ'];
      // Pre-compute avg km per car (เฉพาะค่าจริง) สำหรับ outlier detection
      var _carKms={};
      recs.forEach(function(r){
        if(r._synthetic) return;
        var ms=r.mileage_start,me=r.mileage_end;
        if(ms!=null&&me!=null&&me>ms){var k=r.license_plate||'_';if(!_carKms[k])_carKms[k]=[];_carKms[k].push(me-ms);}
      });
      var _carAvg={};
      Object.keys(_carKms).forEach(function(k){var a=_carKms[k];_carAvg[k]=a.reduce(function(s,v){return s+v;},0)/a.length;});
      function buildRows(list){
        var redCells=[];
        var rows=list.map(function(r,i){
          var d=new Date(r.date);
          var thd=isNaN(d)?r.date||'':formatDateThai(r.date);
          // คำนวณระยะทาง: ใช้ไมล์จริงก่อน ถ้าขาดให้ใช้ประมาณ (prev_ret / next_dep) แต่ไม่แสดงในช่องเลขไมล์
          var ms=r.mileage_start, me=r.mileage_end;
          var effStart=ms!=null?ms:(r.prev_ret_mileage!=null?r.prev_ret_mileage:null);
          var effEnd=me!=null?me:(r.next_dep_mileage!=null?r.next_dep_mileage:null);
          var km=(effStart!=null&&effEnd!=null&&effEnd>effStart)?effEnd-effStart:'';
          var isAutoGap=r.mission&&r.mission.indexOf('ไม่บันทึกข้อมูล')>=0;
          var driverExport=isAutoGap?'ไม่ทราบ':(r.driver_name||'-');
          var remark='';
          if(isAutoGap) remark='มีการใช้รถโดยไม่บันทึกข้อมูล';
          else if(!r.actual_departure&&!r.actual_return) remark='พนักงานขับรถไม่บันทึกออกและกลับ';
          else if(!r.actual_departure) remark='พนักงานขับรถไม่บันทึกก่อนออกเดินทาง';
          else if(!r.actual_return) remark='พนักงานขับรถไม่บันทึกกลับมาจากเดินทาง';
          if(remark){redCells.push({row:i,col:13});}
          return [thd,r.time_start||'',r.time_end||'',r.license_plate||'',r.requester_display_name||r.requested_by||'',r.destination||'',r.mission||'',driverExport,isAutoGap?'':fmtDT(r.actual_departure),isAutoGap?'':fmtDT(r.actual_return),isAutoGap?'':(r.mileage_start!=null?r.mileage_start:''),isAutoGap?'':(r.mileage_end!=null?r.mileage_end:''),km,remark];
        });
        return {rows:rows,redCells:redCells};
      }
      var carFilter=document.getElementById('filterCar').value;
      if (!carFilter) {
        // แยก sheet ตามทะเบียน
        var groups={}; var order=[];
        recs.forEach(function(r){
          var k=r.license_plate||'ไม่ระบุ';
          if(!groups[k]){groups[k]=[];order.push(k);}
          groups[k].push(r);
        });
        // sheet แรก = ทั้งหมด
        var allBuilt=buildRows(recs);
        var sheets=[{sheetName:'ทั้งหมด',headers:hdr,rows:allBuilt.rows,redCells:allBuilt.redCells}];
        order.forEach(function(k){
          var built=buildRows(groups[k]);
          sheets.push({sheetName:k,headers:hdr,rows:built.rows,redCells:built.redCells});
        });
        ExportUtils.exportExcelSheets({filename:'การใช้งานรถ_'+ds,sheets:sheets});
      } else {
        var built=buildRows(recs);
        ExportUtils.exportExcel({filename:'การใช้งานรถ_'+ds,sheetName:recs[0]&&recs[0].license_plate||'การใช้งานรถ',headers:hdr,rows:built.rows,redCells:built.redCells});
      }
    }

    /* ═══ WORD TAB ═══════════════════════════════════════════════════ */

    /* ─── Word date range picker ──────────────────────────────────── */
    var _wMode = 'fiscal'; // default

    function _wPad(n){return String(n).padStart(2,'0');}
    function _lastDay(y,m){return new Date(y,m,0).getDate();}

    function getWordDateRange() {
      var mode = _wMode;
      var ce, from, to, label;
      if (mode === 'month') {
        var sel = document.getElementById('wSelMonth');
        var selY = document.getElementById('wSelMonthYear');
        if (!sel||!selY) return null;
        var m = +sel.value, bsY = +selY.value, ceY = bsY-543;
        from = ceY+'-'+_wPad(m)+'-01';
        to   = ceY+'-'+_wPad(m)+'-'+_wPad(_lastDay(ceY,m));
        label = MONTHS_TH[m]+' พ.ศ. '+bsY;
      } else if (mode === 'year') {
        var selY2 = document.getElementById('wSelYear');
        if (!selY2) return null;
        var bsY2 = +selY2.value, ceY2 = bsY2-543;
        from = ceY2+'-01-01'; to = ceY2+'-12-31';
        label = 'ปี พ.ศ. '+bsY2;
      } else if (mode === 'ay') {
        var selAY = document.getElementById('wSelAY');
        if (!selAY) return null;
        var ay = +selAY.value, ceAY = ay-543;
        from = ceAY+'-05-01'; to = (ceAY+1)+'-04-30';
        label = 'ปีการศึกษา '+ay;
      } else if (mode === 'sem') {
        var selSem = document.getElementById('wSelSem');
        var selSemAY = document.getElementById('wSelSemAY');
        if (!selSem||!selSemAY) return null;
        var sem = +selSem.value, ayS = +selSemAY.value, ceS = ayS-543;
        if (sem===1) { from=ceS+'-05-01'; to=ceS+'-10-31'; label='ภาคเรียนที่ 1 ปีการศึกษา '+ayS; }
        else         { from=ceS+'-11-01'; to=(ceS+1)+'-04-30'; label='ภาคเรียนที่ 2 ปีการศึกษา '+ayS; }
      } else if (mode === 'fiscal') {
        var selFY = document.getElementById('wSelFY');
        if (!selFY) return null;
        var fy = +selFY.value, ceFY = fy-543;
        from = (ceFY-1)+'-10-01'; to = ceFY+'-09-30';
        label = 'ปีงบประมาณ พ.ศ. '+fy;
      } else if (mode === 'quarter') {
        var selQ = document.getElementById('wSelQ');
        var selQFY = document.getElementById('wSelQFY');
        if (!selQ||!selQFY) return null;
        var q = +selQ.value, qfy = +selQFY.value, ceQFY = qfy-543;
        var qMap = {1:[(ceQFY-1)+'-10-01',(ceQFY-1)+'-12-31'],2:[ceQFY+'-01-01',ceQFY+'-03-31'],3:[ceQFY+'-04-01',ceQFY+'-06-30'],4:[ceQFY+'-07-01',ceQFY+'-09-30']};
        from = qMap[q][0]; to = qMap[q][1];
        label = 'ไตรมาส '+q+' ปีงบประมาณ '+qfy;
      }
      return {from:from, to:to, label:label};
    }

    function _buildYearOpts(elId, defaultBsY) {
      var cur = new Date().getFullYear()+543;
      var s=''; for(var y=cur+1;y>=cur-10;y--) s+='<option value="'+y+'"'+(y===defaultBsY?' selected':'')+'>'+y+'</option>';
      return '<select id="'+elId+'" onchange="_wUpdateLabel()" style="padding:6px 8px;border:1px solid var(--color-border);border-radius:var(--radius-md);font-family:inherit;font-size:.88rem;">'+s+'</select>';
    }
    function _buildAYOpts(elId, defaultAY) {
      var cur = new Date().getFullYear()+543 + (new Date().getMonth()>=4?1:0);
      var s=''; for(var y=cur+1;y>=cur-5;y--) s+='<option value="'+y+'"'+(y===defaultAY?' selected':'')+'>'+y+'</option>';
      return '<select id="'+elId+'" onchange="_wUpdateLabel()" style="padding:6px 8px;border:1px solid var(--color-border);border-radius:var(--radius-md);font-family:inherit;font-size:.88rem;">'+s+'</select>';
    }

    function _wModeControls(mode) {
      var curY = new Date().getFullYear()+543;

    /* ─── ensure docx library loaded ──────────────────────────────── */
    function ensureDocx() {
      if (window.docx) return Promise.resolve(true);
      return new Promise(function(resolve) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/docx@9.7.1/build/index.umd.js';
        s.onload = function() { resolve(!!window.docx); };
        s.onerror = function() { resolve(false); };
        document.head.appendChild(s);
      });
    }

    function nf(v,d){return Number(v||0).toLocaleString('th-TH',d!=null?{minimumFractionDigits:d,maximumFractionDigits:d}:{});}

    function dlDocx(buf,name){
      var blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download=name;a.click();

    /* ─── 1. ทะเบียนควบคุมการจัดซื้อน้ำมัน ─────────────────────── */
    async function generateFuelRegisterDocx(btn) {
      var _wr=getWordDateRange(); if(!_wr){alert('กรุณาเลือกช่วงเวลา');return;}
      setBtn(btn,true);
      try {
        if(!await ensureDocx()){alert('โหลดไลบรารี docx ไม่สำเร็จ กรุณารีโหลดหน้าแล้วลองใหม่');setBtn(btn,false);return;}
        var d=window.docx;
        var r=await API.get('/api/reports/fuel?date_from='+_wr.from+'&date_to='+_wr.to);
        var recs=(r&&r.data)?r.data.records||[]:(r.records||[]);
        // Group by month
        var byMonth={};
        recs.forEach(function(f){
          var ym=f.date.substr(0,7);
          if(!byMonth[ym])byMonth[ym]=[];
          byMonth[ym].push(f);
        });
        // ── Portrait section: cover + summary ──
        var pNodes=[];
        // Cover
        pNodes.push(...el(4));
        pNodes.push(ppc('แบบ ทบ.3',{size:_SB,sp:{before:0,after:20}}));
        pNodes.push(ppc('ทะเบียนควบคุมการจัดซื้อน้ำมันเชื้อเพลิง',{size:_ST,bold:true,sp:{before:0,after:20}}));
        pNodes.push(ppc(_wr.label,{size:_ST,bold:true,sp:{before:0,after:40}}));
        pNodes.push(ppc(SCHOOL_TH,{size:_SH,sp:{before:0,after:20}}));
        pNodes.push(ppc(ZONE_TH,{size:_SB,sp:{before:0,after:100}}));
        pNodes.push(pb());
        // Summary table by month
        var totL=0,totA=0,totC=0;
        var sumRows=[new d.TableRow({tableHeader:true,children:[
          hCell('ลำดับ',600),hCell('เดือน',1600),hCell('จำนวน\nรายการ',900),hCell('ปริมาณน้ำมัน\n(ลิตร)',1200),hCell('วงเงิน\n(บาท)',1400),hCell('หมายเหตุ',3406),
        ]})];
        var sumMonths=['2024-10','2024-11','2024-12','2025-01','2025-02','2025-03','2025-04','2025-05','2025-06','2025-07','2025-08','2025-09'];
        sumMonths.forEach(function(ym,i){
          var ms=byMonth[ym]||[];
          var mL=ms.reduce(function(s,f){return s+(+f.liters||0);},0);

          dCellR(nf(totC),900),dCellR(nf(totL,2),1200),dCellR(bf(totA),1400),
          new d.TableCell({borders:_BC,shading:_HSGT,children:[ppl('-',{size:_SC,sp:{before:20,after:20}})]}),
        ]}));
        pNodes.push(ppc('สรุปการจัดซื้อน้ำมันเชื้อเพลิง ปีงบประมาณ พ.ศ. ๒๕๖๘',{size:_SH,bold:true,sp:{before:0,after:20}}));

    /* Signature Modal helpers */
    var _sigResolve = null;
    var _sigFields = [];
    function requireSigs(fields, title) {
      return new Promise(function(resolve) {
        _sigResolve = resolve;
        _sigFields = fields;
        document.getElementById('sigModalTitle').textContent = title || 'กรอกข้อมูลเอกสาร';
        // pre-fill doc fields
        var savedDocNo = localStorage.getItem('sig_docno') || '';
        var savedDocDate = localStorage.getItem('sig_docdate') || new Date().toISOString().slice(0,10);
        document.getElementById('sigDocNumber').value = savedDocNo;
        document.getElementById('sigDocDate').value = savedDocDate;
        // build sig fields
        var html = '';
        fields.forEach(function(f) {
          var sn = localStorage.getItem('sig_'+f.key+'_name') || '';
          var sp = localStorage.getItem('sig_'+f.key+'_pos') || '';
          html += '<div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px;margin-bottom:10px;">'
            + '<div style="font-weight:700;font-size:.9em;color:#555;margin-bottom:8px;">'+htmlEsc(f.label)+'</div>'
            + '<div style="display:flex;gap:10px;">'
            + '<div style="flex:2"><label style="display:block;font-size:.82em;font-weight:700;margin-bottom:3px;">ชื่อ-สกุล <span style="color:#c62828;">*</span></label>'
            + '<input type="text" id="sig_'+f.key+'_name" value="'+htmlEsc(sn)+'" placeholder="ชื่อ-สกุล" style="width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:6px;font-size:.95em;font-family:inherit;box-sizing:border-box;"></div>'
            + '<div style="flex:2"><label style="display:block;font-size:.82em;font-weight:700;margin-bottom:3px;">ตำแหน่ง <span style="color:#c62828;">*</span></label>'
            + '<input type="text" id="sig_'+f.key+'_pos" value="'+htmlEsc(sp)+'" placeholder="ตำแหน่ง" style="width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:6px;font-size:.95em;font-family:inherit;box-sizing:border-box;"></div>'
            + '</div></div>';
        });
        document.getElementById('sigModalFields').innerHTML = html;
        document.getElementById('sigModalMsg').style.display = 'none';
        var m = document.getElementById('sigModal');
        m.style.display = 'flex';
      });
    }
    function _sigConfirm() {
      var missing = [];
      var docNo = (document.getElementById('sigDocNumber').value||'').trim();
      var docDate = (document.getElementById('sigDocDate').value||'').trim();
      if (!docNo) missing.push('เลขที่เอกสาร');
      if (!docDate) missing.push('วันที่เอกสาร');
      _sigFields.forEach(function(f) {
        if (!(document.getElementById('sig_'+f.key+'_name').value||'').trim()) missing.push(f.label+' (ชื่อ-สกุล)');
        if (!(document.getElementById('sig_'+f.key+'_pos').value||'').trim()) missing.push(f.label+' (ตำแหน่ง)');
      });
      var msgEl = document.getElementById('sigModalMsg');
      if (missing.length) {
        msgEl.textContent = 'กรุณากรอกข้อมูลที่จำเป็น: ' + missing.join(', ');
        msgEl.style.display = 'block';
        return;
      }
      msgEl.style.display = 'none';
      // save to localStorage
      localStorage.setItem('sig_docno', docNo);
      localStorage.setItem('sig_docdate', docDate);
      var result = {docNumber: docNo, docDate: docDate};
      _sigFields.forEach(function(f) {
        var n = (document.getElementById('sig_'+f.key+'_name').value||'').trim();
        var p = (document.getElementById('sig_'+f.key+'_pos').value||'').trim();
        localStorage.setItem('sig_'+f.key+'_name', n);
        localStorage.setItem('sig_'+f.key+'_pos', p);
        result[f.key] = {name: n, pos: p};
      });
      document.getElementById('sigModal').style.display = 'none';
      if (_sigResolve) { _sigResolve(result); _sigResolve = null; }
    }
    function _sigReject() {
      document.getElementById('sigModal').style.display = 'none';
      if (_sigResolve) { _sigResolve(null); _sigResolve = null; }
    }
    function _sigClearAll() {
      localStorage.removeItem('sig_docno');
      localStorage.removeItem('sig_docdate');
      (_sigFields||[]).forEach(function(f) {
        localStorage.removeItem('sig_'+f.key+'_name');
        localStorage.removeItem('sig_'+f.key+'_pos');
      });
      document.getElementById('sigDocNumber').value = '';
      document.getElementById('sigDocDate').value = new Date().toISOString().slice(0,10);
      (_sigFields||[]).forEach(function(f) {
        var ne = document.getElementById('sig_'+f.key+'_name');
        var pe = document.getElementById('sig_'+f.key+'_pos');
        if(ne) ne.value='';
        if(pe) pe.value='';
      });
    }

    var _SIG_FIELDS_STD = [
      {key:'reporter', label:'\u0e1c\u0e39\u0e49\u0e23\u0e32\u0e22\u0e07\u0e32\u0e19/\u0e1c\u0e39\u0e49\u0e08\u0e31\u0e14\u0e17\u0e33'},
      {key:'chief', label:'\u0e2b\u0e31\u0e27\u0e2b\u0e19\u0e49\u0e32\u0e07\u0e32\u0e19\u0e1e\u0e31\u0e2a\u0e14\u0e38'},
      {key:'director', label:'\u0e1c\u0e39\u0e49\u0e2d\u0e33\u0e19\u0e27\u0e22\u0e01\u0e32\u0e23\u0e42\u0e23\u0e07\u0e40\u0e23\u0e35\u0e22\u0e19'}
    ];

    function _buildSigHtml(sigs) {
      function box(key, lbl) {
        var s = sigs[key] || {};
        return '<div style="text-align:center;width:28%;">'
          + '<div style="border-top:1px solid #000;margin-top:50px;padding-top:6px;">'
          + 'ลงชื่อ.......................................................................<br>'
          + '<span style="font-weight:700;">('+htmlEsc(s.name||'')+')</span><br>'
          + htmlEsc(s.pos||'')+' </div></div>';
      }
      return '<div style="display:flex;justify-content:space-around;margin-top:40pt;">'
        + box('reporter','ผู้รายงาน') + box('chief','หัวหน้างานพัสดุ') + box('director','ผู้อำนวยการ')
        + '</div>';
    }

    async function printReport() {
      if (!_lastPayload) { alert('ยังไม่มีข้อมูล'); return; }
      var sigs = await requireSigs(_SIG_FIELDS_STD, 'ข้อมูลเอกสาร — '+({trips:'การใช้งานรถ',drivers:'พนักงานขับรถ',fuel:'เชื้อเพลิง',repairs:'ซ่อมบำรุง'}[_lastPayload.tab]||_lastPayload.tab));
      if (!sigs) return;
      var t=_lastPayload.tab, p=_lastPayload.payload;
      var rl=getRangeLabel()||'ทั้งหมด';
      var tn={trips:'การใช้งานรถ',drivers:'พนักงานขับรถ',fuel:'เชื้อเพลิง',repairs:'ซ่อมบำรุง'}[t]||t;
      var tblHtml='';
      if (t==='trips')   tblHtml=buildPrintTrips(p);
      else if (t==='drivers') tblHtml=buildPrintDrivers(p);
      else if (t==='fuel')    tblHtml=buildPrintFuel(p);
      else if (t==='repairs') tblHtml=buildPrintRepairs(p);
      var isLandscape=(t==='trips'||t==='fuel');
      var w=window.open('','_blank');
      var h='<!DOCTYPE html><html><head><meta charset="utf-8"><title>รายงาน'+tn+'</title>';
      h+='<style>';
      h+='@import url("https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap");';
      h+='@page{size:A4'+(isLandscape?' landscape':'')+';margin:20mm;}';
      h+='body{font-family:"TH Sarabun New",Sarabun,"Angsana New",sans-serif;font-size:16pt;line-height:1.5;margin:0;color:#000;}';
      h+='.hdr{margin-bottom:14pt;}.hdr table{width:100%;border:none;border-collapse:collapse;font-size:16pt;}.hdr td{padding:1pt 0;border:none;vertical-align:top;}';
      h+='.hdr-rule{border:none;border-top:2px solid #000;margin:6pt 0;}';
      h+='table.data{width:100%;border-collapse:collapse;font-size:11pt;margin-bottom:10pt;}';
      h+='table.data th,table.data td{border:1px solid #333;padding:3pt 5pt;}';
      h+='table.data th{background:#f0f0f0;font-weight:700;text-align:center;}';
      h+='.sl{font-size:14pt;font-weight:700;margin:12pt 0 4pt;}';
      h+='</style></head><body>';
      // header
      h+='<div class="hdr"><table><tr>';
      h+='<td><b>ส่วนราชการ:</b> งานยานพาหนะ โรงเรียนพะเยาพิทยาคม</td>';
      h+='<td style="text-align:right;white-space:nowrap;"><b>เลขที่:</b> '+htmlEsc(sigs.docNumber)+'</td>';
      h+='</tr><tr>';
      h+='<td><b>เรื่อง:</b> รายงาน'+tn+' ช่วงเวลา '+htmlEsc(rl)+'</td>';
      h+='<td style="text-align:right;white-space:nowrap;"><b>วันที่:</b> '+fmtDateTH(sigs.docDate)+'</td>';
      h+='</tr></table><hr class="hdr-rule"></div>';
      h+=tblHtml;
      h+=_buildSigHtml(sigs);
      h+='</body></html>';
      w.document.write(h); w.document.close();
      setTimeout(function(){w.print();},500);
    }

    function buildPrintTrips(p) {
      var recs=p.records||[];
      if (!recs.length) return '<p>ไม่มีข้อมูล</p>';
      function fmtDT(s){
        if(!s) return 'ไม่มีการบันทึก';
        return formatDateTimeThai(s);
      }
      var h='<table class="data"><thead><tr>'
        +'<th>ที่</th><th>วันที่</th><th>สแกนออก</th><th>สแกนเข้า</th><th>ทะเบียน</th>'
        +'<th>ผู้ขอ</th><th>จุดหมาย</th><th>ภารกิจ</th><th>คนขับ</th>'
        +'<th>ก่อนออก</th><th>กลับมา</th>'
        +'<th>ไมล์ออก</th><th>ไมล์กลับ</th><th>ระยะ(กม.)</th>'
        +'<th>เลขที่คำสั่ง</th><th>ผู้อนุมัติ</th><th>หมายเหตุ</th>'
        +'</tr></thead><tbody>';
      recs.forEach(function(r,i) {
        var thd=formatDateThai(r.date);
        var effStart=r.mileage_start!=null?r.mileage_start:(r.prev_ret_mileage!=null?r.prev_ret_mileage:null);
        var effEnd=r.mileage_end!=null?r.mileage_end:(r.next_dep_mileage!=null?r.next_dep_mileage:null);
        var km=(effStart!=null&&effEnd!=null&&effEnd>effStart)?effEnd-effStart:'-';
        var isAutoGap=r.mission&&r.mission.indexOf('ไม่บันทึกข้อมูล')>=0;
        var remark='';
        if(isAutoGap) remark='มีการใช้รถโดยไม่บันทึกข้อมูล';
        else if(!r.actual_departure&&!r.actual_return) remark='ไม่บันทึกออกและกลับ';
        else if(!r.actual_departure) remark='ไม่บันทึกก่อนออกเดินทาง';
        else if(!r.actual_return) remark='ไม่บันทึกกลับมาจากเดินทาง';
        var remarkStyle=remark?'style="color:red;font-weight:bold"':'';
        var approver=r.signed_director||r.signed_vehicle_chief||'-';
        var orderNo=r.travel_order_number||'-';
        h+='<tr>'
          +'<td>'+(i+1)+'</td><td>'+thd+'</td>'
          +'<td>'+(r.time_start||'')+'</td><td>'+(r.time_end||'')+'</td>'
          +'<td>'+(r.license_plate||'-')+'</td>'
          +'<td>'+(r.requester_display_name||r.requested_by||'-')+'</td>'
          +'<td>'+(r.destination||'-')+'</td><td>'+(r.mission||'-')+'</td>'
          +'<td>'+(isAutoGap?'<span style="color:#666;font-style:italic">ไม่ทราบ</span>':htmlEsc(r.driver_name||'-'))+'</td>'
          +'<td>'+(isAutoGap?'':fmtDT(r.actual_departure))+'</td>'
          +'<td>'+(isAutoGap?'':fmtDT(r.actual_return))+'</td>'
          +'<td>'+(isAutoGap?'':(r.mileage_start!=null?r.mileage_start:''))+'</td>'
          +'<td>'+(isAutoGap?'':(r.mileage_end!=null?r.mileage_end:''))+'</td>'
          +'<td>'+km+'</td>'
          +'<td>'+htmlEsc(orderNo)+'</td>'
          +'<td>'+htmlEsc(approver)+'</td>'
          +'<td '+remarkStyle+'>'+remark+'</td>'
          +'</tr>';
      });
      return h+'</tbody></table>';
    }

    function buildPrintDrivers(p) {
      var drs=(p.drivers||[]).filter(function(d){return d.trip_count>0;});
      if (!drs.length) return '<p>ไม่มีข้อมูล</p>';
      var h='<table class="data"><thead><tr><th>ที่</th><th>ชื่อ</th><th>จำนวนเที่ยว</th><th>ระยะทาง(กม.)</th><th>ชม.ขับ</th><th>วันทำการ</th><th>วันหยุดสัปดาห์</th><th>บันทึกไม่ครบ</th></tr></thead><tbody>';
      drs.forEach(function(d,i) {
        h+='<tr><td>'+(i+1)+'</td><td>'+(d.driver_name||'-')+'</td><td>'+(d.trip_count||0)+'</td>'
          +'<td>'+Math.round(d.total_km||0)+'</td><td>'+Number(d.total_hours||0).toFixed(1)+'</td>'
          +'<td>'+(d.weekday_trips||0)+'</td><td>'+(d.weekend_trips||0)+'</td><td>'+(d.trips_incomplete||0)+'</td></tr>';
      });
      return h+'</tbody></table>';
    }

    function buildPrintFuel(p) {
      var bv=p.by_vehicle||[], recs=p.records||[];
      var h='';
      var expL={procurement:'ใบสั่งจ่ายน้ำมัน',official_travel:'งบไปราชการ'};
      if (bv.length) {
        h+='<p class="sl">สรุปรายคัน</p><table class="data"><thead><tr><th>ที่</th><th>ทะเบียน</th><th>ยี่ห้อ</th><th>ครั้ง</th><th>ลิตร</th><th>บาท</th><th>กม./ลิตร</th></tr></thead><tbody>';
        bv.forEach(function(v,i){h+='<tr><td>'+(i+1)+'</td><td>'+(v.license_plate||'-')+'</td><td>'+(v.brand||'-')+'</td><td>'+(v.count||0)+'</td><td>'+(v.total_liters||0)+'</td><td>'+Number(v.total_amount||0).toFixed(2)+'</td><td>'+Number(v.avg_consumption||0).toFixed(2)+'</td></tr>';});
        h+='</tbody></table>';
      }
      if (recs.length) {
        h+='<p class="sl">รายการทั้งหมด</p><table class="data"><thead><tr><th>ที่</th><th>เลขที่</th><th>วันที่</th><th>ทะเบียน</th><th>ผู้เบิก</th><th>ประเภท</th><th>ลิตร</th><th>ราคา/ลิตร</th><th>รวม(บาท)</th><th>ปั๊ม</th><th>กม./ลิตร</th></tr></thead><tbody>';
        recs.forEach(function(r,i){h+='<tr><td>'+(i+1)+'</td><td>'+(r.document_number||'-')+'</td><td>'+fmtDateTH(r.date)+'</td><td>'+(r.license_plate||'-')+'</td><td>'+(r.driver_name||r.driver_name_manual||'-')+'</td><td>'+(expL[r.expense_type]||r.expense_type||'-')+'</td><td>'+(r.liters||0)+'</td><td>'+(r.price_per_liter||0)+'</td><td>'+Number(r.amount||0).toFixed(2)+'</td><td>'+(r.gas_station_name||'-')+'</td><td>'+(r.fuel_consumption_rate?Number(r.fuel_consumption_rate).toFixed(2):'-')+'</td></tr>';});
        h+='</tbody></table>';
      }
      return h||'<p>ไม่มีข้อมูล</p>';
    }

    function buildPrintRepairs(p) {
      var bv=p.by_vehicle||[], recs=p.records||[];
      var h='';
      if (bv.length) {
        h+='<p class="sl">สรุปรายคัน</p><table class="data"><thead><tr><th>ที่</th><th>ทะเบียน</th><th>ยี่ห้อ/รุ่น</th><th>จำนวนซ่อม</th><th>ค่าซ่อมรวม(บาท)</th><th>เสร็จ</th><th>รอ</th></tr></thead><tbody>';
        bv.forEach(function(v,i){h+='<tr><td>'+(i+1)+'</td><td>'+(v.license_plate||'-')+'</td><td>'+(v.brand||'')+' '+(v.model||'')+'</td><td>'+(v.repair_count||0)+'</td><td>'+Number(v.total_cost||0).toFixed(2)+'</td><td>'+(v.completed||0)+'</td><td>'+(v.active||0)+'</td></tr>';});
        h+='</tbody></table>';
      }
      if (recs.length) {
        h+='<p class="sl">รายการซ่อม</p><table class="data"><thead><tr><th>ที่</th><th>วันที่แจ้ง</th><th>ทะเบียน</th><th>ปัญหา</th><th>อู่/ผู้ซ่อม</th><th>ค่าใช้จ่าย(บาท)</th><th>สถานะ</th></tr></thead><tbody>';
        recs.forEach(function(r,i){h+='<tr><td>'+(i+1)+'</td><td>'+fmtDateTH(r.date_reported)+'</td><td>'+(r.license_plate||'-')+'</td><td>'+(r.problem_type||r.issue_description||r.description||'-')+'</td><td>'+(r.garage||'-')+'</td><td>'+Number(r.cost||0).toFixed(2)+'</td><td>'+(r.status||'-')+'</td></tr>';});
        h+='</tbody></table>';
      }
      return h||'<p>ไม่มีข้อมูล</p>';
    }
  </script>

  <div style="background:var(--color-bg-light);padding:16px 20px;text-align:center;color:var(--color-text-muted);font-size:.85em;margin-top:20px">
    <p>ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
  </div>

          <input type="text" id="sigDocNumber" placeholder="เช่น พย.0025/2569" style="width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:1em;font-family:inherit;box-sizing:border-box;">
        </div>
        <div style="flex:1;">
          <label style="display:block;font-weight:700;font-size:.88em;margin-bottom:4px;">วันที่เอกสาร <span style="color:#c62828;">*</span></label>
          <input type="date" id="sigDocDate" style="width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:1em;font-family:inherit;box-sizing:border-box;">
        </div>
      </div>
      <div id="sigModalFields"></div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button onclick="_sigReject()" style="flex:1;padding:10px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;font-size:1em;font-family:inherit;">ยกเลิก</button>
        <button onclick="_sigClearAll()" style="flex:1;padding:10px;border:1px solid #e57373;border-radius:8px;background:#fff;color:#c62828;cursor:pointer;font-size:1em;font-family:inherit;">ล้างค่า</button>
        <button onclick="_sigConfirm()" style="flex:2;padding:10px;border:none;border-radius:8px;background:var(--color-primary);color:#fff;cursor:pointer;font-size:1em;font-family:inherit;font-weight:700;">✅ ยืนยันและพิมพ์</button>
      </div>
    </div>
  </div>
