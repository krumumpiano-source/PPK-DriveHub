<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงานประเมินผล - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>
    window.API_BASE_URL = CONFIG.API_BASE_URL;
    window.currentPage = 'reports';
    window.REQUIRE_AUTH = true;
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { }

    .container { }

    .stat-card {
      background: var(--gradient-primary);
      color: white;
      padding: 25px;
      border-radius: var(--radius-xl);
      text-align: center;
    }

    .stat-card h3 {
      font-size: 1.1em;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .stat-card .value {
      font-size: 2.5em;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .stat-card .unit {
      font-size: 0.9em;
      opacity: 0.8;
    }

    .report-section {
      background: var(--color-bg-light);
      border-radius: var(--radius-xl);
      padding: 25px;
      margin-bottom: 25px;
    }

    .report-section-title {
      font-size: 1.5em;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 3px solid var(--color-primary);
    }

    .report-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .report-table thead {
      background: var(--gradient-primary);
      color: white;
    }

    .report-table th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
    }

    .report-table td {
      padding: 15px;
      border-bottom: 1px solid #e9ecef;
    }

    .report-table tbody tr:hover {
      background: var(--color-bg-light);
    }

    .score-badge {
      padding: 6px 12px;
      border-radius: var(--radius-2xl);
      font-size: 0.9em;
      font-weight: 600;
    }

    .score-excellent {
      background: #d4edda;
      color: #155724;
    }

    .score-good {
      background: #cfe2ff;
      color: #084298;
    }

    .score-normal {
      background: #fff3cd;
      color: #856404;
    }

    .score-poor {
      background: #f8d7da;
      color: #721c24;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-light);
    }

    .empty-state-icon {
      font-size: 4em;
      margin-bottom: 20px;
    }

    .kpi-note {
      background: #e7f3ff;
      border-left: 4px solid var(--color-primary);
      padding: 15px;
      border-radius: var(--radius-md);
      margin-top: 20px;
      font-size: 0.95em;
      color: var(--color-text);
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .report-table {
        font-size: 0.9em;
      }

      .report-table th,
      .report-table td {
        padding: 10px;
      }

      .tabs {
        gap: 6px;
      }

      .tab {
        padding: 10px 16px;
        font-size: 0.9em;
        flex: 1 1 calc(50% - 3px);
        min-width: calc(50% - 3px);
      }
    }

    @media (max-width: 480px) {
      .tab {
        flex: 1 1 100%;
        min-width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>📊 รายงานประเมินผล</h1>
      <p>ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>

    <div id="navigation"></div>

    <div class="content">
      <div id="alertContainer"></div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('overview', this)">📈 ภาพรวม</button>
        <button class="tab" onclick="switchTab('vehicles', this)">🚗 การใช้งานรถ</button>
        <button class="tab" onclick="switchTab('drivers', this)">👤 คนขับ</button>
        <button class="tab" onclick="switchTab('fuel', this)">⛽ เชื้อเพลิง</button>
        <button class="tab" onclick="switchTab('repairs', this)">🔧 ซ่อมบำรุง</button>
        <button class="tab" onclick="switchTab('quality', this)">📊 คุณภาพข้อมูล</button>
        <button class="tab" onclick="switchTab('scores', this)">⭐ คะแนนคนขับ</button>
        <button class="tab" onclick="switchTab('alerts', this)">⚠️ แจ้งเตือน</button>
      </div>

      <div class="filters">
        <div class="filter-group" id="fg-date-from">
          <label>วันที่เริ่มต้น</label>
          <input type="date" id="dateFrom" onchange="loadReport()">
        </div>
        <div class="filter-group" id="fg-date-to">
          <label>วันที่สิ้นสุด</label>
          <input type="date" id="dateTo" onchange="loadReport()">
        </div>
        <div class="filter-group" id="fg-car" style="display:none">
          <label>รถ</label>
          <select id="filterCar" onchange="loadReport()">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
        <div class="filter-group" id="fg-driver" style="display:none">
          <label>ผู้เบิก/คนขับ</label>
          <select id="filterDriver" onchange="loadReport()">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
        <div class="filter-group" id="fg-expense" style="display:none">
          <label>ประเภทเบิก</label>
          <select id="filterExpense" onchange="loadReport()">
            <option value="">ทั้งหมด</option>
            <option value="procurement">ใบสั่งจ่ายน้ำมัน</option>
            <option value="official_travel">งบไปราชการ</option>
          </select>
        </div>
        <div class="filter-group" id="fg-month" style="display:none">
          <label>เดือน</label>
          <input type="month" id="filterMonth" onchange="loadReport()">
        </div>
      </div>

      <div class="actions-bar">
        <button class="btn btn-secondary" onclick="loadReport()">
          🔃 รีเฟรช
        </button>
        <button class="btn btn-primary" onclick="exportReport()">
          💾 ส่งออกรายงาน
        </button>
        <button class="btn btn-secondary" id="btnPrint" onclick="printFuelReport()" style="display:none">
          🖨️ พิมพ์รายงาน
        </button>
      </div>

      <div id="loading" class="loading">กำลังโหลดข้อมูล...</div>
      <div id="reportContent" style="display: none;">
        <!-- Content will be populated dynamically -->
      </div>
    </div>
  </div>
  <script>
    var currentTab = 'overview';

    document.addEventListener('DOMContentLoaded', function () {
      requireAuth();

      var today = new Date();
      var lastMonth = new Date(today);
      lastMonth.setMonth(lastMonth.getMonth() - 1);
      document.getElementById('dateFrom').value = fmtDate(lastMonth);
      document.getElementById('dateTo').value = fmtDate(today);
      document.getElementById('filterMonth').value = today.getFullYear() + '-' + pad(today.getMonth() + 1);

      updateFilterVisibility();
      loadCarFilter();
      loadDriverFilter();
      loadReport();
    });

    function fmtDate(d) {
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }
    function pad(n) { return String(n).padStart(2, '0'); }
    function fmtNum(n) { return Number(n || 0).toLocaleString('th-TH'); }
    function fmtMoney(n) { return Number(n || 0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function fmtDateTH(s) {
      if (!s) return '-';
      var d = new Date(s);
      if (isNaN(d)) return String(s);
      return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
    }
    function daysUntil(dateStr) {
      return Math.ceil((new Date(dateStr) - Date.now()) / 86400000);
    }
    function htmlEsc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function buildQuery(params) {
      var parts = [];
      Object.keys(params).forEach(function (k) {
        if (params[k] !== undefined && params[k] !== null && params[k] !== '') {
          parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(params[k]));
        }
      });
      return parts.length ? '?' + parts.join('&') : '';
    }
    function emptyState(icon, msg) {
      return '<div class="empty-state"><div class="empty-state-icon">' + icon + '</div><p>' + htmlEsc(msg) + '</p></div>';
    }
    function statCard(title, value, unit, sub) {
      return '<div class="stat-card"><h3>' + title + '</h3><div class="value">' + value + '</div><div class="unit">' + unit + '</div>' +
        (sub ? '<div style="font-size:0.8em;opacity:0.8;margin-top:6px">' + sub + '</div>' : '') + '</div>';
    }
    function statusBadge(status) {
      var map = {
        'active': ['score-excellent', 'ใช้งาน'],
        'inactive': ['score-poor', 'ไม่ใช้งาน'],
        'maintenance': ['score-normal', 'ซ่อมบำรุง'],
        'completed': ['score-excellent', 'เสร็จแล้ว'],
        'in_progress': ['score-good', 'กำลังซ่อม'],
        'reported': ['score-normal', 'แจ้งซ่อม'],
        'cancelled': ['score-poor', 'ยกเลิก'],
        'scheduled': ['score-good', 'นัดหมาย'],
        'ongoing': ['score-good', 'กำลังไป'],
        'leave': ['score-normal', 'ลา']
      };
      var s = map[status] || ['score-normal', status || '-'];
      return '<span class="score-badge ' + s[0] + '">' + s[1] + '</span>';
    }

    function updateFilterVisibility() {
      var showDate = ['fuel', 'repairs', 'quality'].includes(currentTab);
      var showCar = currentTab === 'fuel';
      var showDriver = currentTab === 'fuel';
      var showExpense = currentTab === 'fuel';
      var showMonth = currentTab === 'scores';
      document.getElementById('fg-date-from').style.display = showDate ? '' : 'none';
      document.getElementById('fg-date-to').style.display = showDate ? '' : 'none';
      document.getElementById('fg-car').style.display = showCar ? '' : 'none';
      document.getElementById('fg-driver').style.display = showDriver ? '' : 'none';
      document.getElementById('fg-expense').style.display = showExpense ? '' : 'none';
      document.getElementById('fg-month').style.display = showMonth ? '' : 'none';
      document.getElementById('btnPrint').style.display = (currentTab === 'fuel') ? '' : 'none';
    }

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
      el.classList.add('active');
      updateFilterVisibility();
      loadReport();
    }

    async function loadCarFilter() {
      try {
        var r = await apiCall('getVehicles', {});
        var list = (r && r.data) ? (r.data.vehicles || r.data) : [];
        var sel = document.getElementById('filterCar');
        list.forEach(function (v) {
          var o = document.createElement('option');
          o.value = v.id || v.car_id || '';
          o.textContent = (v.license_plate || '') + (v.brand ? ' - ' + v.brand : '') + (v.model ? ' ' + v.model : '');
          sel.appendChild(o);
        });
      } catch (e) { /* ignore */ }
    }

    async function loadDriverFilter() {
      try {
        var r = await apiCall('getDrivers', {});
        var list = (r && r.data) ? (r.data.drivers || r.data) : [];
        var sel = document.getElementById('filterDriver');
        list.forEach(function (d) {
          var o = document.createElement('option');
          o.value = d.id || d.driver_id || '';
          o.textContent = d.name || '';
          sel.appendChild(o);
        });
      } catch (e) { /* ignore */ }
    }

    async function loadReport() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('reportContent').style.display = 'none';
      document.getElementById('reportContent').innerHTML = '';

      var dateFrom = document.getElementById('dateFrom').value;
      var dateTo = document.getElementById('dateTo').value;
      var carId = document.getElementById('filterCar').value;
      var driverId = document.getElementById('filterDriver').value;
      var expenseType = document.getElementById('filterExpense').value;

      try {
        var html = '';
        switch (currentTab) {
          case 'overview': html = await renderOverview(); break;
          case 'vehicles': html = await renderVehicles(); break;
          case 'drivers':  html = await renderDrivers();  break;
          case 'fuel':     html = await renderFuel(dateFrom, dateTo, carId, driverId, expenseType); break;
          case 'repairs':  html = await renderRepairs(dateFrom, dateTo); break;
          case 'quality':  html = await renderQuality(dateFrom, dateTo); break;
          case 'scores':   html = await renderScores(); break;
          case 'alerts':   html = await renderAlerts(); break;
          default:         html = await renderOverview();
        }
        document.getElementById('reportContent').innerHTML = html;
        document.getElementById('reportContent').style.display = 'block';
      } catch (e) {
        console.error(e);
        document.getElementById('reportContent').innerHTML = emptyState('⚠️', 'โหลดข้อมูลไม่สำเร็จ: ' + (e.message || ''));
        document.getElementById('reportContent').style.display = 'block';
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    async function renderOverview() {
      var r = await apiCall('getDashboard', {});
      var d = (r && r.data) ? r.data : (r || {});
      var v = d.vehicles || {};
      var dr = d.drivers || {};
      var qt = d.queue_today || {};
      var fm = d.fuel_month || {};
      var ra = d.repairs_active || {};
      var alerts = d.alerts_unresolved || 0;

      var html = '<div class="stats-grid">';
      html += statCard('🚗 รถทั้งหมด', fmtNum(v.total || 0), 'คัน',
        'ใช้งาน ' + (v.active || 0) + ' | ซ่อมบำรุง ' + (v.in_maintenance || 0) + ' | ไม่ใช้งาน ' + (v.inactive || 0));
      html += statCard('👤 คนขับทั้งหมด', fmtNum(dr.total || 0), 'คน',
        'ปกติ ' + (dr.active || 0) + ' | แจ้งเหนื่อย ' + (dr.fatigued || 0));
      html += statCard('📅 คิววันนี้', fmtNum(qt.total || 0), 'รายการ',
        'รอ ' + (qt.scheduled || 0) + ' | กำลังไป ' + (qt.ongoing || 0) + ' | เสร็จ ' + (qt.completed || 0));
      html += statCard('⛽ น้ำมันเดือนนี้', fmtNum(fm.total_liters || 0), 'ลิตร',
        'ค่าใช้จ่าย ' + fmtMoney(fm.total_amount || 0) + ' บาท (' + fmtNum(fm.count || 0) + ' ครั้ง)');
      html += statCard('🔧 ซ่อมบำรุงค้างอยู่', fmtNum(ra.total || 0), 'รายการ',
        'แจ้งซ่อม ' + (ra.reported || 0) + ' | กำลังซ่อม ' + (ra.in_progress || 0));
      html += statCard('⚠️ แจ้งเตือนที่ยังไม่แก้ไข', fmtNum(alerts), 'รายการ', 'จากการตรวจสภาพรถประจำวัน');
      html += '</div>';
      if (d.generated_at) {
        html += '<div class="kpi-note">อัปเดตล่าสุด: ' + fmtDateTH(d.generated_at) + '</div>';
      }
      return html;
    }

    async function renderVehicles() {
      var r = await API.get('/api/reports/vehicles');
      var rows = (r && r.data) ? r.data : (r || []);
      if (!Array.isArray(rows) || rows.length === 0) {
        return emptyState('🚗', 'ไม่พบข้อมูลรถ');
      }
      var html = '<div class="report-section">';
      html += '<div class="report-section-title">🚗 สรุปการใช้งานรถรายคัน</div>';
      html += '<div style="overflow-x:auto"><table class="report-table">';
      html += '<thead><tr><th>ทะเบียน</th><th>ยี่ห้อ/รุ่น</th><th>เลขไมล์ปัจจุบัน</th><th>จำนวนเที่ยว</th><th>น้ำมันรวม (ลิตร)</th><th>ค่าน้ำมันรวม (บาท)</th><th>จำนวนซ่อม</th><th>ค่าซ่อมรวม (บาท)</th><th>สถานะ</th></tr></thead><tbody>';
      rows.forEach(function (v) {
        html += '<tr>';
        html += '<td><strong>' + htmlEsc(v.license_plate || '-') + '</strong></td>';
        html += '<td>' + htmlEsc((v.brand || '') + ' ' + (v.model || '') + (v.year ? ' (' + v.year + ')' : '')) + '</td>';
        html += '<td>' + fmtNum(v.current_mileage || 0) + ' กม.</td>';
        html += '<td>' + fmtNum(v.trip_count || 0) + '</td>';
        html += '<td>' + fmtNum(v.total_fuel_liters || 0) + '</td>';
        html += '<td>' + fmtMoney(v.total_fuel_cost || 0) + '</td>';
        html += '<td>' + fmtNum(v.repair_count || 0) + '</td>';
        html += '<td>' + fmtMoney(v.total_repair_cost || 0) + '</td>';
        html += '<td>' + statusBadge(v.status) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div></div>';
      return html;
    }

    async function renderDrivers() {
      var r = await API.get('/api/reports/drivers');
      var rows = (r && r.data) ? r.data : (r || []);
      if (!Array.isArray(rows) || rows.length === 0) {
        return emptyState('👤', 'ไม่พบข้อมูลคนขับ');
      }
      var html = '<div class="report-section">';
      html += '<div class="report-section-title">👤 สรุปการทำงานคนขับ</div>';
      html += '<div style="overflow-x:auto"><table class="report-table">';
      html += '<thead><tr><th>ชื่อ</th><th>เลขใบขับขี่</th><th>วันหมดอายุ</th><th>จำนวนเที่ยว</th><th>แจ้งเหนื่อย</th><th>Discipline Score</th><th>สถานะ</th></tr></thead><tbody>';
      rows.forEach(function (d) {
        var licExpiry = d.license_expiry || '';
        var daysLeft = licExpiry ? daysUntil(licExpiry) : 999;
        var expiryClass = daysLeft < 0 ? 'score-poor' : (daysLeft < 30 ? 'score-normal' : '');
        var score = (d.discipline_score !== undefined && d.discipline_score !== null) ? d.discipline_score : null;
        var scoreClass = score !== null ? (score >= 80 ? 'score-excellent' : score >= 60 ? 'score-good' : score >= 40 ? 'score-normal' : 'score-poor') : '';
        html += '<tr>';
        html += '<td><strong>' + htmlEsc(d.name || '-') + '</strong></td>';
        html += '<td>' + htmlEsc(d.license_number || '-') + '</td>';
        html += '<td>' + (licExpiry ? '<span class="score-badge ' + expiryClass + '">' + fmtDateTH(licExpiry) + '</span>' : '-') + '</td>';
        html += '<td>' + fmtNum(d.trip_count || 0) + '</td>';
        html += '<td>' + fmtNum(d.fatigue_reports || 0) + '</td>';
        html += '<td>' + (score !== null ? '<span class="score-badge ' + scoreClass + '">' + score + '</span>' : '-') + '</td>';
        html += '<td>' + statusBadge(d.status) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      html += '<div class="kpi-note">⭐ Discipline Score: 80+ ดีมาก | 60–79 ดี | 40–59 ปกติ | ต่ำกว่า 40 ควรพัฒนา — ใช้เพื่อการพัฒนา ไม่ใช่การลงโทษ</div>';
      html += '</div>';
      return html;
    }

    var _lastFuelPayload = null;
    var _expenseLabels = { procurement: '\u0e43\u0e1a\u0e2a\u0e31\u0e48\u0e07\u0e08\u0e48\u0e32\u0e22\u0e19\u0e49\u0e33\u0e21\u0e31\u0e19', official_travel: '\u0e07\u0e1a\u0e44\u0e1b\u0e23\u0e32\u0e0a\u0e01\u0e32\u0e23' };
    var _purposeLabels = { school_passenger: '\u0e20\u0e32\u0e23\u0e01\u0e34\u0e08\u0e42\u0e14\u0e22\u0e2a\u0e32\u0e23\u0e02\u0e2d\u0e07\u0e42\u0e23\u0e07\u0e40\u0e23\u0e35\u0e22\u0e19', official_document: '\u0e23\u0e31\u0e1a\u0e2a\u0e48\u0e07\u0e40\u0e2d\u0e01\u0e2a\u0e32\u0e23\u0e17\u0e32\u0e07\u0e23\u0e32\u0e0a\u0e01\u0e32\u0e23', other: '\u0e2d\u0e37\u0e48\u0e19\u0e46' };

    async function renderFuel(dateFrom, dateTo, carId, driverId, expenseType) {
      var params = buildQuery({ date_from: dateFrom, date_to: dateTo, car_id: carId || undefined, driver_id: driverId || undefined, expense_type: expenseType || undefined });
      var r = await API.get('/api/reports/fuel' + params);
      var payload = (r && r.data) ? r.data : (r || {});
      var records = payload.records || [];
      var summary = payload.summary || {};
      var bySource = payload.by_source || [];
      var byVehicle = payload.by_vehicle || [];
      var byDriver = payload.by_driver || [];
      _lastFuelPayload = payload;

      // Stat cards
      var html = '<div class="stats-grid">';
      html += statCard('\u{1f4cb} \u0e08\u0e33\u0e19\u0e27\u0e19\u0e04\u0e23\u0e31\u0e49\u0e07', fmtNum(summary.count || 0), '\u0e04\u0e23\u0e31\u0e49\u0e07', '');

      var a = document.createElement('a');

      var dateTo = document.getElementById('dateTo').value || 'all';
      a.href = url;
      a.download = '\u0e23\u0e32\u0e22\u0e07\u0e32\u0e19\u0e19\u0e49\u0e33\u0e21\u0e31\u0e19_' + dateFrom + '_' + dateTo + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function printFuelReport() {
      if (!_lastFuelPayload) return;
      var records = _lastFuelPayload.records || [];
      var summary = _lastFuelPayload.summary || {};

      var dateFrom = document.getElementById('dateFrom').value || '-';
      var dateTo = document.getElementById('dateTo').value || '-';
      var budgetYear = dateFrom ? (parseInt(dateFrom.substr(0, 4)) + 543) : (new Date().getFullYear() + 543);

      var w = window.open('', '_blank');
      var h = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>\u0e23\u0e32\u0e22\u0e07\u0e32\u0e19\u0e19\u0e49\u0e33\u0e21\u0e31\u0e19</title>';

      h += '<div class="header"><h2>\u0e42\u0e23\u0e07\u0e40\u0e23\u0e35\u0e22\u0e19\u0e1e\u0e30\u0e40\u0e22\u0e32\u0e1e\u0e34\u0e17\u0e22\u0e04\u0e21</h2>';
      h += '<p>\u0e23\u0e32\u0e22\u0e07\u0e32\u0e19\u0e01\u0e32\u0e23\u0e43\u0e0a\u0e49\u0e19\u0e49\u0e33\u0e21\u0e31\u0e19\u0e40\u0e0a\u0e37\u0e49\u0e2d\u0e40\u0e1e\u0e25\u0e34\u0e07 \u0e1b\u0e35\u0e07\u0e1a\u0e1b\u0e23\u0e30\u0e21\u0e32\u0e13 ' + budgetYear + '</p>';
      h += '<p>\u0e0a\u0e48\u0e27\u0e07\u0e27\u0e31\u0e19\u0e17\u0e35\u0e48 ' + dateFrom + ' \u0e16\u0e36\u0e07 ' + dateTo + '</p></div>';

      h += '<table><thead><tr><th>\u0e25\u0e33\u0e14\u0e31\u0e1a</th><th>\u0e40\u0e25\u0e02\u0e17\u0e35\u0e48</th><th>\u0e27\u0e31\u0e19\u0e17\u0e35\u0e48</th><th>\u0e17\u0e30\u0e40\u0e1a\u0e35\u0e22\u0e19\u0e23\u0e16</th><th>\u0e1c\u0e39\u0e49\u0e40\u0e1a\u0e34\u0e01</th><th>\u0e1b\u0e23\u0e30\u0e40\u0e20\u0e17\u0e40\u0e1a\u0e34\u0e01</th><th>\u0e27\u0e31\u0e15\u0e16\u0e38\u0e1b\u0e23\u0e30\u0e2a\u0e07\u0e04\u0e4c</th><th>\u0e1b\u0e23\u0e30\u0e40\u0e20\u0e17\u0e19\u0e49\u0e33\u0e21\u0e31\u0e19</th><th>\u0e25\u0e34\u0e15\u0e23</th><th>\u0e23\u0e32\u0e04\u0e32/\u0e25.</th><th>\u0e23\u0e27\u0e21(\u0e1a\u0e32\u0e17)</th><th>\u0e2d\u0e31\u0e15\u0e23\u0e32\u0e2a\u0e34\u0e49\u0e19\u0e40\u0e1b\u0e25\u0e37\u0e2d\u0e07</th></tr></thead><tbody>';
      records.forEach(function (r, i) {
        var driverDisplay = r.driver_name || r.driver_name_manual || '-';
        var purposeDisplay = _purposeLabels[r.purpose] || r.purpose || '-';
        if (r.purpose === 'other' && r.purpose_detail) purposeDisplay += ': ' + r.purpose_detail;
        var rate = r.fuel_consumption_rate ? Number(r.fuel_consumption_rate).toFixed(2) : '-';
        h += '<tr>';
        h += '<td>' + (i + 1) + '</td>';
        h += '<td>' + (r.document_number || '-') + '</td>';
        h += '<td>' + (r.date || '-') + '</td>';
        h += '<td>' + (r.license_plate || r.car_id || '-') + '</td>';
        h += '<td class="text-left">' + driverDisplay + '</td>';
        h += '<td>' + (_expenseLabels[r.expense_type] || '-') + '</td>';
        h += '<td class="text-left">' + purposeDisplay + '</td>';
        h += '<td>' + (r.fuel_type || '-') + '</td>';
        h += '<td class="text-right">' + (r.liters || 0) + '</td>';
        h += '<td class="text-right">' + (r.price_per_liter || 0) + '</td>';
        h += '<td class="text-right">' + Number(r.amount || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 }) + '</td>';
        h += '<td' + (r.anomaly_flag ? ' class="anomaly"' : '') + '>' + rate + '</td>';
        h += '</tr>';
      });
      h += '</tbody></table>';

      // Summary by expense type
      h += '<div class="summary"><strong>\u0e2a\u0e23\u0e38\u0e1b\u0e22\u0e2d\u0e14\u0e23\u0e27\u0e21:</strong> ' + (summary.count || 0) + ' \u0e04\u0e23\u0e31\u0e49\u0e07 | ' + Number(summary.total_liters || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 }) + ' \u0e25\u0e34\u0e15\u0e23 | ' + Number(summary.total_amount || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 }) + ' \u0e1a\u0e32\u0e17';
      if (bySource.length > 0) {
        h += '<br>';
        bySource.forEach(function (s) {
          h += '&bull; ' + (_expenseLabels[s.expense_type] || s.expense_type) + ': ' + (s.count || 0) + ' \u0e04\u0e23\u0e31\u0e49\u0e07 / ' + Number(s.total_liters || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 }) + ' \u0e25\u0e34\u0e15\u0e23 / ' + Number(s.total_amount || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 }) + ' \u0e1a\u0e32\u0e17<br>';
        });
      }
      if (summary.anomaly_count > 0) {
        h += '<br><span class="anomaly">\u26a0\ufe0f \u0e23\u0e32\u0e22\u0e01\u0e32\u0e23\u0e1c\u0e34\u0e14\u0e1b\u0e01\u0e15\u0e34: ' + summary.anomaly_count + ' \u0e23\u0e32\u0e22\u0e01\u0e32\u0e23</span>';
      }
      h += '</div>';

      // Signatures
      h += '<div class="signatures">';
      h += '<div class="sig-box"><div class="sig-line">\u0e25\u0e07\u0e0a\u0e37\u0e48\u0e2d............................................<br>\u0e1c\u0e39\u0e49\u0e23\u0e32\u0e22\u0e07\u0e32\u0e19</div></div>';
      h += '<div class="sig-box"><div class="sig-line">\u0e25\u0e07\u0e0a\u0e37\u0e48\u0e2d............................................<br>\u0e2b\u0e31\u0e27\u0e2b\u0e19\u0e49\u0e32\u0e07\u0e32\u0e19\u0e1e\u0e31\u0e2a\u0e14\u0e38</div></div>';
      h += '<div class="sig-box"><div class="sig-line">\u0e25\u0e07\u0e0a\u0e37\u0e48\u0e2d............................................<br>\u0e1c\u0e39\u0e49\u0e2d\u0e33\u0e19\u0e27\u0e22\u0e01\u0e32\u0e23\u0e42\u0e23\u0e07\u0e40\u0e23\u0e35\u0e22\u0e19</div></div>';
      h += '</div>';

      h += '</body></html>';
      w.document.write(h);
      w.document.close();
      setTimeout(function () { w.print(); }, 500);
    }

    async function renderQuality(dateFrom, dateTo) {
      var params = buildQuery({ date_from: dateFrom || undefined, date_to: dateTo || undefined });
      var r = await API.get('/api/reports/data-quality' + params);
      var payload = (r && r.data) ? r.data : (r || {});
      var ov = payload.overview || {};
      var vehicleGaps = payload.vehicle_gaps || [];
      var driverStats = payload.driver_stats || [];
      var est = payload.estimation || {};

      var html = '<div class="stats-grid">';
      html += statCard('📝 ทั้งหมด', fmtNum(ov.total_records || 0), 'รายการ', '');
      html += statCard('✅ ปกติ', fmtNum(ov.normal || 0), 'รายการ', '');
      html += statCard('🤖 สร้างอัตโนมัติ', fmtNum((ov.auto_departure || 0) + (ov.auto_return || 0)), 'รายการ', 'ออก ' + fmtNum(ov.auto_departure || 0) + ' | กลับ ' + fmtNum(ov.auto_return || 0));
      html += statCard('⚫ ช่องว่างข้อมูล', fmtNum(ov.gap_record || 0), 'รายการ', '');
      html += statCard('⚠️ อื่นๆ', fmtNum((ov.late_return || 0) + (ov.departure_only || 0) + (ov.auto_unresolved || 0)), 'รายการ', 'ล่าช้า ' + fmtNum(ov.late_return || 0) + ' | ออกอย่างเดียว ' + fmtNum(ov.departure_only || 0));
      html += statCard('📚 ย้อนหลัง', fmtNum(ov.historical || 0), 'รายการ', 'นำเข้าจาก Google Forms');
      html += '</div>';

      // Vehicle gap table
      if (vehicleGaps.length > 0) {
        html += '<div class="report-section">';
        html += '<div class="report-section-title">⚫ ช่องว่างข้อมูลรายคัน</div>';
        html += '<div style="overflow-x:auto"><table class="report-table">';
        html += '<thead><tr><th>ทะเบียนรถ</th><th>ยี่ห้อ</th><th>จำนวนช่องว่าง</th><th>รายละเอียด</th></tr></thead><tbody>';
        vehicleGaps.forEach(function (v) {
          html += '<tr>';
          html += '<td><strong>' + htmlEsc(v.license_plate || '-') + '</strong></td>';
          html += '<td>' + htmlEsc(v.brand || '-') + '</td>';
          html += '<td>' + fmtNum(v.gap_count || 0) + '</td>';
          html += '<td style="max-width:400px;word-wrap:break-word;font-size:0.85em">' + htmlEsc(v.gap_details || '-') + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table></div></div>';
      }

      // Driver issue stats
      if (driverStats.length > 0) {
        html += '<div class="report-section">';
        html += '<div class="report-section-title">👤 สรุปปัญหาคุณภาพรายคนขับ</div>';
        html += '<div style="overflow-x:auto"><table class="report-table">';
        html += '<thead><tr><th>คนขับ</th><th>ขาดบันทึกออก</th><th>ขาดบันทึกกลับ</th><th>กลับล่าช้า</th><th>ช่องว่าง</th><th>รวมปัญหา</th></tr></thead><tbody>';
        driverStats.forEach(function (d) {
          html += '<tr>';
          html += '<td><strong>' + htmlEsc(d.driver_name || 'ไม่ระบุ') + '</strong></td>';
          html += '<td>' + fmtNum(d.missed_departures || 0) + '</td>';
          html += '<td>' + fmtNum(d.missed_returns || 0) + '</td>';
          html += '<td>' + fmtNum(d.late_returns || 0) + '</td>';
          html += '<td>' + fmtNum(d.gaps || 0) + '</td>';
          html += '<td>' + fmtNum(d.total_issues || 0) + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table></div></div>';
      }

      if (est.fuel_consumption_rate) {
        html += '<div class="kpi-note">💡 อัตราสิ้นเปลืองเฉลี่ยตั้งต้น: ' + est.fuel_consumption_rate + ' กม./ลิตร | ราคาน้ำมันเฉลี่ย: ' + fmtMoney(est.avg_fuel_price || 0) + ' บาท/ลิตร</div>';
      }

      return html;
    }

    async function renderScores() {
      var month = document.getElementById('filterMonth').value;
      if (!month) {
        var d = new Date();
        month = d.getFullYear() + '-' + pad(d.getMonth() + 1);
        document.getElementById('filterMonth').value = month;
      }
      var r = await API.get('/api/reports/driver-scores?month=' + encodeURIComponent(month));
      var scores = (r && r.data) ? r.data : (r || []);

      if (!Array.isArray(scores) || scores.length === 0) {
        return emptyState('⭐', 'ไม่พบข้อมูลคะแนน');
      }

      var html = '<div class="report-section">';
      html += '<div class="report-section-title">⭐ คะแนนความรับผิดชอบคนขับ ประจำเดือน ' + month + '</div>';
      html += '<div style="overflow-x:auto"><table class="report-table">';
      html += '<thead><tr><th>ชื่อ</th><th>คะแนน</th><th>บันทึกการใช้งาน</th><th>ตรวจสภาพรถ</th><th>บันทึกน้ำมัน</th><th>แจ้งซ่อม</th><th>สถานะ</th></tr></thead><tbody>';
      scores.forEach(function (s) {
        var scoreClass = s.score >= 80 ? 'score-excellent' : s.score >= 60 ? 'score-good' : s.score >= 40 ? 'score-normal' : 'score-poor';
        var dims = {};
        (s.dimensions || []).forEach(function (dim) { dims[dim.name] = dim; });

        function dimCell(name) {
          var d = dims[name];
          if (!d) return '<td>-</td>';
          var pct = d.expected > 0 ? Math.round(d.completed / d.expected * 100) : 100;
          var cls = pct >= 80 ? 'score-excellent' : pct >= 60 ? 'score-good' : pct >= 40 ? 'score-normal' : 'score-poor';
          return '<td><span class="score-badge ' + cls + '">' + d.completed + '/' + d.expected + ' (' + pct + '%)</span></td>';
        }

        html += '<tr>';
        html += '<td><strong>' + htmlEsc(s.driver_name || '-') + '</strong></td>';
        html += '<td><span class="score-badge ' + scoreClass + '" style="font-size:1.1em;font-weight:700">' + s.score + '</span></td>';
        html += dimCell('usage');
        html += dimCell('daily_check');
        html += dimCell('fuel');
        html += dimCell('repair');
        html += '<td>' + statusBadge(s.driver_status) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      html += '<div class="kpi-note">⭐ คะแนน = จำนวนที่ทำได้ / จำนวนที่คาดหวัง × 100 | 80+ ดีมาก | 60–79 ดี | 40–59 ปกติ | ต่ำกว่า 40 ควรพัฒนา — ใช้เพื่อการพัฒนา ไม่ใช่การลงโทษ</div>';
      html += '</div>';
      return html;
    }
  </script>
