<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงานประเมินผล - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>
    window.API_BASE_URL = CONFIG.API_BASE_URL;
    window.currentPage = 'reports';
    window.REQUIRE_AUTH = true;
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { }

    .container { }

    .stat-card {
      background: var(--gradient-primary);
      color: white;
      padding: 25px;
      border-radius: var(--radius-xl);
      text-align: center;
    }

    .stat-card h3 {
      font-size: 1.1em;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .stat-card .value {
      font-size: 2.5em;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .stat-card .unit {
      font-size: 0.9em;
      opacity: 0.8;
    }

    .report-section {
      background: var(--color-bg-light);
      border-radius: var(--radius-xl);
      padding: 25px;
      margin-bottom: 25px;
    }

    .report-section-title {
      font-size: 1.5em;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 3px solid var(--color-primary);
    }

    .report-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .report-table thead {
      background: var(--gradient-primary);
      color: white;
    }

    .report-table th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
    }

    .report-table td {
      padding: 15px;
      border-bottom: 1px solid #e9ecef;
    }

    .report-table tbody tr:hover {
      background: var(--color-bg-light);
    }

    .score-badge {
      padding: 6px 12px;
      border-radius: var(--radius-2xl);
      font-size: 0.9em;
      font-weight: 600;
    }

    .score-excellent {
      background: #d4edda;
      color: #155724;
    }

    .score-good {
      background: #cfe2ff;
      color: #084298;
    }

    .score-normal {
      background: #fff3cd;
      color: #856404;
    }

    .score-poor {
      background: #f8d7da;
      color: #721c24;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-light);
    }

    .empty-state-icon {
      font-size: 4em;
      margin-bottom: 20px;
    }

    .kpi-note {
      background: #e7f3ff;
      border-left: 4px solid var(--color-primary);
      padding: 15px;
      border-radius: var(--radius-md);
      margin-top: 20px;
      font-size: 0.95em;
      color: var(--color-text);
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .report-table {
        font-size: 0.9em;
      }

      .report-table th,
      .report-table td {
        padding: 10px;
      }

      .tabs {
        gap: 6px;
      }

      .tab {
        padding: 10px 16px;
        font-size: 0.9em;
        flex: 1 1 calc(50% - 3px);
        min-width: calc(50% - 3px);
      }
    }

    @media (max-width: 480px) {
      .tab {
        flex: 1 1 100%;
        min-width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>📊 รายงานประเมินผล</h1>
      <p>ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>

    <div id="navigation"></div>

    <div class="content">
      <div id="alertContainer"></div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('overview', this)">📈 ภาพรวม</button>
        <button class="tab" onclick="switchTab('vehicles', this)">🚗 การใช้งานรถ</button>
        <button class="tab" onclick="switchTab('drivers', this)">👤 คนขับ</button>
        <button class="tab" onclick="switchTab('fuel', this)">⛽ เชื้อเพลิง</button>
        <button class="tab" onclick="switchTab('repairs', this)">🔧 ซ่อมบำรุง</button>
        <button class="tab" onclick="switchTab('alerts', this)">⚠️ แจ้งเตือน</button>
      </div>

      <div class="filters">
        <div class="filter-group" id="fg-date-from">
          <label>วันที่เริ่มต้น</label>
          <input type="date" id="dateFrom" onchange="loadReport()">
        </div>
        <div class="filter-group" id="fg-date-to">
          <label>วันที่สิ้นสุด</label>
          <input type="date" id="dateTo" onchange="loadReport()">
        </div>
        <div class="filter-group" id="fg-car" style="display:none">
          <label>รถ</label>
          <select id="filterCar" onchange="loadReport()">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
      </div>

      <div class="actions-bar">
        <button class="btn btn-secondary" onclick="loadReport()">
          🔃 รีเฟรช
        </button>
        <button class="btn btn-primary" onclick="exportReport()">
          💾 ส่งออกรายงาน
        </button>
      </div>

      <div id="loading" class="loading">กำลังโหลดข้อมูล...</div>
      <div id="reportContent" style="display: none;">
        <!-- Content will be populated dynamically -->
      </div>
    </div>
  </div>
  <script>
    var currentTab = 'overview';

    document.addEventListener('DOMContentLoaded', function () {
      requireAuth();

      var today = new Date();
      var lastMonth = new Date(today);
      lastMonth.setMonth(lastMonth.getMonth() - 1);
      document.getElementById('dateFrom').value = fmtDate(lastMonth);
      document.getElementById('dateTo').value = fmtDate(today);

      updateFilterVisibility();
      loadCarFilter();
      loadReport();
    });

    function fmtDate(d) {
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }
    function pad(n) { return String(n).padStart(2, '0'); }
    function fmtNum(n) { return Number(n || 0).toLocaleString('th-TH'); }
    function fmtMoney(n) { return Number(n || 0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function fmtDateTH(s) {
      if (!s) return '-';
      var d = new Date(s);
      if (isNaN(d)) return String(s);
      return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
    }
    function daysUntil(dateStr) {
      return Math.ceil((new Date(dateStr) - Date.now()) / 86400000);
    }
    function htmlEsc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function buildQuery(params) {
      var parts = [];
      Object.keys(params).forEach(function (k) {
        if (params[k] !== undefined && params[k] !== null && params[k] !== '') {
          parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(params[k]));
        }
      });
      return parts.length ? '?' + parts.join('&') : '';
    }
    function emptyState(icon, msg) {
      return '<div class="empty-state"><div class="empty-state-icon">' + icon + '</div><p>' + htmlEsc(msg) + '</p></div>';
    }
    function statCard(title, value, unit, sub) {
      return '<div class="stat-card"><h3>' + title + '</h3><div class="value">' + value + '</div><div class="unit">' + unit + '</div>' +
        (sub ? '<div style="font-size:0.8em;opacity:0.8;margin-top:6px">' + sub + '</div>' : '') + '</div>';
    }
    function statusBadge(status) {
      var map = {
        'active': ['score-excellent', 'ใช้งาน'],
        'inactive': ['score-poor', 'ไม่ใช้งาน'],
        'maintenance': ['score-normal', 'ซ่อมบำรุง'],
        'completed': ['score-excellent', 'เสร็จแล้ว'],
        'in_progress': ['score-good', 'กำลังซ่อม'],
        'reported': ['score-normal', 'แจ้งซ่อม'],
        'cancelled': ['score-poor', 'ยกเลิก'],
        'scheduled': ['score-good', 'นัดหมาย'],
        'ongoing': ['score-good', 'กำลังไป'],
        'leave': ['score-normal', 'ลา']
      };
      var s = map[status] || ['score-normal', status || '-'];
      return '<span class="score-badge ' + s[0] + '">' + s[1] + '</span>';
    }

    function updateFilterVisibility() {
      var showDate = ['fuel', 'repairs'].includes(currentTab);
      var showCar = currentTab === 'fuel';
      document.getElementById('fg-date-from').style.display = showDate ? '' : 'none';
      document.getElementById('fg-date-to').style.display = showDate ? '' : 'none';
      document.getElementById('fg-car').style.display = showCar ? '' : 'none';
    }

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
      el.classList.add('active');
      updateFilterVisibility();
      loadReport();
    }

    async function loadCarFilter() {
      try {
        var r = await apiCall('getVehicles', {});
        var list = (r && r.data) ? (r.data.vehicles || r.data) : [];
        var sel = document.getElementById('filterCar');
        list.forEach(function (v) {
          var o = document.createElement('option');
          o.value = v.id || v.car_id || '';
          o.textContent = (v.license_plate || '') + (v.brand ? ' - ' + v.brand : '') + (v.model ? ' ' + v.model : '');
          sel.appendChild(o);
        });
      } catch (e) { /* ignore */ }
    }

    async function loadReport() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('reportContent').style.display = 'none';
      document.getElementById('reportContent').innerHTML = '';

      var dateFrom = document.getElementById('dateFrom').value;
      var dateTo = document.getElementById('dateTo').value;
      var carId = document.getElementById('filterCar').value;

      try {
        var html = '';
        switch (currentTab) {
          case 'overview': html = await renderOverview(); break;
          case 'vehicles': html = await renderVehicles(); break;
          case 'drivers':  html = await renderDrivers();  break;
          case 'fuel':     html = await renderFuel(dateFrom, dateTo, carId); break;
          case 'repairs':  html = await renderRepairs(dateFrom, dateTo); break;
          case 'alerts':   html = await renderAlerts(); break;
          default:         html = await renderOverview();
        }
        document.getElementById('reportContent').innerHTML = html;
        document.getElementById('reportContent').style.display = 'block';
      } catch (e) {
        console.error(e);
        document.getElementById('reportContent').innerHTML = emptyState('⚠️', 'โหลดข้อมูลไม่สำเร็จ: ' + (e.message || ''));
        document.getElementById('reportContent').style.display = 'block';
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    async function renderOverview() {
      var r = await apiCall('getDashboard', {});
      var d = (r && r.data) ? r.data : (r || {});
      var v = d.vehicles || {};
      var dr = d.drivers || {};
      var qt = d.queue_today || {};
      var fm = d.fuel_month || {};
      var ra = d.repairs_active || {};
      var alerts = d.alerts_unresolved || 0;

      var html = '<div class="stats-grid">';
      html += statCard('🚗 รถทั้งหมด', fmtNum(v.total || 0), 'คัน',
        'ใช้งาน ' + (v.active || 0) + ' | ซ่อมบำรุง ' + (v.in_maintenance || 0) + ' | ไม่ใช้งาน ' + (v.inactive || 0));
      html += statCard('👤 คนขับทั้งหมด', fmtNum(dr.total || 0), 'คน',
        'ปกติ ' + (dr.active || 0) + ' | แจ้งเหนื่อย ' + (dr.fatigued || 0));
      html += statCard('📅 คิววันนี้', fmtNum(qt.total || 0), 'รายการ',
        'รอ ' + (qt.scheduled || 0) + ' | กำลังไป ' + (qt.ongoing || 0) + ' | เสร็จ ' + (qt.completed || 0));
      html += statCard('⛽ น้ำมันเดือนนี้', fmtNum(fm.total_liters || 0), 'ลิตร',
        'ค่าใช้จ่าย ' + fmtMoney(fm.total_amount || 0) + ' บาท (' + fmtNum(fm.count || 0) + ' ครั้ง)');
      html += statCard('🔧 ซ่อมบำรุงค้างอยู่', fmtNum(ra.total || 0), 'รายการ',
        'แจ้งซ่อม ' + (ra.reported || 0) + ' | กำลังซ่อม ' + (ra.in_progress || 0));
      html += statCard('⚠️ แจ้งเตือนที่ยังไม่แก้ไข', fmtNum(alerts), 'รายการ', 'จากการตรวจสภาพรถประจำวัน');
      html += '</div>';
      if (d.generated_at) {
        html += '<div class="kpi-note">อัปเดตล่าสุด: ' + fmtDateTH(d.generated_at) + '</div>';
      }
      return html;
    }

    async function renderVehicles() {
      var r = await API.get('/api/reports/vehicles');
      var rows = (r && r.data) ? r.data : (r || []);
      if (!Array.isArray(rows) || rows.length === 0) {
        return emptyState('🚗', 'ไม่พบข้อมูลรถ');
      }
      var html = '<div class="report-section">';
      html += '<div class="report-section-title">🚗 สรุปการใช้งานรถรายคัน</div>';
      html += '<div style="overflow-x:auto"><table class="report-table">';
      html += '<thead><tr><th>ทะเบียน</th><th>ยี่ห้อ/รุ่น</th><th>เลขไมล์ปัจจุบัน</th><th>จำนวนเที่ยว</th><th>น้ำมันรวม (ลิตร)</th><th>ค่าน้ำมันรวม (บาท)</th><th>จำนวนซ่อม</th><th>ค่าซ่อมรวม (บาท)</th><th>สถานะ</th></tr></thead><tbody>';
      rows.forEach(function (v) {
        html += '<tr>';
        html += '<td><strong>' + htmlEsc(v.license_plate || '-') + '</strong></td>';
        html += '<td>' + htmlEsc((v.brand || '') + ' ' + (v.model || '') + (v.year ? ' (' + v.year + ')' : '')) + '</td>';
        html += '<td>' + fmtNum(v.current_mileage || 0) + ' กม.</td>';
        html += '<td>' + fmtNum(v.trip_count || 0) + '</td>';
        html += '<td>' + fmtNum(v.total_fuel_liters || 0) + '</td>';
        html += '<td>' + fmtMoney(v.total_fuel_cost || 0) + '</td>';
        html += '<td>' + fmtNum(v.repair_count || 0) + '</td>';
        html += '<td>' + fmtMoney(v.total_repair_cost || 0) + '</td>';
        html += '<td>' + statusBadge(v.status) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div></div>';
      return html;
    }

    async function renderDrivers() {
      var r = await API.get('/api/reports/drivers');
      var rows = (r && r.data) ? r.data : (r || []);
      if (!Array.isArray(rows) || rows.length === 0) {
        return emptyState('👤', 'ไม่พบข้อมูลคนขับ');
      }
      var html = '<div class="report-section">';
      html += '<div class="report-section-title">👤 สรุปการทำงานคนขับ</div>';
      html += '<div style="overflow-x:auto"><table class="report-table">';
      html += '<thead><tr><th>ชื่อ</th><th>เลขใบขับขี่</th><th>วันหมดอายุ</th><th>จำนวนเที่ยว</th><th>แจ้งเหนื่อย</th><th>Discipline Score</th><th>สถานะ</th></tr></thead><tbody>';
      rows.forEach(function (d) {
        var licExpiry = d.license_expiry || '';
        var daysLeft = licExpiry ? daysUntil(licExpiry) : 999;
        var expiryClass = daysLeft < 0 ? 'score-poor' : (daysLeft < 30 ? 'score-normal' : '');
        var score = (d.discipline_score !== undefined && d.discipline_score !== null) ? d.discipline_score : null;
        var scoreClass = score !== null ? (score >= 80 ? 'score-excellent' : score >= 60 ? 'score-good' : score >= 40 ? 'score-normal' : 'score-poor') : '';
        html += '<tr>';
        html += '<td><strong>' + htmlEsc(d.name || '-') + '</strong></td>';
        html += '<td>' + htmlEsc(d.license_number || '-') + '</td>';
        html += '<td>' + (licExpiry ? '<span class="score-badge ' + expiryClass + '">' + fmtDateTH(licExpiry) + '</span>' : '-') + '</td>';
        html += '<td>' + fmtNum(d.trip_count || 0) + '</td>';
        html += '<td>' + fmtNum(d.fatigue_reports || 0) + '</td>';
        html += '<td>' + (score !== null ? '<span class="score-badge ' + scoreClass + '">' + score + '</span>' : '-') + '</td>';
        html += '<td>' + statusBadge(d.status) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      html += '<div class="kpi-note">⭐ Discipline Score: 80+ ดีมาก | 60–79 ดี | 40–59 ปกติ | ต่ำกว่า 40 ควรพัฒนา — ใช้เพื่อการพัฒนา ไม่ใช่การลงโทษ</div>';
      html += '</div>';
      return html;
    }

    async function renderFuel(dateFrom, dateTo, carId) {
      var params = buildQuery({ date_from: dateFrom, date_to: dateTo, car_id: carId || undefined });
      var r = await API.get('/api/reports/fuel' + params);
      var payload = (r && r.data) ? r.data : (r || {});
      var records = payload.records || [];
      var summary = payload.summary || {};

      var html = '<div class="stats-grid">';
      html += statCard('📋 จำนวนครั้ง', fmtNum(summary.count || 0), 'ครั้ง', '');
      html += statCard('⛽ รวมน้ำมัน', fmtNum(summary.total_liters || 0), 'ลิตร', '');
      html += statCard('💰 ค่าน้ำมันรวม', fmtMoney(summary.total_amount || 0), 'บาท', '');
      html += statCard('📉 อัตราสิ้นเปลืองเฉลี่ย', Number(summary.avg_consumption || 0).toFixed(2), 'กม./ลิตร', '');
      html += '</div>';

      if (records.length === 0) {
        html += emptyState('⛽', 'ไม่พบข้อมูลในช่วงเวลาที่เลือก');
        return html;
      }
      html += '<div class="report-section">';
      html += '<div class="report-section-title">⛽ รายการเติมน้ำมัน</div>';
      html += '<div style="overflow-x:auto"><table class="report-table">';
      html += '<thead><tr><th>วันที่</th><th>ทะเบียนรถ</th><th>คนขับ</th><th>ประเภท</th><th>ลิตร</th><th>ราคา/ลิตร</th><th>รวม (บาท)</th><th>ปั๊ม</th><th>อัตราสิ้นเปลือง</th></tr></thead><tbody>';
      records.forEach(function (rec) {
        html += '<tr>';
        html += '<td>' + fmtDateTH(rec.date) + '</td>';
        html += '<td>' + htmlEsc(rec.license_plate || rec.car_id || '-') + '</td>';
        html += '<td>' + htmlEsc(rec.driver_name || '-') + '</td>';
        html += '<td>' + htmlEsc(rec.fuel_type || '-') + '</td>';
        html += '<td>' + fmtNum(rec.liters || 0) + '</td>';
        html += '<td>' + fmtMoney(rec.price_per_liter || 0) + '</td>';
        html += '<td>' + fmtMoney(rec.amount || 0) + '</td>';
        html += '<td>' + htmlEsc(rec.gas_station_name || '-') + '</td>';
        html += '<td>' + (rec.fuel_consumption_rate ? Number(rec.fuel_consumption_rate).toFixed(2) + ' กม./ล.' : '-') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div></div>';
      return html;
    }

    async function renderRepairs(dateFrom, dateTo) {
      var params = buildQuery({ date_from: dateFrom, date_to: dateTo });
      var r = await API.get('/api/reports/repairs' + params);
      var payload = (r && r.data) ? r.data : (r || {});
      var records = payload.records || [];
      var summary = payload.summary || {};

      var html = '<div class="stats-grid">';
      html += statCard('🔧 รายการซ่อมทั้งหมด', fmtNum(summary.total || 0), 'รายการ', '');
      html += statCard('💰 ค่าซ่อมรวม', fmtMoney(summary.total_cost || 0), 'บาท', '');
      html += statCard('✅ ซ่อมเสร็จแล้ว', fmtNum(summary.completed || 0), 'รายการ', '');
      html += statCard('⏳ กำลังดำเนินการ', fmtNum(summary.active || 0), 'รายการ', '');
      html += '</div>';

      if (records.length === 0) {
        html += emptyState('🔧', 'ไม่พบข้อมูลในช่วงเวลาที่เลือก');
        return html;
      }
      html += '<div class="report-section">';
      html += '<div class="report-section-title">🔧 รายการซ่อมบำรุง</div>';
      html += '<div style="overflow-x:auto"><table class="report-table">';
      html += '<thead><tr><th>วันที่แจ้ง</th><th>ทะเบียนรถ</th><th>ประเภทปัญหา</th><th>อู่/ผู้ซ่อม</th><th>ค่าใช้จ่าย (บาท)</th><th>สถานะ</th></tr></thead><tbody>';
      records.forEach(function (rec) {
        html += '<tr>';
        html += '<td>' + fmtDateTH(rec.date_reported) + '</td>';
        html += '<td>' + htmlEsc(rec.license_plate || rec.car_id || '-') + '</td>';
        html += '<td>' + htmlEsc(rec.problem_type || rec.description || '-') + '</td>';
        html += '<td>' + htmlEsc(rec.garage || '-') + '</td>';
        html += '<td>' + fmtMoney(rec.cost || 0) + '</td>';
        html += '<td>' + statusBadge(rec.status) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div></div>';
      return html;
    }

    async function renderAlerts() {
      var [expiryR, maintR] = await Promise.all([
        API.get('/api/reports/expiry?days=90'),
        API.get('/api/reports/maintenance')
      ]);
      var expiry = (expiryR && expiryR.data) ? expiryR.data : (expiryR || {});
      var taxList = expiry.tax_expiring || [];
      var insuranceList = expiry.insurance_expiring || [];
      var maintList = (maintR && maintR.data) ? maintR.data : (maintR || []);
      var overdueList = Array.isArray(maintList) ? maintList.filter(function (m) { return m.maintenance_status !== 'ok'; }) : [];

      var html = '';

      // Tax
      html += '<div class="report-section">';
      html += '<div class="report-section-title">📄 ภาษีรถยนต์ที่ใกล้หมดอายุ (ภายใน 90 วัน)</div>';
      if (taxList.length === 0) {
        html += '<div class="empty-state" style="padding:30px"><div class="empty-state-icon" style="font-size:2em">✅</div><p>ไม่มีภาษีที่ใกล้หมดอายุ</p></div>';
      } else {
        html += '<div style="overflow-x:auto"><table class="report-table"><thead><tr><th>ทะเบียนรถ</th><th>ยี่ห้อ</th><th>วันหมดอายุ</th><th>เหลืออีก</th></tr></thead><tbody>';
        taxList.forEach(function (t) {
          var days = daysUntil(t.expiry_date);
          var cls = days < 30 ? 'score-poor' : 'score-normal';
          html += '<tr><td><strong>' + htmlEsc(t.license_plate || '-') + '</strong></td><td>' + htmlEsc(t.brand || '-') + '</td><td>' + fmtDateTH(t.expiry_date) + '</td><td><span class="score-badge ' + cls + '">' + days + ' วัน</span></td></tr>';
        });
        html += '</tbody></table></div>';
      }
      html += '</div>';

      // Insurance
      html += '<div class="report-section">';
      html += '<div class="report-section-title">🛡️ ประกันภัยที่ใกล้หมดอายุ (ภายใน 90 วัน)</div>';
      if (insuranceList.length === 0) {
        html += '<div class="empty-state" style="padding:30px"><div class="empty-state-icon" style="font-size:2em">✅</div><p>ไม่มีประกันที่ใกล้หมดอายุ</p></div>';
      } else {
        html += '<div style="overflow-x:auto"><table class="report-table"><thead><tr><th>ทะเบียนรถ</th><th>ยี่ห้อ</th><th>ประเภทประกัน</th><th>วันหมดอายุ</th><th>เหลืออีก</th></tr></thead><tbody>';
        insuranceList.forEach(function (ins) {
          var days = daysUntil(ins.expiry_date);
          var cls = days < 30 ? 'score-poor' : 'score-normal';
          html += '<tr><td><strong>' + htmlEsc(ins.license_plate || '-') + '</strong></td><td>' + htmlEsc(ins.brand || '-') + '</td><td>' + htmlEsc(ins.insurance_type || '-') + '</td><td>' + fmtDateTH(ins.expiry_date) + '</td><td><span class="score-badge ' + cls + '">' + days + ' วัน</span></td></tr>';
        });
        html += '</tbody></table></div>';
      }
      html += '</div>';

      // Maintenance
      html += '<div class="report-section">';
      html += '<div class="report-section-title">🔧 รายการบำรุงรักษาที่ใกล้ถึงกำหนด / เลยกำหนด</div>';
      if (overdueList.length === 0) {
        html += '<div class="empty-state" style="padding:30px"><div class="empty-state-icon" style="font-size:2em">✅</div><p>ไม่มีรายการบำรุงรักษาที่ต้องดูแล</p></div>';
      } else {
        html += '<div style="overflow-x:auto"><table class="report-table"><thead><tr><th>ทะเบียนรถ</th><th>รายการ</th><th>สถานะ</th><th>กม.ถัดไป</th><th>วันถัดไป</th></tr></thead><tbody>';
        overdueList.forEach(function (m) {
          var cls = m.maintenance_status === 'overdue' ? 'score-poor' : 'score-normal';
          var statusTH = m.maintenance_status === 'overdue' ? 'เลยกำหนด' : 'ใกล้ถึงกำหนด';
          html += '<tr><td><strong>' + htmlEsc(m.license_plate || '-') + '</strong></td><td>' + htmlEsc(m.item_name || m.item_key || '-') + '</td><td><span class="score-badge ' + cls + '">' + statusTH + '</span></td><td>' + (m.next_km ? fmtNum(m.next_km) + ' กม.' : '-') + '</td><td>' + fmtDateTH(m.next_date) + '</td></tr>';
        });
        html += '</tbody></table></div>';
      }
      html += '</div>';

      return html;
    }
    function exportReport() {
      alert('ฟีเจอร์ส่งออกรายงาน CSV จะเพิ่มในเวอร์ชันถัดไป');
    }
  </script>

  <div style="background: var(--color-bg-light); padding: 20px; text-align: center; color: var(--color-text-muted); font-size: 0.9em; margin-top: 20px;">
    <p>ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
  </div>
</body>
