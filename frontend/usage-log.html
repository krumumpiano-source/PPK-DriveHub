<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บันทึกการใช้งาน - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>
    window.API_BASE_URL = CONFIG.API_BASE_URL;
    window.currentPage = 'usage-log';
    window.REQUIRE_AUTH = true;
  </script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background: var(--gradient-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-container);
      overflow: hidden;
    }

    .header {
      background: var(--gradient-primary);
      color: white;
      padding: 25px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8em;
      margin-bottom: 8px;
    }

    .content {
      padding: 25px;
    }

    .filters {
      background: var(--color-bg-light);
      padding: 20px;
      border-radius: var(--radius-xl);
      margin-bottom: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-group label {
      font-weight: 600;
      color: var(--color-text);
      font-size: 0.9em;
    }

    .filter-group input,
    .filter-group select {
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: var(--radius-md);
      font-size: 1em;
      font-family: inherit;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .actions-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--gradient-primary);
      color: white;
      padding: 20px;
      border-radius: var(--radius-xl);
      text-align: center;
    }

    .stat-card h3 {
      font-size: 1em;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .stat-card .value {
      font-size: 2em;
      font-weight: 700;
    }

    .stat-card .unit {
      font-size: 0.9em;
      opacity: 0.8;
    }

    .table-container {
      overflow-x: auto;
      border-radius: var(--radius-xl);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .usage-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    .usage-table thead {
      background: var(--gradient-primary);
      color: white;
    }

    .usage-table th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }

    .usage-table td {
      padding: 12px 15px;
      border-bottom: 1px solid #e9ecef;
    }

    .usage-table tbody tr:hover {
      background: var(--color-bg-light);
    }

    .badge {
      padding: 4px 10px;
      border-radius: var(--radius-xl);
      font-size: 0.85em;
      font-weight: 600;
    }

    .badge-auto {
      background: var(--color-bg-info);
      color: #1976d2;
    }

    .badge-normal {
      background: var(--color-bg-success);
      color: var(--color-secondary-dark);
    }

    .badge-warning {
      background: var(--color-bg-warning);
      color: #f57c00;
    }

    .badge-error {
      background: var(--color-bg-danger);
      color: var(--color-danger-dark);
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-light);
    }

    .empty-state-icon {
      font-size: 4em;
      margin-bottom: 20px;
    }

    .alert {
      padding: 15px;
      border-radius: var(--radius-md);
      margin-bottom: 20px;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border-left: 4px solid #2e7d32;
    }

    .alert-error {
      background: var(--color-bg-danger);
      color: var(--color-danger-dark);
      border-left: 4px solid #c62828;
    }

    @media (max-width: 768px) {
      .filters {
        grid-template-columns: 1fr;
      }

      .usage-table {
        font-size: 0.9em;
      }

      .usage-table th,
      .usage-table td {
        padding: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>📝 บันทึกการใช้งาน</h1>
      <p>ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>

    <div id="navigation"></div>

    <div class="content">
      <div id="alertContainer"></div>

      <div class="filters">
        <div class="filter-group">
          <label>วันที่เริ่มต้น</label>
          <input type="date" id="dateFrom">
        </div>
        <div class="filter-group">
          <label>วันที่สิ้นสุด</label>
          <input type="date" id="dateTo">
        </div>
        <div class="filter-group">
          <label>รถ</label>
          <select id="filterCar">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
        <div class="filter-group">
          <label>คนขับ</label>
          <select id="filterDriver">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
        <div class="filter-group">
          <label>คุณภาพข้อมูล</label>
          <select id="filterQuality">
            <option value="">ทั้งหมด</option>
            <option value="normal">ปกติ</option>
            <option value="auto_departure">สร้างอัตโนมัติ (ออก)</option>
            <option value="auto_return">สร้างอัตโนมัติ (กลับ)</option>
            <option value="gap_record">ช่องว่างข้อมูล</option>
            <option value="late_return">กลับล่าช้า</option>
            <option value="departure_only">ออกอย่างเดียว</option>
            <option value="auto_unresolved">แก้ไขไม่ได้</option>
          </select>
        </div>
        <div class="filter-group">
          <label>ประเภทการแสดงผล</label>
          <select id="viewType">
            <option value="all">ทั้งหมด</option>
            <option value="by_car">รายคัน</option>
            <option value="by_driver">รายคน</option>
            <option value="by_date">รายวัน</option>
          </select>
        </div>
        <div class="filter-group" style="justify-content: flex-end;">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="loadRecords()">🔍 ค้นหา</button>
        </div>
      </div>

      <div class="actions-bar">
        <button class="btn btn-secondary" onclick="loadRecords()">
          🔃 รีเฟรช
        </button>
        <button class="btn btn-primary" id="btnBatchHeal" onclick="runBatchHeal()" style="display:none">
          🩹 สแกนและเติมเต็มข้อมูลที่ขาด
        </button>
      </div>

      <div id="statsContainer" style="display: none;">
        <div class="stats-grid" id="statsGrid"></div>
      </div>

      <div id="loading" class="loading">กำลังโหลดข้อมูล...</div>
      <div id="recordsContainer" style="display: none;">
        <div class="table-container">
          <table class="usage-table">
            <thead>
              <tr>
                <th>วันที่</th>
                <th>รถ</th>
                <th>คนขับ</th>
                <th>เวลาออก</th>
                <th>เวลากลับ</th>
                <th>จุดหมายปลายทาง</th>
                <th>ผู้ขอใช้รถ</th>
                <th>ไมล์ก่อนออก</th>
                <th>ไมล์กลับ</th>
                <th>ระยะทาง (กม.)</th>
                <th>สถานะ</th>
              </tr>
            </thead>
            <tbody id="recordsTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div
      style="background: var(--color-bg-light); padding: 20px; text-align: center; color: var(--color-text-muted); font-size: 0.9em; margin-top: 20px;">
      <p>ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>
  </div>
  <script>
    var records = [];
    var trips = [];
    var vehicles = [];
    var drivers = [];
    var vehiclesMap = {};
    var driversMap = {};

    document.addEventListener('DOMContentLoaded', function () {
      var isAuthenticated = requireAuth();

      // Show batch heal button for admins
      try {
        var user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.role === 'admin' || user.role === 'superadmin') {
          document.getElementById('btnBatchHeal').style.display = '';
        }
      } catch(e) {}
      if (!isAuthenticated) {
        console.warn('Not authenticated, but showing page anyway');
        return; // แสดงหน้าได้แต่ไม่โหลดข้อมูล
      }

      var currentUser = getCurrentUser();
      if (currentUser && !hasModulePermission('usage_log', 'view') && currentUser.role !== 'admin') {
        console.warn('No permission, but showing page anyway');
        // ไม่ redirect — ให้แสดงหน้าได้
      }

      var today = new Date();
      var lastMonth = new Date();
      lastMonth.setDate(lastMonth.getDate() - 30);

      document.getElementById('dateFrom').value = formatDate(lastMonth);
      document.getElementById('dateTo').value = formatDate(today);

      loadVehicles();
      loadDrivers();
      loadRecords();
    });

    function formatDate(date) {
      var year = date.getFullYear();
      var month = String(date.getMonth() + 1).padStart(2, '0');
      var day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function formatDateThai(dateStr) {
      if (!dateStr) return '-';
      try {
        var date = new Date(dateStr + 'T00:00:00');
        var thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
          'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        var day = date.getDate();
        var month = thaiMonths[date.getMonth()];
        var year = date.getFullYear() + 543;
        return day + ' ' + month + ' ' + year;
      } catch (e) {
        return dateStr;
      }
    }

    async function loadVehicles() {
      try {
        var result = await apiCall('getVehicles', {});
        if (result.success && result.data && result.data.vehicles) {
          vehicles = result.data.vehicles || [];
          vehicles.forEach(function (v) {
            vehiclesMap[v.id || v.car_id] = v;
          });

          var select = document.getElementById('filterCar');
          vehicles.forEach(function (vehicle) {
            var option = document.createElement('option');
            option.value = vehicle.id || vehicle.car_id;
            option.textContent = vehicle.license_plate + ' - ' + (vehicle.brand || '') + ' ' + (vehicle.model || '');
            select.appendChild(option);
          });
        }
      } catch (error) {
        console.error('Error loading vehicles:', error);
      }
    }

    async function loadDrivers() {
      try {
        var result = await apiCall('getDrivers', { status: 'active' });
        if (result.success && result.data && result.data.drivers) {
          drivers = result.data.drivers || [];
          drivers.forEach(function (d) {
            driversMap[d.id || d.driver_id] = d;
          });

          var select = document.getElementById('filterDriver');
          drivers.forEach(function (driver) {
            var option = document.createElement('option');
            option.value = driver.id || driver.driver_id;
            option.textContent = driver.full_name || (driver.first_name + ' ' + driver.last_name);
            select.appendChild(option);
          });
        }
      } catch (error) {
        console.error('Error loading drivers:', error);
      }
    }

    async function loadRecords() {
      try {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('recordsContainer').style.display = 'none';
        document.getElementById('statsContainer').style.display = 'none';

        var filters = {};
        var dateFrom = document.getElementById('dateFrom').value;
        var dateTo = document.getElementById('dateTo').value;
        var filterCar = document.getElementById('filterCar').value;
        var filterDriver = document.getElementById('filterDriver').value;

        // Parse date filters - backend expects date_from and date_to
        if (dateFrom) {
          filters.date_from = dateFrom;
        }
        if (dateTo) {
          filters.date_to = dateTo;
        }
        if (filterCar) filters.car_id = filterCar;
        if (filterDriver) filters.driver_id = filterDriver;
        var filterQuality = document.getElementById('filterQuality').value;
        if (filterQuality) filters.data_quality = filterQuality;

        var result = await apiCall('getUsageRecords', filters);

        if (result.success && result.data) {
          records = Array.isArray(result.data) ? result.data : (result.data.records || []);
          trips = pairTrips(records);
          displayStats();
          displayRecords();
        } else {
          document.getElementById('recordsTableBody').innerHTML = '<tr><td colspan="11" class="empty-state"><div class="empty-state-icon">📝</div><p>ไม่พบข้อมูล</p></td></tr>';
          document.getElementById('recordsContainer').style.display = 'block';
        }
      } catch (error) {
        console.error('Error loading records:', error);
        showAlert('โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function pairTrips(records) {
      var usable = records.filter(function(r) {
        return (r.record_type === 'departure' || r.record_type === 'return') && r.data_quality !== 'gap_record';
      });
      var byCar = {};
      usable.forEach(function(r) {
        if (!byCar[r.car_id]) byCar[r.car_id] = [];
        byCar[r.car_id].push(r);
      });
      var result = [];
      Object.keys(byCar).forEach(function(carId) {
        var carRecs = byCar[carId].sort(function(a, b) { return a.datetime.localeCompare(b.datetime); });
        var curDep = null;
        carRecs.forEach(function(rec) {
          if (rec.record_type === 'departure') {
            if (curDep) result.push(buildTrip(curDep, null));
            curDep = rec;
          } else if (rec.record_type === 'return') {
            if (curDep) {
              result.push(buildTrip(curDep, rec));
              curDep = null;
            } else {
              result.push(buildTrip(null, rec));
            }
          }
        });
        if (curDep) result.push(buildTrip(curDep, null));
      });
      result.sort(function(a, b) { return (b.sort_key || '').localeCompare(a.sort_key || ''); });
      return result;
    }

    function buildTrip(dep, ret) {
      var dist = null;
      if (dep && ret && ret.mileage && dep.mileage) {
        dist = ret.mileage - dep.mileage;
        if (dist < 0) dist = null;
      }
      var depVehicle = dep ? vehiclesMap[dep.car_id] : null;
      var retVehicle = ret ? vehiclesMap[ret.car_id] : null;
      var vehicle = depVehicle || retVehicle;
      var lp = (dep && dep.license_plate) || (ret && ret.license_plate) || (vehicle ? vehicle.license_plate : '');
      var br = (dep && dep.brand) || (ret && ret.brand) || (vehicle ? vehicle.brand : '');
      var status = (dep && ret) ? 'complete' : (dep ? 'no_return' : 'no_departure');
      return {
        car_id: dep ? dep.car_id : ret.car_id,
        driver_id: dep ? dep.driver_id : ret.driver_id,
        license_plate: lp || '',
        brand: br || '',
        driver_name: (dep && dep.driver_name) || (ret && ret.driver_name) || '',
        date: dep ? dep.datetime.substring(0, 10) : ret.datetime.substring(0, 10),
        departure_time: dep ? dep.datetime.substring(11, 16) : null,
        return_time: ret ? ret.datetime.substring(11, 16) : null,
        destination: (dep && dep.location) || (ret && ret.location) || '',
        requester_name: (dep && dep.requester_name) || (ret && ret.requester_name) || '',
        mileage_start: dep ? dep.mileage : null,
        mileage_end: ret ? ret.mileage : null,
        distance: dist,
        data_quality: dep ? dep.data_quality : ret.data_quality,
        sort_key: dep ? dep.datetime : ret.datetime,
        status: status
      };
    }

    function displayStats() {
      var totalTrips = trips.length;
      var totalDistance = 0;
      var totalCars = new Set();
      var totalDrivers = new Set();
      var completeTrips = 0;

      trips.forEach(function(trip) {
        if (trip.distance && trip.distance > 0) totalDistance += trip.distance;
        if (trip.car_id) totalCars.add(trip.car_id);
        if (trip.driver_id) totalDrivers.add(trip.driver_id);
        if (trip.status === 'complete') completeTrips++;
      });

      var html = '';
      html += '<div class="stat-card">';
      html += '<h3>📝 จำนวนเที่ยว</h3>';
      html += '<div class="value">' + totalTrips + '</div>';
      html += '<div class="unit">เที่ยว</div>';
      html += '</div>';

      html += '<div class="stat-card">';
      html += '<h3>📏 ระยะทางรวม</h3>';
      html += '<div class="value">' + totalDistance.toLocaleString() + '</div>';
      html += '<div class="unit">กิโลเมตร</div>';
      html += '</div>';

      html += '<div class="stat-card">';
      html += '<h3>✅ เที่ยวสมบูรณ์</h3>';
      html += '<div class="value">' + completeTrips + '</div>';
      html += '<div class="unit">จาก ' + totalTrips + ' เที่ยว</div>';
      html += '</div>';

      html += '<div class="stat-card">';
      html += '<h3>🚗 จำนวนรถ</h3>';
      html += '<div class="value">' + totalCars.size + '</div>';
      html += '<div class="unit">คัน</div>';
      html += '</div>';

      html += '<div class="stat-card">';
      html += '<h3>👤 จำนวนคนขับ</h3>';
      html += '<div class="value">' + totalDrivers.size + '</div>';
      html += '<div class="unit">คน</div>';
      html += '</div>';

      document.getElementById('statsGrid').innerHTML = html;
      document.getElementById('statsContainer').style.display = 'block';
    }

    function displayRecords() {
      var html = '';

      if (trips.length === 0) {
        html = '<tr><td colspan="11" class="empty-state"><div class="empty-state-icon">📝</div><p>ไม่พบข้อมูล</p></td></tr>';
      } else {
        var viewType = document.getElementById('viewType').value;
        var sorted = trips.slice();

        if (viewType === 'by_car') {
          sorted.sort(function(a, b) {
            if (a.license_plate !== b.license_plate) return a.license_plate.localeCompare(b.license_plate);
            return (b.sort_key || '').localeCompare(a.sort_key || '');
          });
        } else if (viewType === 'by_driver') {
          sorted.sort(function(a, b) {
            if ((a.driver_name || '') !== (b.driver_name || '')) return (a.driver_name || '').localeCompare(b.driver_name || '');
            return (b.sort_key || '').localeCompare(a.sort_key || '');
          });
        } else if (viewType === 'by_date') {
          sorted.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
        }
        // else already sorted by sort_key desc from pairTrips

        sorted.forEach(function(trip) {
          var statusBadge = '';
          if (trip.status === 'complete') {
            statusBadge = '<span class="badge badge-success">✅ สมบูรณ์</span>';
          } else if (trip.status === 'no_return') {
            statusBadge = '<span class="badge badge-warning">🟡 ยังไม่กลับ</span>';
          } else if (trip.status === 'no_departure') {
            statusBadge = '<span class="badge badge-info">🔵 ไม่มีบันทึกออก</span>';
          }

          html += '<tr>';
          html += '<td>' + formatDateThai(trip.date) + '</td>';
          html += '<td>' + (trip.license_plate + ' ' + (trip.brand || '')).trim() + '</td>';
          html += '<td>' + (trip.driver_name || '-') + '</td>';
          html += '<td>' + (trip.departure_time || '-') + '</td>';
          html += '<td>' + (trip.return_time || '-') + '</td>';
          html += '<td>' + (trip.destination || '-') + '</td>';
          html += '<td>' + (trip.requester_name || '-') + '</td>';
          html += '<td style="text-align:right">' + (trip.mileage_start != null ? Number(trip.mileage_start).toLocaleString() : '-') + '</td>';
          html += '<td style="text-align:right">' + (trip.mileage_end != null ? Number(trip.mileage_end).toLocaleString() : '-') + '</td>';
          html += '<td style="text-align:right">' + (trip.distance != null && trip.distance >= 0 ? Number(trip.distance).toLocaleString() : '-') + '</td>';
          html += '<td>' + statusBadge + '</td>';
          html += '</tr>';
        });
      }

      document.getElementById('recordsTableBody').innerHTML = html;
      document.getElementById('recordsContainer').style.display = 'block';
    }

    function showAlert(message, type) {
      var container = document.getElementById('alertContainer');
      var alert = document.createElement('div');
      alert.className = 'alert alert-' + type;
      alert.textContent = message;
      container.innerHTML = '';
      container.appendChild(alert);

      setTimeout(function () {
        alert.remove();
      }, 5000);
    }

    async function runBatchHeal() {
      if (!confirm('ต้องการสแกนข้อมูลทั้งหมดและเติมเต็มบันทึกที่ขาดหายอัตโนมัติหรือไม่?')) return;
      var btn = document.getElementById('btnBatchHeal');
      btn.disabled = true;
      btn.textContent = '⚙️ กำลังสแกน...';
      try {
        var result = await API.post('/api/usage/batch-heal', {});
        var s = (result && result.data) ? result.data.summary : {};
        var msg = 'สแกนเสร็จ! สร้างอัตโนมัติ: บันทึกกลับ ' + (s.auto_returns_created || 0) + ' | บันทึกออก ' + (s.auto_departures_created || 0) + ' | ช่องว่าง ' + (s.gaps_detected || 0) + ' | แก้ departure_only ' + (s.departure_only_resolved || 0);
        showAlert(msg, 'success');
        loadRecords();
      } catch (e) {
        showAlert('สแกนไม่สำเร็จ: ' + (e.message || ''), 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '🩹 สแกนและเติมเต็มข้อมูลที่ขาด';
      }
    }
  </script>
</body>

</html>
