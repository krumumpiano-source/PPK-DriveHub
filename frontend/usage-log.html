<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บันทึกการใช้งาน - PPK DriveHub</title>
  <script src="config.js"></script>
  <script>
    window.API_BASE_URL = CONFIG.API_BASE_URL;
    window.currentPage = 'usage-log';
    window.REQUIRE_AUTH = true;
  </script>
  <link rel="stylesheet" href="common.css">
  <script src="js/api.js"></script><script src="common.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background: var(--gradient-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-container);
      overflow: hidden;
    }

    .header {
      background: var(--gradient-primary);
      color: white;
      padding: 25px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8em;
      margin-bottom: 8px;
    }

    .content {
      padding: 25px;
    }

    .filters {
      background: var(--color-bg-light);
      padding: 20px;
      border-radius: var(--radius-xl);
      margin-bottom: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-group label {
      font-weight: 600;
      color: var(--color-text);
      font-size: 0.9em;
    }

    .filter-group input,
    .filter-group select {
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: var(--radius-md);
      font-size: 1em;
      font-family: inherit;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .actions-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--gradient-primary);
      color: white;
      padding: 20px;
      border-radius: var(--radius-xl);
      text-align: center;
    }

    .stat-card h3 {
      font-size: 1em;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .stat-card .value {
      font-size: 2em;
      font-weight: 700;
    }

    .stat-card .unit {
      font-size: 0.9em;
      opacity: 0.8;
    }

    .table-container {
      overflow-x: auto;
      border-radius: var(--radius-xl);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .usage-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    .usage-table thead {
      background: var(--gradient-primary);
      color: white;
    }

    .usage-table th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }

    .usage-table td {
      padding: 12px 15px;
      border-bottom: 1px solid #e9ecef;
    }

    .usage-table tbody tr:hover {
      background: var(--color-bg-light);
    }

    .badge {
      padding: 4px 10px;
      border-radius: var(--radius-xl);
      font-size: 0.85em;
      font-weight: 600;
    }

    .badge-auto {
      background: var(--color-bg-info);
      color: #1976d2;
    }

    .badge-normal {
      background: var(--color-bg-success);
      color: var(--color-secondary-dark);
    }

    .badge-warning {
      background: var(--color-bg-warning);
      color: #f57c00;
    }

    .badge-error {
      background: var(--color-bg-danger);
      color: var(--color-danger-dark);
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-light);
    }

    .empty-state-icon {
      font-size: 4em;
      margin-bottom: 20px;
    }

    .alert {
      padding: 15px;
      border-radius: var(--radius-md);
      margin-bottom: 20px;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border-left: 4px solid #2e7d32;
    }

    .alert-error {
      background: var(--color-bg-danger);
      color: var(--color-danger-dark);
      border-left: 4px solid #c62828;
    }

    @media (max-width: 768px) {
      .filters {
        grid-template-columns: 1fr;
      }

      .usage-table {
        font-size: 0.9em;
      }

      .usage-table th,
      .usage-table td {
        padding: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>📝 บันทึกการใช้งาน</h1>
      <p>ระบบจัดการยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>

    <div id="navigation"></div>

    <div class="content">
      <div id="alertContainer"></div>

      <div class="filters">
        <div class="filter-group">
          <label>วันที่เริ่มต้น</label>
          <input type="date" id="dateFrom">
        </div>
        <div class="filter-group">
          <label>วันที่สิ้นสุด</label>
          <input type="date" id="dateTo">
        </div>
        <div class="filter-group">
          <label>รถ</label>
          <select id="filterCar">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
        <div class="filter-group">
          <label>คนขับ</label>
          <select id="filterDriver">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
        <div class="filter-group">
          <label>ประเภทการแสดงผล</label>
          <select id="viewType">
            <option value="all">ทั้งหมด</option>
            <option value="by_car">รายคัน</option>
            <option value="by_driver">รายคน</option>
            <option value="by_date">รายวัน</option>
          </select>
        </div>
        <div class="filter-group" style="justify-content: flex-end;">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="loadRecords()">🔍 ค้นหา</button>
        </div>
      </div>

      <div class="actions-bar">
        <button class="btn btn-secondary" onclick="loadRecords()">
          🔃 รีเฟรช
        </button>
      </div>

      <div id="statsContainer" style="display: none;">
        <div class="stats-grid" id="statsGrid"></div>
      </div>

      <div id="loading" class="loading">กำลังโหลดข้อมูล...</div>
      <div id="recordsContainer" style="display: none;">
        <div class="table-container">
          <table class="usage-table">
            <thead>
              <tr>
                <th>วันที่</th>
                <th>รถ</th>
                <th>คนขับ</th>
                <th>เวลาเริ่ม</th>
                <th>เวลาสิ้นสุด</th>
                <th>ระยะทาง (กม.)</th>
                <th>ชั่วโมง</th>
                <th>ปลายทาง</th>
                <th>ผู้ขอใช้รถ</th>
                <th>สถานะ</th>
              </tr>
            </thead>
            <tbody id="recordsTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div
      style="background: var(--color-bg-light); padding: 20px; text-align: center; color: var(--color-text-muted); font-size: 0.9em; margin-top: 20px;">
      <p>ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว งานยานพาหนะโรงเรียนพะเยาพิทยาคม 2569</p>
    </div>
  </div>
  <script>
    var records = [];
    var vehicles = [];
    var drivers = [];
    var vehiclesMap = {};
    var driversMap = {};

    document.addEventListener('DOMContentLoaded', function () {
      var isAuthenticated = requireAuth();
      if (!isAuthenticated) {
        console.warn('Not authenticated, but showing page anyway');
        return; // แสดงหน้าได้แต่ไม่โหลดข้อมูล
      }

      var currentUser = getCurrentUser();
      if (currentUser && !hasModulePermission('usage_log', 'view') && currentUser.role !== 'admin') {
        console.warn('No permission, but showing page anyway');
        // ไม่ redirect — ให้แสดงหน้าได้
      }

      var today = new Date();
      var lastMonth = new Date();
      lastMonth.setDate(lastMonth.getDate() - 30);

      document.getElementById('dateFrom').value = formatDate(lastMonth);
      document.getElementById('dateTo').value = formatDate(today);

      loadVehicles();
      loadDrivers();
      loadRecords();
    });

    function formatDate(date) {
      var year = date.getFullYear();
      var month = String(date.getMonth() + 1).padStart(2, '0');
      var day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function formatDateThai(dateStr) {
      if (!dateStr) return '-';
      try {
        var date = new Date(dateStr + 'T00:00:00');
        var thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
          'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        var day = date.getDate();
        var month = thaiMonths[date.getMonth()];
        var year = date.getFullYear() + 543;
        return day + ' ' + month + ' ' + year;
      } catch (e) {
        return dateStr;
      }
    }

    async function loadVehicles() {
      try {
        var result = await apiCall('getVehicles', {});
        if (result.success && result.data && result.data.vehicles) {
          vehicles = result.data.vehicles || [];
          vehicles.forEach(function (v) {
            vehiclesMap[v.car_id] = v;
          });

          var select = document.getElementById('filterCar');
          vehicles.forEach(function (vehicle) {
            var option = document.createElement('option');
            option.value = vehicle.car_id;
            option.textContent = vehicle.license_plate + ' - ' + (vehicle.brand || '') + ' ' + (vehicle.model || '');
            select.appendChild(option);
          });
        }
      } catch (error) {
        console.error('Error loading vehicles:', error);
      }
    }

    async function loadDrivers() {
      try {
        var result = await apiCall('getDrivers', { status: 'active' });
        if (result.success && result.data && result.data.drivers) {
          drivers = result.data.drivers || [];
          drivers.forEach(function (d) {
            driversMap[d.driver_id] = d;
          });

          var select = document.getElementById('filterDriver');
          drivers.forEach(function (driver) {
            var option = document.createElement('option');
            option.value = driver.driver_id;
            option.textContent = driver.full_name || (driver.first_name + ' ' + driver.last_name);
            select.appendChild(option);
          });
        }
      } catch (error) {
        console.error('Error loading drivers:', error);
      }
    }

    async function loadRecords() {
      try {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('recordsContainer').style.display = 'none';
        document.getElementById('statsContainer').style.display = 'none';

        var filters = {};
        var dateFrom = document.getElementById('dateFrom').value;
        var dateTo = document.getElementById('dateTo').value;
        var filterCar = document.getElementById('filterCar').value;
        var filterDriver = document.getElementById('filterDriver').value;

        // Parse date filters - backend expects date_from and date_to
        if (dateFrom) {
          filters.date_from = dateFrom;
        }
        if (dateTo) {
          filters.date_to = dateTo;
        }
        if (filterCar) filters.car_id = filterCar;
        if (filterDriver) filters.driver_id = filterDriver;

        var result = await apiCall('getUsageRecords', { filters: filters });

        if (result.success && result.data && result.data.records) {
          records = result.data.records || [];
          displayStats();
          displayRecords();
        } else {
          document.getElementById('recordsTableBody').innerHTML = '<tr><td colspan="10" class="empty-state"><div class="empty-state-icon">📝</div><p>ไม่พบข้อมูล</p></td></tr>';
          document.getElementById('recordsContainer').style.display = 'block';
        }
      } catch (error) {
        console.error('Error loading records:', error);
        showAlert('โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function displayStats() {
      var totalRecords = records.length;
      var totalDistance = 0;
      var totalHours = 0;
      var totalCars = new Set();
      var totalDrivers = new Set();

      records.forEach(function (record) {
        if (record.distance) totalDistance += parseFloat(record.distance) || 0;
        if (record.hours) totalHours += parseFloat(record.hours) || 0;
        if (record.car_id) totalCars.add(record.car_id);
        if (record.driver_id) totalDrivers.add(record.driver_id);
      });

      var html = '';
      html += '<div class="stat-card">';
      html += '<h3>📝 จำนวนรายการ</h3>';
      html += '<div class="value">' + totalRecords + '</div>';
      html += '<div class="unit">รายการ</div>';
      html += '</div>';

      html += '<div class="stat-card">';
      html += '<h3>📏 ระยะทางรวม</h3>';
      html += '<div class="value">' + totalDistance.toLocaleString() + '</div>';
      html += '<div class="unit">กิโลเมตร</div>';
      html += '</div>';

      html += '<div class="stat-card">';
      html += '<h3>⏱️ ชั่วโมงรวม</h3>';
      html += '<div class="value">' + totalHours.toFixed(1) + '</div>';
      html += '<div class="unit">ชั่วโมง</div>';
      html += '</div>';

      html += '<div class="stat-card">';
      html += '<h3>🚗 จำนวนรถ</h3>';
      html += '<div class="value">' + totalCars.size + '</div>';
      html += '<div class="unit">คัน</div>';
      html += '</div>';

      html += '<div class="stat-card">';
      html += '<h3>👤 จำนวนคนขับ</h3>';
      html += '<div class="value">' + totalDrivers.size + '</div>';
      html += '<div class="unit">คน</div>';
      html += '</div>';

      document.getElementById('statsGrid').innerHTML = html;
      document.getElementById('statsContainer').style.display = 'block';
    }

    function displayRecords() {
      var html = '';

      if (records.length === 0) {
        html = '<tr><td colspan="10" class="empty-state"><div class="empty-state-icon">📝</div><p>ไม่พบข้อมูล</p></td></tr>';
      } else {
        var viewType = document.getElementById('viewType').value;
        var sortedRecords = records.slice();

        // Sort based on view type
        if (viewType === 'by_car') {
          sortedRecords.sort(function (a, b) {
            var carA = vehiclesMap[a.car_id] ? vehiclesMap[a.car_id].license_plate : '';
            var carB = vehiclesMap[b.car_id] ? vehiclesMap[b.car_id].license_plate : '';
            if (carA !== carB) return carA.localeCompare(carB);
            return (b.date || '').localeCompare(a.date || '');
          });
        } else if (viewType === 'by_driver') {
          sortedRecords.sort(function (a, b) {
            var driverA = driversMap[a.driver_id] ? (driversMap[a.driver_id].full_name || driversMap[a.driver_id].first_name + ' ' + driversMap[a.driver_id].last_name) : '';
            var driverB = driversMap[b.driver_id] ? (driversMap[b.driver_id].full_name || driversMap[b.driver_id].first_name + ' ' + driversMap[b.driver_id].last_name) : '';
            if (driverA !== driverB) return driverA.localeCompare(driverB);
            return (b.date || '').localeCompare(a.date || '');
          });
        } else if (viewType === 'by_date') {
          sortedRecords.sort(function (a, b) {
            return (b.date || '').localeCompare(a.date || '');
          });
        } else {
          // Default: sort by datetime descending
          sortedRecords.sort(function (a, b) {
            // Use datetime field if available, otherwise combine date + time_start
            var datetimeA = a.datetime || ((a.date || '') + ' ' + (a.time_start || ''));
            var datetimeB = b.datetime || ((b.date || '') + ' ' + (b.time_start || ''));
            return datetimeB.localeCompare(datetimeA);
          });
        }

        sortedRecords.forEach(function (record) {
          var vehicle = vehiclesMap[record.car_id];
          var vehicleName = vehicle ? (vehicle.license_plate + ' ' + (vehicle.brand || '') + ' ' + (vehicle.model || '')) : record.car_id;

          var driver = driversMap[record.driver_id];
          var driverName = driver ? (driver.full_name || driver.first_name + ' ' + driver.last_name) : record.driver_id;

          var recordDate = record.date;
          if (!recordDate && record.datetime) {
            recordDate = record.datetime.split(' ')[0];
          }

          var statusBadge = '';
          if (record.is_auto_recovery || record.auto_generated === true || record.auto_generated === 'TRUE') {
            statusBadge = '<span class="badge badge-auto" title="' + (record.display_auto_tooltip || 'ระบบบันทึกแทนอัตโนมัติ') + '">⚙️ AUTO</span>';
          } else {
            statusBadge = '<span class="badge badge-normal">ปกติ</span>';
          }

          html += '<tr>';
          html += '<td>' + formatDateThai(recordDate) + '</td>';
          html += '<td>' + vehicleName + '</td>';
          html += '<td>' + driverName + '</td>';
          html += '<td>' + (record.time_start || '-') + '</td>';
          html += '<td>' + (record.time_end || '-') + '</td>';
          html += '<td>' + (record.distance ? parseFloat(record.distance).toLocaleString() : '-') + '</td>';
          html += '<td>' + (record.hours ? parseFloat(record.hours).toFixed(1) : '-') + '</td>';
          html += '<td>' + (record.destination || '-') + '</td>';
          html += '<td>' + (record.requester || '-') + '</td>';
          html += '<td>' + statusBadge + '</td>';
          html += '</tr>';
        });
      }

      document.getElementById('recordsTableBody').innerHTML = html;
      document.getElementById('recordsContainer').style.display = 'block';
    }

    function showAlert(message, type) {
      var container = document.getElementById('alertContainer');
      var alert = document.createElement('div');
      alert.className = 'alert alert-' + type;
      alert.textContent = message;
      container.innerHTML = '';
      container.appendChild(alert);

      setTimeout(function () {
        alert.remove();
      }, 5000);
    }
  </script>
</body>

</html>
